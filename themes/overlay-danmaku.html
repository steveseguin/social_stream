<!DOCTYPE html>
<!-- AI GUIDANCE FOR EDITING THIS OVERLAY -->
<!--
Social Stream Ninja - "Danmaku / Bullet Chat" overlay.
Messages fly across the screen from right to left at random vertical lanes
(Niconico / bilibili "danmaku" style). Non-vertical, funky, great for gameplay.

DATA: arrives via a hidden VDO.Ninja iframe (WebRTC) at event.data.dataReceived.overlayNinja,
or via WebSocket when &server / &server2 is set. Payload fields: chatname, chatmessage,
chatimg, type, nameColor, chatbadges, membership, hasDonation, event, bot...

URL PARAMETERS:
  session=ID        (required) your Social Stream session id
  password=PASS     optional room password (default false)
  duration=SECONDS  seconds for a bullet to cross the screen (default 9; lower = faster)
  lanes=N           number of vertical lanes (default 12)
  region=full|top|bottom   restrict bullets to part of the screen (default full)
  noavatar          hide avatars
  nonames           hide names
  hidebots          hide messages flagged as bots (dock still shows them)
  chroma=HEX        solid background colour for chroma keying (e.g. chroma=00FF00)
  font=PX           base font size in px (default 22)
  fontfamily=NAME   chat font family; loads matching Google Font (e.g. fontfamily=Roboto)
  server / server2  connect via WebSocket instead of (or in addition to) WebRTC
  localserver       use ws://127.0.0.1:3000

Keep this file Chrome-80 friendly: no <script type="module">, no top-level import/export.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danmaku Bullet Chat Overlay</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<script src="https://socialstream.ninja/libs/colours.js" type="text/javascript"></script>
<link rel="canonical" href="https://socialstream.ninja/">
<meta name="generator" content="Social Stream Ninja - https://github.com/steveseguin/social_stream">
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #0000;
    overflow: hidden;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 22px;
}
* { box-sizing: border-box; }

#stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
}

.bullet {
    position: absolute;
    left: 100%;
    top: 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    color: #fff;
    font-weight: 700;
    padding: 2px 4px;
    will-change: transform;
    text-shadow:
        -2px -2px 0 rgba(0,0,0,0.85), 2px -2px 0 rgba(0,0,0,0.85),
        -2px 2px 0 rgba(0,0,0,0.85), 2px 2px 0 rgba(0,0,0,0.85),
        0 0 6px rgba(0,0,0,0.7);
}
.bullet .avatar {
    width: 1.3em;
    height: 1.3em;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.5);
}
.bullet .name { font-weight: 800; }
.bullet .colon { opacity: 0.85; }
.bullet .source-icon { width: 0.9em; height: 0.9em; vertical-align: -1px; object-fit: contain; }
.bullet .badge { width: 0.9em; height: 0.9em; object-fit: contain; vertical-align: -1px; }
.bullet .badge svg, .bullet .badge img { width: 100% !important; height: 100% !important; }
.bullet .membership { color: #ffd34d; font-weight: 700; font-size: 0.8em; }
.bullet .donation { color: #6ee787; font-weight: 800; }
.bullet .text img, .bullet .text svg { max-width: 1.4em; max-height: 1.2em; vertical-align: -0.2em; }
.bullet.event .text { font-style: italic; }
.bullet.donation-bullet {
    color: #fff;
    background: linear-gradient(90deg, rgba(110,231,135,0.25), rgba(110,231,135,0));
    border-radius: 6px;
}
</style>
</head>
<body>
<div id="stage"></div>
<script>
    var urlParams = new URLSearchParams(window.location.search);
    var roomID = urlParams.has("session") ? urlParams.get("session") : "iWWnKL28tQ";
    var password = urlParams.has("password") ? urlParams.get("password") : "false";
    var featuredMode = false;

    // --- Common overlay tweaks (shared across themes) ---
    var hideBots = urlParams.has("hidebots");
    var hideAvatars = urlParams.has("noavatar") || urlParams.has("noavatars");
    var hideNames = urlParams.has("nonames") || urlParams.has("hidenames");
    if (urlParams.has("chroma")) {
        var _c = urlParams.get("chroma") || "";
        document.body.style.backgroundColor = _c.charAt(0) === "#" ? _c : "#" + _c;
    }
    if (urlParams.has("font")) {
        var _fs = parseInt(urlParams.get("font"), 10);
        if (!isNaN(_fs) && _fs > 0) { document.documentElement.style.fontSize = _fs + "px"; }
    }
    if (urlParams.has("fontfamily")) {
        var _ff = (urlParams.get("fontfamily") || "").trim();
        if (_ff) {
            var _safe = _ff.replace(/['"\\;{}<>]/g, "");
            var _gf = document.createElement("link");
            _gf.rel = "stylesheet";
            _gf.href = "https://fonts.googleapis.com/css2?family=" +
                encodeURIComponent(_safe).replace(/%20/g, "+") + ":wght@400;500;600;700;800&display=swap";
            document.head.appendChild(_gf);
            document.body.style.fontFamily = "'" + _safe + "', sans-serif";
        }
    }

    var CROSS_SECONDS = (function () {
        var s = parseFloat(urlParams.get("duration"));
        return (!isNaN(s) && s > 0) ? s : 9;
    })();
    var LANES = (function () {
        var n = parseInt(urlParams.get("lanes"), 10);
        return (!isNaN(n) && n > 0) ? n : 12;
    })();
    var REGION = (urlParams.get("region") || "full").toLowerCase();

    var stage = document.getElementById("stage");
    var laneLastSpawn = [];
    var laneEndsAt = []; // x (px) position of the tail of the last bullet in this lane
    for (var i = 0; i < LANES; i++) { laneLastSpawn.push(0); laneEndsAt.push(0); }

    function escapeHtml(str) {
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function laneBounds() {
        var h = window.innerHeight;
        var start = 0, end = LANES;
        if (REGION === "top") { end = Math.max(1, Math.ceil(LANES / 2)); }
        else if (REGION === "bottom") { start = Math.floor(LANES / 2); }
        return { start: start, end: end, laneH: h / LANES };
    }

    function pickLane() {
        var b = laneBounds();
        var now = Date.now();
        var best = b.start, bestScore = -Infinity;
        for (var i = b.start; i < b.end; i++) {
            // Prefer lanes whose previous bullet has travelled furthest left (smaller tail x)
            // and which were spawned longest ago, to reduce overlap.
            var score = (now - laneLastSpawn[i]) - laneEndsAt[i] * 2;
            if (score > bestScore) { bestScore = score; best = i; }
        }
        return best;
    }

    function buildBadges(data) {
        if (!data.chatbadges) { return ""; }
        var html = "";
        data.chatbadges.forEach(function (badge) {
            if (typeof badge === "object") {
                if (badge.type === "img" && badge.src) { html += "<img class='badge' src='" + badge.src + "' alt='badge'>"; }
                else if (badge.type === "svg" && badge.html) { html += "<span class='badge svg'>" + badge.html + "</span>"; }
            } else {
                html += "<img class='badge' src='" + badge + "' alt='badge'>";
            }
        });
        return html;
    }

    function clearAll() {
        Array.prototype.slice.call(stage.querySelectorAll(".bullet")).forEach(function (b) {
            if (b.parentNode) { b.parentNode.removeChild(b); }
        });
    }

    function handleControlPayload(data) {
        if (!data || typeof data !== "object") { return false; }
        if ("clearAll" in data || data.action === "clear" || data.action === "clearAll") { clearAll(); return true; }
        return false;
    }

    function addMessageToOverlay(data) {
        if (handleControlPayload(data)) { return; }
        if (!data || typeof data !== "object") { return; }
        if (hideBots && data.bot) { return; }
        if (!data.chatname && !data.chatmessage && !data.hasDonation && !data.donation) { return; }
        if (!data.chatname && data.meta) { return; }

        var nameColor = data.nameColor;
        if (!nameColor && typeof getColorFromType === "function" && data.type) {
            try { nameColor = getColorFromType(data.type); } catch (e) {}
        }
        if (!nameColor) { nameColor = "#9fd0ff"; }

        var bullet = document.createElement("div");
        bullet.className = "bullet";
        if (data.event) { bullet.className += " event"; }
        var donation = data.hasDonation || data.donation || "";
        if (donation) { bullet.className += " donation-bullet"; }

        var avatarHtml = (!hideAvatars && data.chatimg)
            ? "<span class='avatar' style=\"background-image:url('" + data.chatimg + "')\"></span>" : "";
        var iconHtml = data.type
            ? "<img class='source-icon' src='https://socialstream.ninja/sources/images/" + data.type + ".png' alt='' onerror=\"this.style.display='none'\">" : "";
        var badgesHtml = buildBadges(data);
        var nameHtml = (!hideNames && data.chatname)
            ? "<span class='name' style='color:" + nameColor + "'>" + escapeHtml(data.chatname) + "</span>" : "";
        var membershipHtml = data.membership ? "<span class='membership'>" + escapeHtml(data.membership) + "</span>" : "";
        var msg = data.chatmessage ? (data.textonly ? escapeHtml(data.chatmessage) : data.chatmessage) : "";
        var colonHtml = (nameHtml && msg) ? "<span class='colon'>:</span>" : "";
        var textHtml = msg ? "<span class='text'>" + msg + "</span>" : "";
        var donationHtml = donation ? "<span class='donation'>" + escapeHtml(donation) + "</span>" : "";

        bullet.innerHTML = avatarHtml + iconHtml + badgesHtml + membershipHtml + nameHtml + colonHtml + textHtml + donationHtml;
        stage.appendChild(bullet);

        var b = laneBounds();
        var lane = pickLane();
        var topPx = (lane * b.laneH) + Math.max(0, (b.laneH - bullet.offsetHeight) / 2);
        bullet.style.top = topPx + "px";
        laneLastSpawn[lane] = Date.now();

        var vw = window.innerWidth;
        var bw = bullet.offsetWidth;
        var distance = vw + bw + 20;
        // tail x at spawn time = vw + bw; record it so the next bullet in this lane waits a bit
        laneEndsAt[lane] = vw + bw;

        var startX = 0;            // element already starts at left:100%
        var endX = -distance;      // travel fully off the left edge
        bullet.style.transform = "translateX(0px)";

        var startTime = null;
        function frame(ts) {
            if (startTime === null) { startTime = ts; }
            var t = (ts - startTime) / (CROSS_SECONDS * 1000);
            if (t >= 1) {
                if (bullet.parentNode) { bullet.parentNode.removeChild(bullet); }
                return;
            }
            var x = startX + (endX - startX) * t;
            bullet.style.transform = "translateX(" + x + "px)";
            // update lane tail position so pickLane keeps spacing
            laneEndsAt[lane] = (vw + bw) + x;
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    }

    // --- WebRTC bridge (hidden VDO.Ninja iframe) ---
    var iframe = document.createElement("iframe");
    if (featuredMode) {
        iframe.src = "https://vdo.socialstream.ninja/?ln&password=" + password + "&salt=vdo.ninja&label=overlay&exclude=" + roomID + "&scene&novideo&noaudio&cleanoutput&room=" + roomID;
    } else {
        iframe.src = "https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&password=" + password + "&push&label=dock&vd=0&ad=0&novideo&noaudio&autostart&cleanoutput&room=" + roomID;
    }
    iframe.style.cssText = "width: 0px; height: 0px; position: fixed; left: -100px; top: -100px;";
    document.body.appendChild(iframe);
    window.addEventListener("message", function (e) {
        if (e.source != iframe.contentWindow) return;
        if (e.data && typeof e.data === "object" && e.data.dataReceived && typeof e.data.dataReceived === "object" && e.data.dataReceived.overlayNinja) {
            addMessageToOverlay(e.data.dataReceived.overlayNinja);
        }
    });

    // --- optional WebSocket ---
    var conCon = 1;
    var socketserver = false;
    var serverURL = urlParams.has("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja";
    function setupSocket() {
        socketserver.onclose = function () {
            setTimeout(function () { conCon += 1; socketserver = new WebSocket(serverURL); setupSocket(); }, 100 * conCon);
        };
        socketserver.onopen = function () {
            conCon = 1;
            socketserver.send(JSON.stringify({ "join": roomID, "out": 3, "in": 4 }));
        };
        socketserver.addEventListener('message', function (event) {
            if (event.data) {
                try { var data = JSON.parse(event.data); if (data) { addMessageToOverlay(data); } }
                catch (err) { console.error("Error processing WebSocket message:", err); }
            }
        });
    }
    if (urlParams.has("server") || urlParams.has("server2") || urlParams.has("localserver")) {
        serverURL = urlParams.get("server") || urlParams.get("server2") || serverURL;
        socketserver = new WebSocket(serverURL);
        setupSocket();
    }
</script>
</body>
</html>

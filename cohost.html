:root {
  --puppet-primary: #22314a;
  --puppet-bg: #9be7ff;
  --puppet-bg-deep: #63c8ef;
  --puppet-accent: #ff8ba7;
  --puppet-highlight: #ffffff;
  --puppet-shadow: rgba(7, 19, 39, 0.26);
  --puppet-outline: rgba(19, 37, 63, 0.14);
  --puppet-mouth: #24324b;
  --puppet-blush: rgba(255, 135, 162, 0.68);
  --puppet-face-inset: 22px;
}
#puppet-container {
    position: fixed;
    z-index: 1000;
    user-select: none;
    touch-action: none;
    transform: translateZ(0);
}
.puppet {
  width: 300px;
  height: 300px;
  position: relative;
  overflow: visible;
  isolation: isolate;
  background:
    radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.95) 0 10%, rgba(255, 255, 255, 0) 25%),
    radial-gradient(circle at 50% 115%, rgba(255, 255, 255, 0.72) 0, rgba(255, 255, 255, 0) 55%),
    linear-gradient(180deg, var(--puppet-bg) 0%, var(--puppet-bg-deep) 100%);
  border: 1px solid var(--puppet-outline);
  border-radius: 50%;
  box-shadow:
    0 24px 60px var(--puppet-shadow),
    inset 0 -16px 24px rgba(255, 255, 255, 0.24),
    inset 0 8px 18px rgba(255, 255, 255, 0.34);
  transition: transform 0.35s ease, box-shadow 0.35s ease, filter 0.35s ease;
  animation: floatBob 4.6s ease-in-out infinite;
}

.puppet::before,
.puppet::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.puppet::before {
  inset: 10px;
  background: radial-gradient(circle at 35% 20%, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0) 42%);
  opacity: 0.85;
}

.puppet::after {
  inset: -12px;
  background: radial-gradient(circle, rgba(111, 214, 255, 0.2), rgba(111, 214, 255, 0) 68%);
  filter: blur(16px);
  z-index: -1;
  animation: auraPulse 6s ease-in-out infinite;
}

.face {
  width: 180px;
  position: absolute;
  left: 50%;
  top: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translate(-50%, -50%);
  transition: transform 0.3s ease, filter 0.3s ease;
  animation: idleFace 7s ease-in-out infinite;
}

.eyes {
  display: flex;
  width: 100%;
  padding: 0 var(--puppet-face-inset);
  box-sizing: border-box;
  align-items: center;
  justify-content: space-between;
  transition: all 0.3s ease;
}

.eye {
  width: 34px;
  height: 34px;
  background: linear-gradient(180deg, var(--puppet-primary) 0%, #111827 100%);
  border-radius: 50%;
  position: relative;
  box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.08), 0 4px 12px rgba(0, 0, 0, 0.15);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}

.eye::before {
  content: '';
  position: absolute;
  width: 11px;
  height: 11px;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 50%;
  top: 6px;
  left: 6px;
  box-shadow: 4px 6px 0 -2px rgba(255, 255, 255, 0.55);
  transition: all 0.3s ease;
}

.eye::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, var(--puppet-bg) 64%, var(--puppet-bg-deep) 100%);
  transform: translateY(-120%);
  transition: transform 0.15s ease;
}

.eyebrows {
  position: absolute;
  width: 100%;
  top: -24px;
  left: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 calc(var(--puppet-face-inset) - 2px);
  box-sizing: border-box;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.eyebrow {
  width: 38px;
  height: 8px;
  background: var(--puppet-primary);
  border-radius: 999px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
  transition: all 0.3s ease;
  transform-origin: center;
}

.mouth {
  width: 78px;
  height: 40px;
  border: 6px solid var(--puppet-mouth);
  border-radius: 0 0 48px 48px;
  border-top: 0;
  margin: 32px auto 0;
  position: relative;
  overflow: hidden;
  transform-origin: center;
  box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.12);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.mouth::before {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -4px;
  transform: translateX(-50%);
  width: 56%;
  height: 48%;
  background: rgba(255, 150, 170, 0.58);
  border-radius: 50% 50% 70% 70%;
  opacity: 0.24;
  transition: inherit;
}

.cheeks {
  position: absolute;
  width: 100%;
  top: 34%;
  left: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 var(--puppet-face-inset);
  box-sizing: border-box;
  opacity: 0;
  transition: all 0.3s ease;
}

.cheek {
  width: 26px;
  height: 16px;
  background: var(--puppet-blush);
  border-radius: 50%;
  transform: scale(0);
  filter: blur(1px);
  transition: all 0.3s ease;
}

@keyframes talking {
  0%, 100% {
    height: 30px;
    width: 66px;
    transform: translateY(0) scaleX(1);
    border-radius: 20px 20px 36px 36px;
  }
  50% {
    height: 54px;
    width: 56px;
    transform: translateY(3px) scaleX(0.94);
    border-radius: 22px 22px 30px 30px;
  }
}

@keyframes softTalking {
  0%, 100% {
    height: 40px;
    transform: translateY(0) scaleX(1);
  }
  50% {
    height: 52px;
    transform: translateY(2px) scaleX(0.96);
  }
}

@keyframes blink {
  0% { transform: translateY(-120%); }
  50% { transform: translateY(0); }
  100% { transform: translateY(110%); }
}

@keyframes floatBob {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-5px) scale(1.01); }
}

@keyframes idleFace {
  0%, 100% { transform: translate(-50%, -50%) rotate(-1deg); }
  50% { transform: translate(-49%, -51%) rotate(1deg); }
}

@keyframes shadowFloat {
  0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.28; }
  50% { transform: translateX(-50%) scaleX(0.92); opacity: 0.18; }
}

@keyframes auraPulse {
  0%, 100% { transform: scale(1); opacity: 0.18; }
  50% { transform: scale(1.05); opacity: 0.28; }
}

@keyframes attentiveTilt {
  0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
  50% { transform: translate(-49%, -51%) rotate(2deg); }
}

@keyframes nervousWobble {
  0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
  25% { transform: translate(-49%, -50%) rotate(1.5deg); }
  75% { transform: translate(-51%, -50%) rotate(-1.5deg); }
}

@keyframes celebrateBob {
  0%, 100% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-12px) scale(1.03); }
  60% { transform: translateY(-4px) scale(0.99); }
}

@keyframes cheerfulBounce {
  0%, 100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
  25% { transform: translate(-50%, -54%) rotate(-4deg) scale(1.02); }
  75% { transform: translate(-50%, -47%) rotate(4deg) scale(0.98); }
}

.talking .mouth {
  animation: talking 0.32s ease-in-out infinite;
}

.blink .eye::after {
  animation: blink 0.16s ease forwards;
}

.happy .mouth {
  height: 58px;
  border-radius: 0 0 84px 84px;
  transform: translateY(0) scale(0.92);
}

.happy .cheeks {
  opacity: 1;
}

.happy .cheek {
  transform: scale(1);
}

.happy.talking .mouth {
  animation: softTalking 0.36s ease-in-out infinite;
}

.sad .mouth {
  transform: rotate(180deg) translateY(-18px) scale(0.8);
  width: 60px;
  height: 30px;
}

.sad .eyebrows {
  opacity: 1;
}

.sad .eyebrow {
  transform: rotate(-15deg) translateY(5px);
  opacity: 1;
}

.sad .eyebrow:last-child {
  transform: rotate(15deg) translateY(5px);
}

.surprised .mouth {
  height: 80px;
  width: 60px;
  border-radius: 50%;
  transform: translateY(6px);
}

.surprised .eye {
  height: 45px;
  width: 45px;
  transform: translateY(-5px);
}

.surprised .eyebrows {
  opacity: 1;
}

.surprised .eyebrow {
  transform: translateY(-5px);
  opacity: 1;
}

.angry .eyebrows {
  opacity: 1;
}

.angry .eyebrow {
  transform: rotate(30deg) translateY(-2px);
  opacity: 1;
}

.angry .eyebrow:last-child {
  transform: rotate(-30deg) translateY(-2px);
}

.angry .mouth {
  width: 60px;
  height: 20px;
  transform: rotate(-10deg) translateY(10px);
  border-radius: 0 0 20px 20px;
}

.angry .eye::before {
  width: 8px;
  height: 8px;
  top: 12px;
  left: 12px;
}

.thinking .eye {
  height: 14px;
  border-radius: 10px;
  transform: translateY(4px);
}

.thinking .mouth {
  width: 40px;
  height: 12px;
  border-radius: 8px;
  transform: rotate(-10deg) translate(20px, 10px);
}

.thinking .eyebrows {
  opacity: 1;
}

.thinking .eyebrow:last-child {
  transform: rotate(-15deg) translateY(-2px);
  opacity: 1;
}

.listening .face {
  animation: attentiveTilt 1.8s ease-in-out infinite;
}

.listening .eye {
  width: 30px;
  height: 40px;
  transform: translateY(-1px);
}

.listening .eyebrows {
  opacity: 1;
}

.listening .eyebrow {
  transform: rotate(10deg) translateY(-6px);
  opacity: 1;
}

.listening .eyebrow:last-child {
  transform: rotate(-10deg) translateY(-6px);
}

.listening .mouth {
  width: 52px;
  height: 18px;
  border-radius: 0 0 20px 20px;
  transform: translateY(12px) scale(0.94);
}

.confused .eyebrows {
  opacity: 1;
}

.confused .eyebrow:first-child {
  transform: rotate(-18deg) translate(-3px, -8px);
  opacity: 1;
}

.confused .eyebrow:last-child {
  transform: rotate(18deg) translate(3px, 6px);
  opacity: 1;
}

  transform: scaleY(1.04);

.confused .eye:last-child {

  border-radius: 0 0 18px 18px;

  height: 18px;

            float32Array[i] = dataView.getInt16(i * 2, true) / 32768;
        }
        const newSamples = new Float32Array(this.samples.length + float32Array.length);
        newSamples.set(this.samples);
        newSamples.set(float32Array, this.samples.length);
        this.samples = newSamples;

        }

    play() {

        source.buffer = buffer;
        source.connect(this.gainNode);
        const startTime = Math.max(this.context.currentTime, this.nextTime);

        this.nextTime = startTime + buffer.duration;
        this.samples = new Float32Array(0);
        source.onended = () => {

                this.play();

                this.completeCalled = false;
                avatar.setEmotion('happy', false);
            } else {
                this.clearAndSetTimeout(() => {
                    avatar.setEmotion('happy', false);
                }, 200);
            }
        };
        this.clearAndSetTimeout(null);
        avatar.setEmotion("proud", true);
    }
	clearAndSetTimeout(callback, duration) {

            this.timeout = null;
        }
        if (callback && duration) {

        }
    }

        if (this.context.state === "suspended") {

        }
    }

        this.samples = new Float32Array(0);
        this.isPlaying = false;
        this.nextTime = 0;
        this.completeCalled = false;

        this.gainNode.connect(this.context.destination);

        avatar.setEmotion('happy', false);
    }
    complete() {
        this.completeCalled = true;
        if (!this.isPlaying && this.samples.length > 0) {

        }
    }

class MessageFormatter {
    constructor() {
        this.currentMessage = '';
        this.currentMessageElement = null;
        this.messageBuffer = '';

        this.lastMessageTime = Date.now();

    }
    formatMarkdown(text) {
        let formatted = text
            .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/`(.*?)`/g, '<code>$1</code>');
        const lines = formatted.split('\n');
        const formattedLines = lines.map(line => {
            if (line.trim().startsWith('*') && line.trim()[1] === ' ') {
                return `<li>${line.trim().substring(2)}</li>`;
            }
            if (/^\d+\./.test(line.trim())) {
                return `<li>${line.trim()}</li>`;
            }
            return line;
        });
        return formattedLines.join('\n')
            .replace(/\n\n/g, '<br><br>')
            .replace(/\n(?![<])/g, '<br>');
    }
    appendMessage(text, isUser = false) {
        const now = Date.now();
        if (isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user-message';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'markdown-content';
            contentDiv.textContent = text;
            messageDiv.appendChild(contentDiv);
            responsesDiv.appendChild(messageDiv);
            this.messageComplete = true;
            this.scrollToBottom();
            this.lastMessageTime = now;
            window.avatar?.reactToText(text, 'user');
            return;
        }
        if (this.currentMessageElement && (now - this.lastMessageTime > this.pauseThreshold)) {
            const previousChar = this.messageBuffer.slice(-1);
            const nextChar = String(text || '').charAt(0);
            const hasWhitespaceBoundary = /\s/.test(previousChar || '') || /\s/.test(nextChar || '');
            const nextIsPunctuation = /^[,.;:!?)}\]]/.test(nextChar || '');
            if (!hasWhitespaceBoundary && !nextIsPunctuation) {
                this.messageBuffer += ' ';
            }
        }
        this.messageBuffer += text;
        this.lastMessageTime = now;
        if (!this.currentMessageElement) {
            this.currentMessageElement = document.createElement('div');
            this.currentMessageElement.className = 'message assistant-message';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'markdown-content';
            this.currentMessageElement.appendChild(contentDiv);
            responsesDiv.appendChild(this.currentMessageElement);
            this.messageComplete = false;
        }
        const contentDiv = this.currentMessageElement.querySelector('.markdown-content');
        contentDiv.innerHTML = this.formatMarkdown(this.messageBuffer);
        this.scrollToBottom();
    }
    replaceCurrentMessage(text) {
        const nextText = String(text || '');
        if (!this.currentMessageElement) {
            this.currentMessageElement = document.createElement('div');
            this.currentMessageElement.className = 'message assistant-message';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'markdown-content';
            this.currentMessageElement.appendChild(contentDiv);
            responsesDiv.appendChild(this.currentMessageElement);
        }
        this.messageBuffer = nextText;
        this.messageComplete = false;
        this.lastMessageTime = Date.now();
        const contentDiv = this.currentMessageElement.querySelector('.markdown-content');
        contentDiv.innerHTML = this.formatMarkdown(this.messageBuffer);
        this.scrollToBottom();
    }
    finalizeMessage() {
        const completedText = this.messageBuffer.trim();
        this.messageBuffer = '';
        this.currentMessageElement = null;
        this.messageComplete = true;
        this.lastMessageTime = Date.now();
        if (completedText) {

        }
    }

    }

		class AudioProcessor extends AudioWorkletProcessor {
		  buffer = new Int16Array(2048);
		  bufferWriteIndex = 0;
		  process(inputs) {
			if (inputs[0].length) {
			  const samples = inputs[0][0];
			  for (let i = 0; i < samples.length; i++) {
				const int16Value = samples[i] * 32768;
				this.buffer[this.bufferWriteIndex++] = int16Value;

			  }
			}
			return true;
		  }
		}`;

function isHttpMixedContentBlocked(urlText) {
    try {
        const parsed = new URL(urlText);
        if (window.location.protocol !== 'https:') return false;
        if (parsed.protocol !== 'http:') return false;
        const host = parsed.hostname.toLowerCase();
        return !(host === 'localhost' || host === '127.0.0.1' || host === '::1');
    } catch (_error) {
        return false;
    }

function resolveOpenAICompatibleBase(endpoint) {
    const normalized = normalizeCustomEndpoint(endpoint);
    const parsed = new URL(normalized);
    if (/\/v1\/chat\/completions\/?$/i.test(parsed.pathname)) {
        parsed.pathname = parsed.pathname.replace(/\/chat\/completions\/?$/i, '');
    } else if (/\/chat\/completions\/?$/i.test(parsed.pathname)) {
        parsed.pathname = parsed.pathname.replace(/\/chat\/completions\/?$/i, '');
    }
    if (!/\/v1$/i.test(parsed.pathname)) {
        parsed.pathname = `${parsed.pathname.replace(/\/+$/, '')}/v1`;
    }
    parsed.search = '';

        const friendlyMessage = looksLikeNetworkOrCors

function isRealtimeProvider(providerName) {
    return providerName === 'chatgpt' || providerName === 'xai' || providerName === 'localqwen' || providerName === 'customopenai';
}

function createPublisherForProvider(providerName, activeStream, apiKey) {
    const effectiveModel = getEffectiveModelForProvider(providerName);
    if (providerName === 'gemini') {
        return new GoogleLivePublisher(activeStream, apiKey, effectiveModel);
    }
    if (providerName === 'localqwen') {
        return new LocalBrowserPublisher(activeStream, apiKey, effectiveModel);
    }
    if (providerName === 'customopenai') {
        const endpoint = getEffectiveCustomEndpoint(providerName);
        return new OpenAICompatiblePublisher(activeStream, apiKey, effectiveModel, endpoint);
    }
    return new RealtimePublisher(activeStream, apiKey, providerName, effectiveModel);
}

let currentAudioIndicator = null;
let currentAudioContext = null;
let currentAnimationFrame = null;
function setupAudioIndicator(stream) {
    if (currentAudioIndicator) {
        currentAudioIndicator.remove();
        if (currentAudioContext) {
            currentAudioContext.close();
        }
        if (currentAnimationFrame) {
            cancelAnimationFrame(currentAnimationFrame);
        }
    }
    currentAudioContext = new AudioContext();
    const analyserMic = currentAudioContext.createAnalyser();
    const analyserSystem = currentAudioContext.createAnalyser();
    analyserMic.fftSize = 256;
    analyserSystem.fftSize = 256;
    const container = document.createElement('div');
    container.style.cssText = `
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 8px;
    `;
    const micIndicator = document.createElement('div');
    const systemIndicator = document.createElement('div');
    const baseIndicatorStyle = `
        width: 100%;
        height: 4px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
    `;
    micIndicator.style.cssText = baseIndicatorStyle;
    systemIndicator.style.cssText = baseIndicatorStyle;
    const micLabel = document.createElement('div');
    const systemLabel = document.createElement('div');
    micLabel.textContent = 'Microphone';

    micLabel.style.cssText = 'font-size: 12px; color: #999; margin-bottom: 2px;';

    container.appendChild(micIndicator);
    container.appendChild(systemLabel);
    container.appendChild(systemIndicator);
    preview.insertAdjacentElement('afterend', container);
    currentAudioIndicator = container;
    stream.getAudioTracks().forEach(track => {
        const source = currentAudioContext.createMediaStreamSource(new MediaStream([track]));
        if (track.label && track.label.toLowerCase().includes('system')) {
            source.connect(analyserSystem);
        } else {
            source.connect(analyserMic);
        }
    });
    const micData = new Uint8Array(analyserMic.frequencyBinCount);
    const systemData = new Uint8Array(analyserSystem.frequencyBinCount);
    function updateIndicators() {
        if (!stream.active) {
            container.remove();
            currentAudioIndicator = null;
            currentAudioContext = null;
            cancelAnimationFrame(currentAnimationFrame);
            return;
        }
        analyserMic.getByteFrequencyData(micData);
        const micLevel = Math.min(100, (micData.reduce((a, b) => a + b) / micData.length / 128) * 100);
        micIndicator.style.background = `linear-gradient(90deg, #4CAF50 ${micLevel}%, #333 ${micLevel}%)`;
        analyserSystem.getByteFrequencyData(systemData);
        const systemLevel = Math.min(100, (systemData.reduce((a, b) => a + b) / systemData.length / 128) * 100);
        systemIndicator.style.background = `linear-gradient(90deg, #2196F3 ${systemLevel}%, #333 ${systemLevel}%)`;
        currentAnimationFrame = requestAnimationFrame(updateIndicators);
    }
    updateIndicators();
}

async function getDevices() {
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        videoSelect.innerHTML = '';
        audioSelect.innerHTML = '';
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const audioDevices = devices.filter(d => d.kind === 'audioinput');
        videoSelect.appendChild(new Option('No Video', 'none'));
        audioSelect.appendChild(new Option('No Audio', 'none'));
        videoSelect.appendChild(new Option('Screen Share', 'screen'));
        videoDevices.forEach(device => {
            videoSelect.appendChild(new Option(device.label || `Camera ${videoSelect.length - 1}`, device.deviceId));
        });
        audioDevices.forEach(device => {
            audioSelect.appendChild(new Option(device.label || `Microphone ${audioSelect.length}`, device.deviceId));
        });
        const previousVideoId = localStorage.getItem('selectedVideoId');
        const previousAudioId = localStorage.getItem('selectedAudioId');
        let videoDeviceFound = false;
        let audioDeviceFound = false;
        if (previousVideoId) {
            if (previousVideoId === 'screen' || previousVideoId === 'none') {
                videoSelect.value = previousVideoId;
                videoDeviceFound = true;
            } else {
                for (const option of videoSelect.options) {
                    if (option.value === previousVideoId) {
                        videoSelect.value = previousVideoId;
                        videoDeviceFound = true;
                        break;
                    }
                }
            }
        }
        if (previousAudioId) {
            if (previousAudioId === 'none') {
                audioSelect.value = previousAudioId;
                audioDeviceFound = true;
            } else {
                for (const option of audioSelect.options) {
                    if (option.value === previousAudioId) {
                        audioSelect.value = previousAudioId;
                        audioDeviceFound = true;
                        break;
                    }
                }
            }
        }
        if (!videoDeviceFound && videoDevices.length > 0) {
            videoSelect.value = videoDevices[0].deviceId;
            videoDeviceFound = true;
        }
        if (!videoDeviceFound) {
            videoSelect.value = 'none';
        }
        if (!audioDeviceFound && audioDevices.length > 0) {
            audioSelect.value = audioDevices[0].deviceId;
            audioDeviceFound = true;
        }
        if (!audioDeviceFound) {
            audioSelect.value = 'none';
        }
        if (videoDeviceFound) {
            localStorage.setItem('selectedVideoId', videoSelect.value);
        } else {
            localStorage.removeItem('selectedVideoId');
        }
        if (audioDeviceFound) {
            localStorage.setItem('selectedAudioId', audioSelect.value);
        } else {
            localStorage.removeItem('selectedAudioId');
        }
        if (publisher) {
            await updateMediaStream();
        }
    } catch (err) {
        showError('Failed to get devices: ' + err.message);
    }
}

let audioContext;
async function getStream() {
    try {
        if (preview.srcObject) {
            preview.srcObject.getTracks().forEach(track => track.stop());
            preview.srcObject = null;
        }
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        let videoStream = null;
        let micStream = null;
        const outputStream = new MediaStream();
        if (videoSelect.value === 'screen') {
            try {
                videoStream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: true
                });
                const videoTrack = videoStream.getVideoTracks()[0];
                if (videoTrack) {
                    outputStream.getVideoTracks().forEach(track => {
                        outputStream.removeTrack(track);
                        track.stop();
                    });
                    outputStream.addTrack(videoTrack);
                }
            } catch (err) {
                console.error('Screen share failed:', err);
                videoSelect.value = 'none';
            }
        } else if (videoSelect.value !== 'none') {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        deviceId: { exact: videoSelect.value }
                    }
                });
                const videoTrack = videoStream.getVideoTracks()[0];
                if (videoTrack) {
                    outputStream.getVideoTracks().forEach(track => {
                        outputStream.removeTrack(track);
                        track.stop();
                    });
                    outputStream.addTrack(videoTrack);
                }
            } catch (err) {
                console.warn('Selected video device failed:', err);
                showError('Camera failed to start: ' + err.message);
                videoSelect.value = 'none';
            }
        }
        if (audioSelect.value !== 'none') {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        deviceId: { exact: audioSelect.value },
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });
                outputStream.getAudioTracks().forEach(track => {
                    outputStream.removeTrack(track);
                    track.stop();
                });
                if (videoStream?.getAudioTracks().length > 0) {
                    const ctx = new AudioContext();
                    const dest = ctx.createMediaStreamDestination();
                    const systemSource = ctx.createMediaStreamSource(videoStream);
                    const micSource = ctx.createMediaStreamSource(micStream);
                    systemSource.connect(dest);
                    micSource.connect(dest);
                    const mixedTrack = dest.stream.getAudioTracks()[0];
                    if (mixedTrack) {
                        mixedTrack.label = "Mixed Audio (System + Microphone)";
                        outputStream.addTrack(mixedTrack);
                    }
                    videoStream.getAudioTracks().forEach(track => track.stop());
                    micStream.getAudioTracks().forEach(track => track.stop());
                } else {
                    const audioTrack = micStream.getAudioTracks()[0];
                    if (audioTrack) {
                        outputStream.addTrack(audioTrack);
                    }
                }
            } catch (err) {
                console.warn('Selected audio device failed:', err);
                audioSelect.value = 'none';
            }
        } else if (videoStream?.getAudioTracks().length > 0) {
            const systemTrack = videoStream.getAudioTracks()[0];
            if (systemTrack) {
                outputStream.getAudioTracks().forEach(track => {
                    outputStream.removeTrack(track);
                    track.stop();
                });
                outputStream.addTrack(systemTrack);
            }
        }
		if (outputStream.getTracks().length === 0) {
            console.log('No audio or video selected, creating dummy video track');
			
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            const ctx = canvas.getContext('2d');
            
			
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
			
            ctx.fillStyle = '#ffffff';
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('No audio or video selected', canvas.width / 2, canvas.height / 2);
            
			
            const dummyStream = canvas.captureStream(1); // 1 fps
            const videoTrack = dummyStream.getVideoTracks()[0];
            outputStream.addTrack(videoTrack);
        }
        return outputStream;
    } catch (err) {
        showError('Failed to get stream: ' + err.message);
        throw err;
    }
}
async function updateMediaStream() {
    if (!publisher) return;
    try {
        const previousMicMuted = micMuted;
        const previousAudioMuted = audioMuted;
        const newStream = await getStream();
        preview.srcObject = newStream;
        if (publisher) {
            const oldStream = stream;
            stream = newStream;
            publisher.stream = newStream;
            if (typeof publisher.setupAudioProcessing === 'function' && stream.getAudioTracks().length > 0) {
                await publisher.setupAudioProcessing();
            }
            if (typeof publisher.setupVideoProcessing === 'function' && stream.getVideoTracks().length > 0) {
                await publisher.setupVideoProcessing();
            }
            if (oldStream) {
                oldStream.getTracks().forEach(track => track.stop());
            }
        } else {
            stream = newStream;
        }
        if (stream.getAudioTracks().length > 0) {
            setupAudioIndicator(stream);
        }
        if (previousMicMuted || previousAudioMuted) {
            const audioTracks = stream.getAudioTracks();
            audioTracks.forEach(track => {
                if (track.kind === 'audio' && track.label) {
                    if (previousMicMuted && !track.label.toLowerCase().includes('system')) {
                        track.enabled = false;
                    }
                    if (previousAudioMuted && track.label.toLowerCase().includes('system')) {
                        track.enabled = false;
                    }
                }
            });
        }
        if (videoMuted) {
            stream.getVideoTracks().forEach(track => { track.enabled = false; });
        }
    } catch (err) {
        console.error('Failed to update media stream:', err);
        showError('Failed to update media stream: ' + err.message);
        if (publisher) {
            publisher.stop();
            publisher = null;
        }
        if (stream) {

function setupConnectionMonitoring() {
    let monitoringActive = false;
    let monitoringInterval = null;
    function startMonitoring() {
        if (monitoringActive) return;
        monitoringActive = true;
        if (monitoringInterval) {
            clearInterval(monitoringInterval);
        }
        monitoringInterval = setInterval(() => {
            if (startButton.dataset.started !== "true" || !publisher) return;
            if (!publisher.isConnected()) {
                console.log('Stream should be active but connection is closed, attempting to reconnect');
                if (publisher.reconnectAttempts < publisher.maxReconnectAttempts) {
                    publisher.reconnect().catch(err => {
                        console.error('Failed automatic reconnection:', err);
                    });
                } else {
                    console.log('Max reconnection attempts reached, notifying user');
                    showError('Connection lost. Please try restarting the stream manually.');
                }
            }
            if (stream) {
                const allTracks = [...stream.getAudioTracks(), ...stream.getVideoTracks()];
                const anyTrackEnded = allTracks.some(track => !track.readyState || track.readyState === 'ended');
                if (anyTrackEnded) {
                    console.warn('One or more media tracks have ended unexpectedly');
                    if (publisher && !publisher.reconnectTimeout && !publisher._reconnectPromise) {
                        updateMediaStream().catch(err => {
                            console.error('Failed to recover media stream:', err);
                        });
                    }
                }
            }
        }, 15000);
    }
    function stopMonitoring() {
        if (monitoringInterval) {
            clearInterval(monitoringInterval);
            monitoringInterval = null;
        }
        monitoringActive = false;
    }
    window.addEventListener('online', () => {
        console.log('Network connection restored');
        if (publisher && !publisher.isConnected() && startButton.dataset.started === "true") {
            console.log('Attempting to reconnect after network restoration');
            showError('Network connection restored. Reconnecting...');
            publisher.reconnect().catch(err => {
                console.error('Failed to reconnect after network restoration:', err);
            });
        }
    });
    window.addEventListener('offline', () => {
        console.log('Network connection lost');
        showError('Network connection lost. Waiting for connection to restore...');
    });
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            console.log('Tab became visible');
            if (publisher && startButton.dataset.started === "true") {
                const lastActivity = Date.now() - (publisher.lastActivityTime || 0);
                if (lastActivity > 10000) {
                    console.log('Long inactivity detected after tab became visible, reconnecting');
                    publisher.reconnect().catch(err => {
                        console.error('Failed to reconnect after tab became visible:', err);
                    });
                }
            }
        }
    });
    startButton.addEventListener('click', () => {
        if (startButton.dataset.started === "true") {
            startMonitoring();
        } else {
            stopMonitoring();
        }
    });
    if (startButton.dataset.started === "true") {
        startMonitoring();
    }
    return {
        start: startMonitoring,
        stop: stopMonitoring
    };
}

            document.getElementById('responses').innerHTML = '';
        }
    });
    
    // Add to your controls
    const controlsDiv = document.querySelector('.controls');
    if (controlsDiv) {

    }
}

});

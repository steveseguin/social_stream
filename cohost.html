		<style>
			body {

			.control-group {

			.control-group-header {

				font-weight: 700;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				margin-bottom: 4px;
			}

			summary.control-group-header {
				cursor: pointer;
				list-style: none;
				user-select: none;
			}

			summary.control-group-header::before {
				content: "\25B6";
				display: inline-block;
				margin-right: 6px;
				font-size: 9px;
				transition: transform 0.15s ease;
			}

			details[open] > summary.control-group-header::before {
				transform: rotate(90deg);
			}

			.control-row {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px;
			}

			button,
			.api-key,
			.message-input,

			.api-key:focus,
			.message-input:focus,

			:root {
				--puppet-primary: #22314a;
				--puppet-bg: #9be7ff;
				--puppet-bg-deep: #63c8ef;
				--puppet-accent: #ff8ba7;
				--puppet-highlight: #ffffff;
				--puppet-shadow: rgba(7, 19, 39, 0.26);
				--puppet-outline: rgba(19, 37, 63, 0.14);
				--puppet-mouth: #24324b;
				--puppet-blush: rgba(255, 135, 162, 0.68);
				--puppet-face-inset: 22px;
			}
			#puppet-container {
				position: fixed;
				z-index: 1000;
				user-select: none;
				touch-action: none;
				transform: translateZ(0);
				pointer-events: auto;
			}
			.puppet {
				width: 300px;
				height: 300px;
				position: relative;
				overflow: visible;
				isolation: isolate;
				background: radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.95) 0 10%, rgba(255, 255, 255, 0) 25%), radial-gradient(circle at 50% 115%, rgba(255, 255, 255, 0.72) 0, rgba(255, 255, 255, 0) 55%), linear-gradient(180deg, var(--puppet-bg) 0%, var(--puppet-bg-deep) 100%);
				border: 1px solid var(--puppet-outline);
				border-radius: 50%;
				box-shadow:
					0 24px 60px var(--puppet-shadow),
					inset 0 -16px 24px rgba(255, 255, 255, 0.24),
					inset 0 8px 18px rgba(255, 255, 255, 0.34);
				transition:
					transform 0.35s ease,
					box-shadow 0.35s ease,
					filter 0.35s ease;
				animation: floatBob 4.6s ease-in-out infinite;
			}

			.puppet::before,
			.puppet::after {
				content: "";
				position: absolute;
				border-radius: 50%;
				pointer-events: none;
			}

			.puppet::before {
				inset: 10px;
				background: radial-gradient(circle at 35% 20%, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0) 42%);
				opacity: 0.85;
			}

			.puppet::after {
				inset: -12px;
				background: radial-gradient(circle, rgba(111, 214, 255, 0.2), rgba(111, 214, 255, 0) 68%);
				filter: blur(16px);
				z-index: -1;
				animation: auraPulse 6s ease-in-out infinite;
			}

			.face {
				width: 180px;
				position: absolute;
				left: 50%;
				top: 50%;
				display: flex;
				flex-direction: column;
				align-items: center;
				transform: translate(-50%, -50%);
				transition:
					transform 0.3s ease,
					filter 0.3s ease;
				animation: idleFace 7s ease-in-out infinite;
			}

			.eyes {
				display: flex;
				width: 100%;
				padding: 0 var(--puppet-face-inset);
				box-sizing: border-box;
				align-items: center;
				justify-content: space-between;
				transition: all 0.3s ease;
			}

			.eye {
				width: 34px;
				height: 34px;
				background: linear-gradient(180deg, var(--puppet-primary) 0%, #111827 100%);
				border-radius: 50%;
				position: relative;
				box-shadow:
					inset 0 -4px 0 rgba(255, 255, 255, 0.08),
					0 4px 12px rgba(0, 0, 0, 0.15);
				transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
				overflow: hidden;
			}

			.eye::before {
				content: "";
				position: absolute;
				width: 11px;
				height: 11px;
				background: rgba(255, 255, 255, 0.95);
				border-radius: 50%;
				top: 6px;
				left: 6px;
				box-shadow: 4px 6px 0 -2px rgba(255, 255, 255, 0.55);
				transition: all 0.3s ease;
			}

			.eye::after {
				content: "";
				position: absolute;
				width: 100%;
				height: 100%;
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, var(--puppet-bg) 64%, var(--puppet-bg-deep) 100%);
				transform: translateY(-120%);
				transition: transform 0.15s ease;
			}

			.eyebrows {
				position: absolute;
				width: 100%;
				top: -24px;
				left: 0;
				display: flex;
				justify-content: space-between;
				padding: 0 calc(var(--puppet-face-inset) - 2px);
				box-sizing: border-box;
				opacity: 0;
				transition: opacity 0.25s ease;
			}

			.eyebrow {
				width: 38px;
				height: 8px;
				background: var(--puppet-primary);
				border-radius: 999px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
				transition: all 0.3s ease;
				transform-origin: center;
			}

			.mouth {
				width: 78px;
				height: 40px;
				border: 6px solid var(--puppet-mouth);
				border-radius: 0 0 48px 48px;
				border-top: 0;
				margin: 32px auto 0;
				position: relative;
				overflow: hidden;
				transform-origin: center;
				box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.12);
				transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			}

			.mouth::before {
				content: "";
				position: absolute;
				left: 50%;
				bottom: -4px;
				transform: translateX(-50%);
				width: 56%;
				height: 48%;
				background: rgba(255, 150, 170, 0.58);
				border-radius: 50% 50% 70% 70%;
				opacity: 0.24;
				transition: inherit;
			}

			.cheeks {
				position: absolute;
				width: 100%;
				top: 34%;
				left: 0;
				display: flex;
				justify-content: space-between;
				padding: 0 var(--puppet-face-inset);
				box-sizing: border-box;
				opacity: 0;
				transition: all 0.3s ease;
			}

			.cheek {
				width: 26px;
				height: 16px;
				background: var(--puppet-blush);
				border-radius: 50%;
				transform: scale(0);
				filter: blur(1px);
				transition: all 0.3s ease;
			}

			@keyframes talking {
				0%,
				100% {
					height: 30px;
					width: 66px;
					transform: translateY(0) scaleX(1);
					border-radius: 20px 20px 36px 36px;
				}
				50% {
					height: 54px;
					width: 56px;
					transform: translateY(3px) scaleX(0.94);
					border-radius: 22px 22px 30px 30px;
				}
			}

			@keyframes softTalking {
				0%,
				100% {
					height: 40px;
					transform: translateY(0) scaleX(1);
				}
				50% {
					height: 52px;
					transform: translateY(2px) scaleX(0.96);
				}
			}

			@keyframes blink {
				0% {
					transform: translateY(-120%);
				}
				50% {
					transform: translateY(0);
				}
				100% {
					transform: translateY(110%);
				}
			}

			@keyframes floatBob {
				0%,
				100% {
					transform: translateY(0) scale(1);
				}
				50% {
					transform: translateY(-5px) scale(1.01);
				}
			}

			@keyframes idleFace {
				0%,
				100% {
					transform: translate(-50%, -50%) rotate(-1deg);
				}
				50% {
					transform: translate(-49%, -51%) rotate(1deg);
				}
			}

			@keyframes shadowFloat {
				0%,
				100% {
					transform: translateX(-50%) scaleX(1);
					opacity: 0.28;
				}
				50% {
					transform: translateX(-50%) scaleX(0.92);
					opacity: 0.18;
				}
			}

			@keyframes auraPulse {
				0%,
				100% {
					transform: scale(1);
					opacity: 0.18;
				}
				50% {
					transform: scale(1.05);
					opacity: 0.28;
				}
			}

			@keyframes attentiveTilt {
				0%,
				100% {
					transform: translate(-50%, -50%) rotate(0deg);
				}
				50% {
					transform: translate(-49%, -51%) rotate(2deg);
				}
			}

			@keyframes nervousWobble {
				0%,
				100% {
					transform: translate(-50%, -50%) rotate(0deg);
				}
				25% {
					transform: translate(-49%, -50%) rotate(1.5deg);
				}
				75% {
					transform: translate(-51%, -50%) rotate(-1.5deg);
				}
			}

			@keyframes celebrateBob {
				0%,
				100% {
					transform: translateY(0) scale(1);
				}
				30% {
					transform: translateY(-12px) scale(1.03);
				}
				60% {
					transform: translateY(-4px) scale(0.99);
				}
			}

			@keyframes cheerfulBounce {
				0%,
				100% {
					transform: translate(-50%, -50%) rotate(0deg) scale(1);
				}
				25% {
					transform: translate(-50%, -54%) rotate(-4deg) scale(1.02);
				}
				75% {
					transform: translate(-50%, -47%) rotate(4deg) scale(0.98);
				}
			}

			.talking .mouth {
				animation: talking 0.32s ease-in-out infinite;
			}

			.blink .eye::after {
				animation: blink 0.16s ease forwards;
			}

			.happy .mouth {
				height: 58px;
				border-radius: 0 0 84px 84px;
				transform: translateY(0) scale(0.92);
			}

			.happy .cheeks {
				opacity: 1;
			}

			.happy .cheek {
				transform: scale(1);
			}

			.happy.talking .mouth {
				animation: softTalking 0.36s ease-in-out infinite;
			}

			.sad .mouth {
				transform: rotate(180deg) translateY(-18px) scale(0.8);
				width: 60px;
				height: 30px;
			}

			.sad .eyebrows {
				opacity: 1;
			}

			.sad .eyebrow {
				transform: rotate(-15deg) translateY(5px);
				opacity: 1;
			}

			.sad .eyebrow:last-child {
				transform: rotate(15deg) translateY(5px);
			}

			.surprised .mouth {
				height: 80px;
				width: 60px;
				border-radius: 50%;
				transform: translateY(6px);
			}

			.surprised .eye {
				height: 45px;
				width: 45px;
				transform: translateY(-5px);
			}

			.surprised .eyebrows {
				opacity: 1;
			}

			.surprised .eyebrow {
				transform: translateY(-5px);
				opacity: 1;
			}

			.angry .eyebrows {
				opacity: 1;
			}

			.angry .eyebrow {
				transform: rotate(30deg) translateY(-2px);
				opacity: 1;
			}

			.angry .eyebrow:last-child {
				transform: rotate(-30deg) translateY(-2px);
			}

			.angry .mouth {
				width: 60px;
				height: 20px;
				transform: rotate(-10deg) translateY(10px);
				border-radius: 0 0 20px 20px;
			}

			.angry .eye::before {
				width: 8px;
				height: 8px;
				top: 12px;
				left: 12px;
			}

			.thinking .eye {
				height: 14px;
				border-radius: 10px;
				transform: translateY(4px);
			}

			.thinking .mouth {
				width: 40px;
				height: 12px;
				border-radius: 8px;
				transform: rotate(-10deg) translate(20px, 10px);
			}

			.thinking .eyebrows {
				opacity: 1;
			}

			.thinking .eyebrow:last-child {
				transform: rotate(-15deg) translateY(-2px);
				opacity: 1;
			}

			.listening .face {
				animation: attentiveTilt 1.8s ease-in-out infinite;
			}

			.listening .eye {
				width: 30px;
				height: 40px;
				transform: translateY(-1px);
			}

			.listening .eyebrows {
				opacity: 1;
			}

			.listening .eyebrow {
				transform: rotate(10deg) translateY(-6px);
				opacity: 1;
			}

			.listening .eyebrow:last-child {
				transform: rotate(-10deg) translateY(-6px);
			}

			.listening .mouth {
				width: 52px;
				height: 18px;
				border-radius: 0 0 20px 20px;
				transform: translateY(12px) scale(0.94);
			}

			.confused .eyebrows {
				opacity: 1;
			}

			.confused .eyebrow:first-child {
				transform: rotate(-18deg) translate(-3px, -8px);
				opacity: 1;
			}

			.confused .eyebrow:last-child {
				transform: rotate(18deg) translate(3px, 6px);
				opacity: 1;
			}

			.confused .eye:first-child {
				transform: scaleY(1.04);
			}

			.confused .eye:last-child {
				transform: scaleY(0.82) translateY(4px);
			}

			.confused .mouth {
				width: 56px;
				height: 18px;
				border-radius: 0 0 18px 18px;
				transform: rotate(-12deg) translate(18px, 10px);
			}

			.worried .face {
				animation: nervousWobble 1.5s ease-in-out infinite;
			}

			.worried .eyebrows {
				opacity: 1;
			}

			.worried .eyebrow:first-child {
				transform: rotate(-18deg) translateY(-4px);
				opacity: 1;
			}

			.worried .eyebrow:last-child {
				transform: rotate(18deg) translateY(-4px);
				opacity: 1;
			}

			.worried .eye {
				width: 30px;
				height: 38px;
			}

			.worried .mouth {
				width: 58px;
				height: 18px;
				border-radius: 0 0 22px 22px;
				transform: rotate(180deg) translateY(-12px) scale(0.9);
			}

			.proud .face {
				transform: translate(-50%, -52%);
			}

			.proud .eyebrows {
				opacity: 1;
			}

			.proud .eyebrow {
				transform: translateY(-2px);
				opacity: 1;
			}

			.proud .mouth {
				width: 74px;
				height: 34px;
				transform: translateY(6px) rotate(4deg);
				border-radius: 0 0 52px 52px;
			}

			.proud .cheeks {
				opacity: 0.85;
			}

			.proud .cheek {
				transform: scale(0.82);
				background: rgba(255, 172, 184, 0.72);
			}

			.wink .eye:first-child {
				height: 5px;
				margin-top: 15px;
				border-radius: 5px;
			}

			.puppet.excited,
			.puppet.celebrating {
				animation: celebrateBob 0.68s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
			}

			.excited .face {
				animation: cheerfulBounce 0.55s ease-in-out infinite;
			}

			.celebrating .face {
				animation: cheerfulBounce 0.45s ease-in-out infinite;
			}

			.excited .cheeks {
				opacity: 1;
			}

			.excited .cheek {
				transform: scale(1.2);
				background: rgba(255, 117, 145, 0.82);
			}

			.celebrating .cheeks {
				opacity: 1;
			}

			.celebrating .cheek {
				transform: scale(1.3);
				background: rgba(255, 117, 145, 0.88);
			}

			.sleepy .eye {
				height: 8px;
				border-radius: 4px;
				transform: translateY(12px);
			}

			.sleepy .mouth {
				height: 25px;
				width: 40px;
				transform: translateY(10px);
			}

			.shadow {
				position: absolute;
				bottom: -15px;
				left: 50%;
				transform: translateX(-50%);
				width: 90%;
				height: 20px;
				background: var(--puppet-shadow);
				border-radius: 50%;
				transition: all 0.3s ease;
				filter: blur(5px);
				animation: shadowFloat 4.6s ease-in-out infinite;
			}

			.excited .shadow {
				width: 84%;
				opacity: 0.2;
				transform: translateX(-50%) scaleX(0.88);
			}

			.celebrating .shadow {
				width: 82%;
				opacity: 0.18;
				transform: translateX(-50%) scaleX(0.84);
			}

			[data-theme="dark"] {
				--puppet-primary: #eef4ff;
				--puppet-bg: #34415e;
				--puppet-bg-deep: #1d263a;
				--puppet-accent: #ffb0c2;
				--puppet-highlight: #ffffff;
				--puppet-shadow: rgba(0, 0, 0, 0.4);
				--puppet-outline: rgba(255, 255, 255, 0.08);
				--puppet-mouth: #f0f5ff;
				--puppet-blush: rgba(255, 138, 177, 0.38);
			}

			.puppet * {
				transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
			}

			.desktop-capturer-selection {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100vh;
				background: rgba(30, 30, 30, 0.75);
				color: #fff;
				z-index: 10000000;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.desktop-capturer-selection__scroller {
				width: 100%;
				max-height: 100vh;
				overflow-y: auto;
			}
			.desktop-capturer-selection__list {
				max-width: calc(100% - 100px);
				margin: 50px;
				padding: 0;
				display: flex;
				flex-wrap: wrap;
				list-style: none;
				overflow: hidden;
				justify-content: center;
			}
			.desktop-capturer-selection__item {
				display: flex;
				margin: 4px;
			}
			.desktop-capturer-selection__btn {
				display: flex;
				flex-direction: column;
				align-items: stretch;
				width: 145px;
				margin: 0;
				border: 0;
				border-radius: 3px;
				padding: 4px;
				background: #252626;
				text-align: left;
				transition:
					background-color 0.15s,
					box-shadow 0.15s;
			}
			.desktop-capturer-selection__btn:hover,
			.desktop-capturer-selection__btn:focus {
				background: rgba(98, 100, 167, 0.8);
			}
			.desktop-capturer-selection__thumbnail {
				width: 100%;
				height: 81px;
				object-fit: cover;
			}
			.desktop-capturer-selection__name {
				margin: 6px 0 6px;
				white-space: nowrap;
				text-overflow: ellipsis;
				overflow: hidden;
			}
			#apiKey {
				-webkit-text-security: disc;
			}

			.visually-hidden {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			@media (max-width: 900px) {
				body {
					flex-direction: column;
					height: auto;
					min-height: 100vh;
					padding: 12px;
				}
				.left-panel {
					width: 100%;
					min-width: 0;
					padding-right: 0;
					overflow-y: visible;
				}
				.right-panel {
					height: 60vh;
					min-height: 360px;
					margin-top: 16px;
				}
				#puppet-container .puppet {
					width: 200px;
					height: 200px;
				}
			}

			@media (max-width: 500px) {
				body {
					padding: 8px;
				}
				.control-row {
					grid-template-columns: 1fr;
				}
				.message {
					max-width: 92%;
				}
				#sendButton {
					padding: 0 16px;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.puppet,
				.puppet *,
				.face,
				.shadow,
				.mouth {
					animation: none !important;
					transition: none !important;
				}
			}
		</style>
	</head>

		<script>
			class PuppetAvatar {
				constructor(containerSelector) {
					this.container = document.querySelector(containerSelector);
					this.container.style.position = "fixed";
					this.currentEmotion = "happy";
					this.baseEmotion = "happy";
					this.isTalking = false;
					this.BLINK_INTERVAL = 3400;
					this.BLINK_DURATION = 160;
					this.SLOW_BLINK_MULTIPLIER = 2.25;
					this.isDragging = false;
					this.dragOffset = { x: 0, y: 0 };
					this.dragScale = 0.5;
					this.blinkInterval = null;
					this.reactionTimeout = null;
					this.talkingTimeout = null;
					this.supportedEmotions = new Set(["happy", "sad", "surprised", "angry", "thinking", "wink", "excited", "sleepy", "listening", "confused", "worried", "proud", "celebrating"]);
					this.initializePuppet();
					this.startBlinking();
					this.initializeDragging();
				}
				initializePuppet() {
					this.container.innerHTML = `
            <div class="puppet">
                <div class="face">
                    <div class="eyebrows">
                        <div class="eyebrow"></div>
                        <div class="eyebrow"></div>
                    </div>
                    <div class="eyes">
                        <div class="eye"></div>

					const uri = this.config.buildWsUrl ? this.config.buildWsUrl(this.model) : this.config.wsUrl;
					if (this.isConnected()) {
						console.log("Already connected");
						return;
					}
					updateDiagnostics({
						provider: this.config.label,
						model: this.model || "server default",
						state: "connecting",
						connected: "no",
						lastEvent: "connect.start",
						lastError: "-"
					});
					try {
						this.ws = new WebSocket(uri, this.config.protocols(this.apiKey));
						return new Promise((resolve, reject) => {
							const timeout = setTimeout(() => {
								updateDiagnostics({
									state: "error",
									connected: "no",
									lastEvent: "connect.timeout",
									lastError: "Connection timed out"
								});
								reject(new Error("Connection timed out"));
								this.ws = null;
							}, 10000);
							this.ws.onmessage = this.handleMessage;
							this.ws.onopen = () => {
								console.log("Realtime websocket connected successfully");
								clearTimeout(timeout);
								const systemPrompt = document.getElementById("systemPrompt");
								const responseTypeValue = document.getElementById("responseType").value;
								const modalities = responseTypeValue === "audio" ? ["text", "audio"] : ["text"];
								const setupMessage =
									this.provider === "chatgpt"
										? {
												type: "session.update",
												session: {
													instructions: systemPrompt.value,
													output_modalities: modalities
												}
											}
										: {
												type: "session.update",
												session: {
													instructions: systemPrompt.value,
													modalities,
													...(this.model ? { model: this.model } : {})
												}
											};
								this.ws.send(JSON.stringify(setupMessage));
								updateDiagnostics({
									state: "connected",
									connected: "yes",
									lastEvent: "ws.open"
								});
								resetVoiceTelemetry({
									inputMode: "Browser STT -> text prompt",
									outputState: responseTypeValue === "audio" ? "Provider audio ready" : "Text response only"
								});
								resolve();
							};
							this.ws.onerror = error => {
								console.error("Realtime websocket error:", error);
								clearTimeout(timeout);
								this.ws = null;
								updateDiagnostics({
									state: "error",
									connected: "no",
									lastEvent: "ws.error",
									lastError: "Realtime websocket error"
								});
								reject(new Error("Connection error occurred"));
							};
							this.ws.onclose = event => {
								console.log("Realtime websocket closed:", event.code, event.reason);
								clearTimeout(timeout);
								this.ws = null;
								updateDiagnostics({
									state: this.stopped ? "stopped" : "disconnected",
									connected: "no",
									lastEvent: `ws.close:${event.code}`,
									...(event.reason ? { lastError: event.reason } : {})
								});
								if (!this.stopped) {
									reject(new Error(`Connection closed: ${event.code}`));
								}
							};
						});
					} catch (error) {
						console.error("Failed to create realtime websocket:", error);
						this.ws = null;
						updateDiagnostics({
							state: "error",
							connected: "no",
							lastEvent: "connect.exception",
							lastError: error.message || "Failed to create realtime websocket"
						});
						throw error;
					}
				}
				handleConnectionFailure() {

					startButton.textContent = "Start Stream";
					startButton.dataset.started = "false";

					sendButton.disabled = true;
					sendButton.title = "You must Start the Stream before you can interact with the AI";
					resetSendButton();

				}
				async setupSpeechRecognition() {
					const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
					if (!SpeechRecognition) {

						showError("Speech recognition is not supported in your browser. Try using Chrome.");
						return;
					}
					this.recognition = new SpeechRecognition();

						}

					try {

							this.recognition.start();
						} else {

						}
					} catch (err) {
						console.error("Failed to start speech recognition:", err);
						showError("Failed to start speech recognition: " + err.message);
					}
				}
				restartRecognition() {

				async start() {

						updateDiagnostics({

				stop() {

						connected: "no",
						lastEvent: "publisher.stop"

				}

					// Clear existing messages

					responsesDiv.innerHTML = "";

				addAssistantMessage(text) {

				checkAndTruncateHistory() {

					// Count tokens in the conversation
					this.conversationHistory.forEach(msg => {

					console.log(`Current conversation size: ${totalTokens} tokens`);

				truncateConversation() {
					// Keep the first two messages (usually system prompt and greeting)

					const introCount = 2;

					if (this.conversationHistory.length <= introCount + recentCount) {
						return; // Not enough messages to truncate
					}

					// Keep introduction and recent messages
					const introMessages = this.conversationHistory.slice(0, introCount);
					const recentMessages = this.conversationHistory.slice(-recentCount);

					this.conversationHistory = [...introMessages, summaryMessage, ...recentMessages];

				async handleMessage(event) {

						} else if (typeof event.data === "string") {
							rawText = event.data;

							this.lastHeartbeatResponse = Date.now();
							this.lastActivityTime = Date.now();

						}

						// Always update activity timestamps, even before JSON parsing
						this.lastHeartbeatResponse = Date.now();
						this.lastActivityTime = Date.now();

						// Try to parse as JSON, but don't fail if it's not valid JSON
						try {
							response = JSON.parse(rawText);
						} catch (jsonError) {
							// Log but don't show error for parsing issues
							console.warn("Received non-JSON message or invalid JSON:", rawText.substring(0, 100) + (rawText.length > 100 ? "..." : ""));

			function runCohostTts(text, provider) {
				const selectedProvider = provider || "system";
				applyCohostTtsProvider(selectedProvider);
				if (!window.TTS || typeof window.TTS.speak !== "function") {
					return Promise.resolve(false);
				}
				const originalFinishedAudio = window.TTS.finishedAudio;
				const originalConsoleError = console.error;
				return new Promise(resolve => {
					let settled = false;
					let sawError = false;
					let fallbackTimer = null;
					const cleanup = () => {
						window.TTS.finishedAudio = originalFinishedAudio;
						console.error = originalConsoleError;
						if (fallbackTimer) clearTimeout(fallbackTimer);
					};
					const done = ok => {
						if (settled) return;
						settled = true;
						cleanup();
						resolve(ok);
					};
					console.error = function patchedCohostTtsError() {
						const message = Array.prototype.map.call(arguments, arg => String(arg && arg.message ? arg.message : arg)).join(" ");
						if (/TTS|speech|audio|kokoro|piper|espeak|kitten/i.test(message)) {
							sawError = true;
						}
						return originalConsoleError.apply(console, arguments);
					};
					window.TTS.finishedAudio = function patchedCohostFinishedAudio(event) {
						try {
							originalFinishedAudio.call(window.TTS, event);
						} finally {
							done(!sawError);
						}
					};
					try {
						window.TTS.speak(text, true);
					} catch (error) {
						originalConsoleError("TTS error:", error);
						sawError = true;
						done(false);
						return;
					}
					if (selectedProvider === "system") {
						fallbackTimer = setTimeout(() => done(!sawError), Math.min(180000, Math.max(12000, String(text || "").length * 140)));
					} else {
						fallbackTimer = setTimeout(() => done(false), Math.min(180000, Math.max(20000, String(text || "").length * 180)));
					}
				});
			}

			function normalizeCustomEndpoint(value) {
				const raw = (value || "").trim();

			function isHttpMixedContentBlocked(urlText) {
				try {
					const parsed = new URL(urlText);
					if (window.location.protocol !== "https:") return false;
					if (parsed.protocol !== "http:") return false;
					const host = parsed.hostname.toLowerCase();
					return !(host === "localhost" || host === "127.0.0.1" || host === "::1");
				} catch (_error) {
					return false;
				}
			}

			function resolveOpenAICompatibleBase(endpoint) {
				const normalized = normalizeCustomEndpoint(endpoint);
				const parsed = new URL(normalized);
				if (/\/v1\/chat\/completions\/?$/i.test(parsed.pathname)) {
					parsed.pathname = parsed.pathname.replace(/\/chat\/completions\/?$/i, "");
				} else if (/\/chat\/completions\/?$/i.test(parsed.pathname)) {
					parsed.pathname = parsed.pathname.replace(/\/chat\/completions\/?$/i, "");
				}
				if (!/\/v1$/i.test(parsed.pathname)) {
					parsed.pathname = `${parsed.pathname.replace(/\/+$/, "")}/v1`;
				}
				parsed.search = "";
				parsed.hash = "";
				return parsed.toString().replace(/\/+$/, "");
			}

				}
				if (providerSelect.value !== "customopenai") return;
				const endpoint = getEffectiveCustomEndpoint("customopenai");
				const hasStoredEndpoint = !!getStoredCustomEndpoint("customopenai");
				const usingUntouchedDefaultEndpoint = !hasStoredEndpoint && normalizeCustomEndpoint(customEndpointInput.value || "") === CUSTOM_OPENAI_DEFAULT_ENDPOINT;
				if (usingUntouchedDefaultEndpoint) {
					customModelList = [];
					updateCustomModelSelect(getEffectiveModelForProvider("customopenai"));
					setCustomEndpointInfo("Set your OpenAI-compatible endpoint, then refresh models or press Enter.", false);
					return;
				}
				if (isHttpMixedContentBlocked(endpoint)) {
					setCustomEndpointInfo("HTTPS page cannot call HTTP LAN endpoint. Use HTTPS endpoint or host this page over HTTP on LAN.", true);
					customModelList = [];
					updateCustomModelSelect("");
					return;
				}
				customModelsLoading = true;
				customModelsRefreshButton.disabled = true;
				setCustomEndpointInfo(`Loading models from ${resolveOpenAICompatibleBase(endpoint)}/models ...`, false);
				try {
					const headers = {};
					const token = (apiKeyInput.value || "").trim();
					if (token) {
						headers.Authorization = `Bearer ${token}`;
					}
					const response = await fetch(`${resolveOpenAICompatibleBase(endpoint)}/models`, {
						method: "GET",
						headers
					});
					if (!response.ok) {
						const body = await response.text();
						throw new Error(`Model list error ${response.status}: ${body.slice(0, 200)}`);
					}
					const payload = await response.json();
					const dataModels = Array.isArray(payload?.data) ? payload.data.map(item => item?.id).filter(Boolean) : [];
					const legacyModels = Array.isArray(payload?.models) ? payload.models.map(item => item?.id || item?.model || item?.name).filter(Boolean) : [];
					const models = [...dataModels, ...legacyModels];
					customModelList = [...new Set(models)].sort();
					const effectiveModel = getEffectiveModelForProvider("customopenai");
					let selectedModel = effectiveModel;
					if (customModelList.length === 1 && !effectiveModel) {
						selectedModel = customModelList[0];
						modelOverrideInput.value = selectedModel;
						saveModelOverride("customopenai", selectedModel);
					} else if (effectiveModel && !customModelList.includes(effectiveModel) && customModelList.length) {

						saveModelOverride("customopenai", selectedModel);

						model: selectedModel || "server default",
						state: publisher && publisher.isConnected && publisher.isConnected() ? "connected" : publisher ? "starting" : "idle",

						lastEvent: "custom.models.loaded",
						lastError: "-"
					});
					setCustomEndpointInfo(customModelList.length ? `Loaded ${customModelList.length} model(s) from endpoint` : "No models returned by endpoint");
				} catch (error) {
					const rawMessage = error?.message || "";
					const looksLikeNetworkOrCors = rawMessage === "Failed to fetch" || /NetworkError|CORS/i.test(rawMessage);
					const friendlyMessage = looksLikeNetworkOrCors ? "Failed to reach endpoint. Check URL, server availability, CORS (Access-Control-Allow-Origin), and HTTP/HTTPS mixed-content restrictions." : rawMessage || "Failed to load models from endpoint";
					customModelList = [];
					updateCustomModelSelect("");
					setCustomEndpointInfo(friendlyMessage, true);
					if (showErrors) {
						showError(friendlyMessage);
					}
				} finally {
					customModelsLoading = false;
					customModelsRefreshButton.disabled = false;
					if (customModelsQueuedRefresh && providerSelect.value === "customopenai") {
						customModelsQueuedRefresh = false;
						setTimeout(() => {
							refreshCustomModelList(showErrors).catch(() => {});
						}, 0);
					}

				const videoSourceValue = document.getElementById("videoSource")?.value || "none";
				if (videoSourceValue === "none") {
					return "";

				const maxWidth = 640;
				const scale = Math.min(1, maxWidth / preview.videoWidth);
				const width = Math.max(1, Math.floor(preview.videoWidth * scale));
				const height = Math.max(1, Math.floor(preview.videoHeight * scale));
				const canvas = document.createElement("canvas");

				canvas.height = height;
				const ctx = canvas.getContext("2d");

			function createPublisherForProvider(providerName, activeStream, apiKey) {

				if (providerName === "localqwen" || providerName === "localgemma") {
					return new LocalBrowserPublisher(activeStream, providerName, effectiveModel);

					<div id="alsoCaptureAudioParent1" style="text-align: center;margin: auto 5px;font-size: 120%;"><i class="las la-music" style="font-size:40px;"></i><br />Include Desktop Audio<br /><input id="alsoCaptureAudio" style="width:20px;height:20px;margin-top: 10px;" type="checkbox" checked></div>
					<div id="alsoCaptureAudioParent2" style="text-align: center;margin: auto 5px;font-size: 120%;display:none;"><i class="las la-music" style="font-size:40px;"></i><br />Audio capture not <br />supported on macOS</div>
					<button id="captureDesktopAudio" class="desktop-capturer-click" style="margin: 10px;"><i class="las la-music" style="font-size:40px;"></i><br />Capture ONLY<br />Desktop Audio</button>
					<button id="cancelscreenshare" style="margin: 10px; background-color: #7c1414; width: 100px;"><i class="las la-window-close" style="font-size:40px;"></i><br />Cancel</button>
				  </ul>
				</div>
			  `;
							document.body.appendChild(selectionElem);
							const isMac = navigator.platform.toLowerCase().includes("mac");
							if (isMac) {
								try {
									document.getElementById("captureDesktopAudio").style.display = "none";
									document.getElementById("alsoCaptureAudio").checked = false;
									document.getElementById("alsoCaptureAudioParent1").style.display = "none";
									document.getElementById("alsoCaptureAudioParent2").style.display = "inline-block";
								} catch (e) {}
							}
							document.getElementById("cancelscreenshare").addEventListener("click", async () => {
								selectionElem.remove();
								reject(null);
							});
							document.querySelectorAll(".desktop-capturer-click").forEach(button => {
								button.addEventListener("click", async () => {
									try {
										if (button.id == "captureDesktopAudio") {
											var new_constraints = {
												audio: {
													mandatory: {
														chromeMediaSource: "desktop"
													}
												},
												video: {
													mandatory: {
														chromeMediaSource: "desktop"
													}
												}
											};
											new_constraints.video.mandatory.maxFrameRate = 1;
											const stream = await window.navigator.mediaDevices.getUserMedia(new_constraints);
											if (stream.getVideoTracks().length) {
												var track = stream.getVideoTracks()[0];
												stream.removeTrack(stream.getVideoTracks()[0]);
												track.stop();
											}
											resolve(stream);
											selectionElem.remove();
										} else {
											var audioStream = false;
											if (document.getElementById("alsoCaptureAudio") && document.getElementById("alsoCaptureAudio").checked) {
												var new_constraints = {
													audio: {
														mandatory: {
															chromeMediaSource: "desktop"
														}
													},
													video: {
														mandatory: {
															chromeMediaSource: "desktop"
														}
													}
												};
												new_constraints.video.mandatory.maxFrameRate = 1;
												audioStream = await window.navigator.mediaDevices.getUserMedia(new_constraints);
												if (audioStream.getVideoTracks().length) {
													var track = audioStream.getVideoTracks()[0];
													audioStream.removeTrack(audioStream.getVideoTracks()[0]);
													track.stop();
												}
											}
											const id = button.getAttribute("data-id");
											const source = sources.find(source => source.id === id);
											if (!source) {
												throw new Error(`Source with id ${id} does not exist`);
											}
											var new_constraints = {
												audio: false,
												video: {
													mandatory: {
														chromeMediaSource: "desktop",
														chromeMediaSourceId: source.id
													}
												}
											};
											try {
												if (constraints.video.width.ideal) {
													new_constraints.video.mandatory.maxWidth = constraints.video.width.ideal;
												}
											} catch (e) {}
											try {
												if (constraints.video.height.ideal) {
													new_constraints.video.mandatory.maxHeight = constraints.video.height.ideal;
												}
											} catch (e) {}
											try {
												if (constraints.video.frameRate.ideal) {
													new_constraints.video.mandatory.maxFrameRate = constraints.video.frameRate.ideal;
												}
											} catch (e) {}
											const stream = await window.navigator.mediaDevices.getUserMedia(new_constraints);
											if (audioStream && audioStream.getAudioTracks().length) {
												stream.addTrack(audioStream.getAudioTracks()[0]);
											}
											resolve(stream);
											selectionElem.remove();
										}
									} catch (err) {
										console.error("Error selecting desktop capture source:", err);
										reject(err);
									}
								});
							});
						} catch (err) {
							console.error("Error displaying desktop capture sources:", err);
							reject(err);
						}
					});
				};
				ElectronDesktopCapture = true;
			} catch (e) {
				if (window.process?.versions?.electron) {
					console.warn("Couldn't load electron's screen capture. Elevate the app's permission to allow it (right-click?)");
				}
			}
			function setupConnectionMonitoring() {
				let monitoringActive = false;
				let monitoringInterval = null;
				function startMonitoring() {
					if (monitoringActive) return;
					monitoringActive = true;
					if (monitoringInterval) {
						clearInterval(monitoringInterval);
					}
					monitoringInterval = setInterval(() => {
						if (startButton.dataset.started !== "true" || !publisher) return;
						if (!publisher.isConnected()) {
							console.log("Stream should be active but connection is closed, attempting to reconnect");
							if (publisher.reconnectAttempts < publisher.maxReconnectAttempts) {
								publisher.reconnect().catch(err => {
									console.error("Failed automatic reconnection:", err);
								});
							} else {
								console.log("Max reconnection attempts reached, notifying user");
								showError("Connection lost. Please try restarting the stream manually.");
							}
						}
						if (stream) {
							const allTracks = [...stream.getAudioTracks(), ...stream.getVideoTracks()];
							const anyTrackEnded = allTracks.some(track => !track.readyState || track.readyState === "ended");
							if (anyTrackEnded) {
								console.warn("One or more media tracks have ended unexpectedly");
								if (publisher && !publisher.reconnectTimeout && !publisher._reconnectPromise) {
									updateMediaStream().catch(err => {
										console.error("Failed to recover media stream:", err);
									});
								}
							}
						}
					}, 15000);
				}
				function stopMonitoring() {
					if (monitoringInterval) {
						clearInterval(monitoringInterval);
						monitoringInterval = null;
					}
					monitoringActive = false;
				}
				window.addEventListener("online", () => {
					console.log("Network connection restored");
					if (publisher && !publisher.isConnected() && startButton.dataset.started === "true") {
						console.log("Attempting to reconnect after network restoration");
						showError("Network connection restored. Reconnecting...");
						publisher.reconnect().catch(err => {
							console.error("Failed to reconnect after network restoration:", err);
						});
					}
				});
				window.addEventListener("offline", () => {
					console.log("Network connection lost");
					showError("Network connection lost. Waiting for connection to restore...");
				});
				document.addEventListener("visibilitychange", () => {
					if (document.visibilityState === "visible") {
						console.log("Tab became visible");
						if (publisher && startButton.dataset.started === "true") {
							const lastActivity = Date.now() - (publisher.lastActivityTime || 0);
							if (lastActivity > 10000) {
								console.log("Long inactivity detected after tab became visible, reconnecting");
								publisher.reconnect().catch(err => {
									console.error("Failed to reconnect after tab became visible:", err);
								});
							}
						}
					}
				});
				startButton.addEventListener("click", () => {
					if (startButton.dataset.started === "true") {
						startMonitoring();
					} else {
						stopMonitoring();
					}
				});
				if (startButton.dataset.started === "true") {
					startMonitoring();
				}
				return {
					start: startMonitoring,
					stop: stopMonitoring
				};
			}

			function addClearHistoryButton() {
				// Check if button already exists
				if (document.querySelector("#clearHistoryButton")) {
					return;
				}

				const clearButton = document.createElement("button");
				clearButton.id = "clearHistoryButton";
				clearButton.textContent = "Clear Chat History";
				clearButton.style.marginLeft = "10px";
				clearButton.style.background = "#6c1c1c";

				let clearConfirmPending = false;
				clearButton.addEventListener("click", () => {
					if (!clearConfirmPending) {
						clearConfirmPending = true;
						clearButton.textContent = "Click Again to Confirm";
						clearButton.style.background = "#ef4444";
						setTimeout(() => {
							clearConfirmPending = false;
							clearButton.textContent = "Clear Chat History";
							clearButton.style.background = "#6c1c1c";
						}, 3000);
						return;
					}
					clearConfirmPending = false;
					clearButton.textContent = "Clear Chat History";
					clearButton.style.background = "#6c1c1c";
					if (publisher && typeof publisher.clearConversationHistory === "function") {
						publisher.clearConversationHistory();
					} else {
						localStorage.removeItem("conversationHistory");
						document.getElementById("responses").innerHTML = "";
					}
				});

				// Add to your controls
				const controlsDiv = document.querySelector(".controls");
				if (controlsDiv) {
					controlsDiv.appendChild(clearButton);
				}
			}
			document.addEventListener("DOMContentLoaded", () => {
				applyCohostTtsProvider(getStoredCohostTtsProvider());
				addClearHistoryButton();
			});

			const connectionMonitor = setupConnectionMonitoring();
		</script>

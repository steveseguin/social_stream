<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actions Overlay - Social Stream Ninja</title>
    <script src="thirdparty/obs-websocket.min.js"></script>
    <script type="text/javascript" src="tts.js"></script>
    <style>
		body, html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background-color: transparent; /* Already set to transparent */
			display: flex;
			justify-content: center;
			align-items: center;
			font-family: Arial, sans-serif;
		}

        .fullscreen-media-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Optional: dim background */
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
		
		#status-message {
			color: rgba(204, 204, 204, 0.5); /* Make semi-transparent */
			font-size: 18px;
			background-color: transparent;
		}

		#obs-status-badge {
			position: fixed;
			right: 16px;
			bottom: 16px;
			max-width: min(360px, calc(100vw - 32px));
			padding: 12px 14px;
			border-radius: 12px;
			font-size: 13px;
			line-height: 1.45;
			color: #f5f8ff;
			background: rgba(11, 18, 32, 0.88);
			border: 1px solid rgba(255, 255, 255, 0.14);
			box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
			backdrop-filter: blur(10px);
			z-index: 10020;
			display: none;
			pointer-events: none;
			white-space: pre-wrap;
		}

		#obs-status-badge[data-state="connected"] {
			border-color: rgba(76, 175, 80, 0.5);
		}

		#obs-status-badge[data-state="connecting"] {
			border-color: rgba(33, 150, 243, 0.5);
		}

		#obs-status-badge[data-state="error"] {
			border-color: rgba(255, 152, 0, 0.55);
		}

		.fullscreen-media-container {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: transparent; /* Changed from rgba(0, 0, 0, 0.8) to transparent */
			display: none; /* Hidden by default */
			justify-content: center;
			align-items: center;
			z-index: 9999;
			overflow: hidden;
		}

		.fullscreen-media-container iframe {
			width: 100%;
			height: 100%;
			border: none;
			overflow: hidden;
			background-color: transparent;
		}

		.fullscreen-media-container img {
			max-width: 95%;
			max-height: 95%;
			border: none;
		}
		
		/* Modal styles */
		.modal {
			display: none;
			position: fixed;
			z-index: 10000;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.5);
			justify-content: center;
			align-items: center;
		}
		
		.modal-content {
			background-color: #fefefe;
			padding: 30px;
			border: 1px solid #888;
			border-radius: 8px;
			width: 90%;
			max-width: 400px;
			text-align: center;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
		}
		
		.modal-content h2 {
			margin-top: 0;
			margin-bottom: 20px;
			color: #333;
		}
		
		.modal-content input[type="text"] {
			width: 100%;
			padding: 10px;
			margin: 10px 0;
			border: 1px solid #ddd;
			border-radius: 4px;
			font-size: 16px;
			box-sizing: border-box;
		}
		
		.modal-content button {
			background-color: #4CAF50;
			color: white;
			padding: 12px 24px;
			margin: 10px 5px;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-size: 16px;
			transition: background-color 0.3s;
		}
		
		.modal-content button:hover {
			background-color: #45a049;
		}
		
		.modal-content button.cancel {
			background-color: #f44336;
		}
		
		.modal-content button.cancel:hover {
			background-color: #da190b;
		}
		
		.modal-content p {
			color: #666;
			margin: 10px 0;
		}

		/* Multi-layer overlay system */
		.overlay-layers {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 9998;
		}

		.overlay-layer {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
		}

		#layer-avatar { z-index: 100; }
		#layer-media { z-index: 200; }
		#layer-text { z-index: 300; }

		/* Avatar styles */
		.overlay-avatar {
			position: absolute;
			overflow: hidden;
			pointer-events: none;
		}

		.overlay-avatar img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		/* Text overlay styles */
		.overlay-text {
			position: absolute;
			pointer-events: none;
			white-space: pre-wrap;
			word-wrap: break-word;
		}

		/* Animation keyframes */
		@keyframes overlayFadeIn {
			from { opacity: 0; }
			to { opacity: 1; }
		}

		@keyframes overlayFadeOut {
			from { opacity: 1; }
			to { opacity: 0; }
		}

		@keyframes overlaySlideInLeft {
			from { transform: translate(-50%, -50%) translateX(-100vw); opacity: 0; }
			to { transform: translate(-50%, -50%) translateX(0); opacity: 1; }
		}

		@keyframes overlaySlideInRight {
			from { transform: translate(-50%, -50%) translateX(100vw); opacity: 0; }
			to { transform: translate(-50%, -50%) translateX(0); opacity: 1; }
		}

		@keyframes overlaySlideInTop {
			from { transform: translate(-50%, -50%) translateY(-100vh); opacity: 0; }
			to { transform: translate(-50%, -50%) translateY(0); opacity: 1; }
		}

		@keyframes overlaySlideInBottom {
			from { transform: translate(-50%, -50%) translateY(100vh); opacity: 0; }
			to { transform: translate(-50%, -50%) translateY(0); opacity: 1; }
		}

		@keyframes overlayBounce {
			0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
			50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
			70% { transform: translate(-50%, -50%) scale(0.9); }
			100% { transform: translate(-50%, -50%) scale(1); }
		}

		@keyframes overlayPulse {
			0%, 100% { transform: translate(-50%, -50%) scale(1); }
			50% { transform: translate(-50%, -50%) scale(1.05); }
		}

		@keyframes overlayShake {
			0%, 100% { transform: translate(-50%, -50%) translateX(0); }
			25% { transform: translate(-50%, -50%) translateX(-5px); }
			75% { transform: translate(-50%, -50%) translateX(5px); }
		}
    </style>
</head>
<body>
    <div id="status-message"></div>
    <div id="obs-status-badge" aria-live="polite"></div>
    <div id="fullscreen-media-container" class="fullscreen-media-container"></div>

    <!-- Multi-layer overlay system -->
    <div id="overlay-layers" class="overlay-layers">
        <div id="layer-avatar" class="overlay-layer" data-layer="avatar"></div>
        <div id="layer-media" class="overlay-layer" data-layer="media"></div>
        <div id="layer-text" class="overlay-layer" data-layer="text"></div>
    </div>

    <!-- Session ID Modal -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <h2>Session ID Required</h2>
            <p>Please enter your session ID to continue:</p>
            <input type="text" id="sessionIdInput" placeholder="Enter session ID" autofocus>
            <div>
                <button onclick="submitSessionId()">Submit</button>
                <button class="cancel" onclick="cancelSessionId()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        window.onerror = function backupErr(errorMsg, url=false, lineNumber=false) {
            console.error(errorMsg);
            console.error(lineNumber);
            console.error("Unhandled Error occurred");
            return false;
        };

        function getById(id) {
            var el = document.getElementById(id);
            if (!el) {
                el = document.createElement("span");
            }
            return el;
        }

        (function (w) {
            w.URLSearchParams = w.URLSearchParams || function (searchString) {
                var self = this;
                self.searchString = searchString;
                self.get = function (name) {
                    var results = new RegExp('[\\?&]' + name + '=([^&#]*)').exec(self.searchString);
                    if (results == null) {
                        return null;
                    } else {
                        return decodeURI(results[1]) || 0;
                    }
                };
            };
        })(window);

        var urlParams = new URLSearchParams(window.location.search);
        var iframe = null;
        var roomID = "test";
        var password = "false";
        var globalVolume = urlParams.has("volume") ? Math.max(0, Math.min(1, parseFloat(urlParams.get("volume")))) : 1.0;
        if (isNaN(globalVolume)) { globalVolume = 1.0; }
        var defaultDuration = urlParams.has("duration") ? Math.max(1000, parseInt(urlParams.get("duration"))) : 10000;
        if (isNaN(defaultDuration)) { defaultDuration = 10000; }
        var mediaContainer = document.getElementById('fullscreen-media-container');
        var statusMessage = document.getElementById('status-message');
        var obsStudio = null;
        var obsWebSocket = null;
        var obsWebSocketConnecting = null;
        var obsStatusEnabled = urlParams.get('obsstatus') === '1' || urlParams.get('obsdebug') === '1';
        var obsStatusBadge = document.getElementById('obs-status-badge');
        var obsWebSocketState = {
            url: null,
            passwordProvided: false,
            obsVersion: null,
            obsWebSocketVersion: null,
            rpcVersion: null,
            lastError: null,
            state: 'idle'
        };
        var audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Multi-layer overlay system references
        var overlayLayers = {
            avatar: document.getElementById('layer-avatar'),
            media: document.getElementById('layer-media'),
            text: document.getElementById('layer-text')
        };

        // Clear a specific layer or all layers
        function clearOverlayLayer(layerName) {
            if (layerName === 'all') {
                Object.values(overlayLayers).forEach(layer => {
                    if (layer) layer.innerHTML = '';
                });
            } else if (overlayLayers[layerName]) {
                overlayLayers[layerName].innerHTML = '';
            }
        }

        // Show avatar on overlay layer
        function showOverlayAvatar(config, messageData = {}) {
            var layer = overlayLayers.avatar;
            if (!layer) return;

            if (config.clearFirst) {
                layer.innerHTML = '';
            }

            // Determine avatar URL - use config override or message chatimg
            var avatarUrl = config.avatarUrl || messageData.chatimg || '';
            if (!avatarUrl) {
                console.warn('[showOverlayAvatar] No avatar URL available');
                return;
            }

            // Calculate position with bounds checking
            var width = Math.max(1, Math.min(100, Number(config.width) || 15));
            var height = Math.max(1, Math.min(100, Number(config.height) || 15));
            var maxX = Math.max(0, 100 - width);
            var maxY = Math.max(0, 100 - height);
            var x = config.randomX ? Math.random() * maxX : Math.max(0, Math.min(maxX, Number(config.x) || 0));
            var y = config.randomY ? Math.random() * maxY : Math.max(0, Math.min(maxY, Number(config.y) || 0));

            // Create avatar wrapper element
            var wrapper = document.createElement('div');
            wrapper.className = 'overlay-avatar';
            wrapper.style.cssText = [
                'left: ' + x + 'vw',
                'top: ' + y + 'vh',
                'width: ' + width + 'vw',
                'height: ' + height + 'vh',
                'border-radius: ' + (config.borderRadius !== undefined ? config.borderRadius : 50) + '%',
                'border: ' + (config.borderWidth || 3) + 'px solid ' + (config.borderColor || '#ffffff'),
                config.shadow !== false ? 'box-shadow: 0 4px 15px rgba(0,0,0,0.5)' : '',
                config.zIndex ? 'z-index: ' + config.zIndex : ''
            ].filter(Boolean).join('; ');

            // Create image element
            var img = document.createElement('img');
            img.src = avatarUrl;
            img.style.borderRadius = (config.borderRadius !== undefined ? config.borderRadius : 50) + '%';
            img.onerror = function() { wrapper.remove(); };

            wrapper.appendChild(img);
            layer.appendChild(wrapper);

            // Auto-remove after duration
            var duration = Number(config.duration);
            if (duration > 0) {
                setTimeout(function() { wrapper.remove(); }, duration);
            }
        }

        // Show text on overlay layer
        function showOverlayText(config, messageData = {}) {
            var layer = overlayLayers.text;
            if (!layer) return;

            if (config.clearFirst) {
                layer.innerHTML = '';
            }

            // Process text with generic placeholder replacement
            // Supports all variables from messageData: {username}, {message}, {source}, {donation},
            // {event}, {membership}, {hasDonation}, {subtitle}, {meta}, etc.
            var text = config.text || '';
            text = text.replace(/\{(\w+)\}/gi, function(match, key) {
                var val = messageData[key.toLowerCase()];
                if (val === undefined || val === null) return '';
                if (typeof val === 'object') {
                    try { return JSON.stringify(val); } catch (e) { return ''; }
                }
                return String(val);
            });

            if (!text) {
                console.warn('[showOverlayText] No text to display');
                return;
            }

            // Calculate position
            var x = Math.max(0, Math.min(100, Number(config.x) || 50));
            var y = Math.max(0, Math.min(100, Number(config.y) || 50));

            // Build text stroke style
            var outlineStyle = config.outlineWidth > 0
                ? '-webkit-text-stroke: ' + config.outlineWidth + 'px ' + (config.outlineColor || '#000') + ';'
                : '';

            // Map animation names to CSS keyframes
            var animationMap = {
                'fadeIn': 'overlayFadeIn',
                'fadeOut': 'overlayFadeOut',
                'slideInLeft': 'overlaySlideInLeft',
                'slideInRight': 'overlaySlideInRight',
                'slideInTop': 'overlaySlideInTop',
                'slideInBottom': 'overlaySlideInBottom',
                'bounce': 'overlayBounce',
                'pulse': 'overlayPulse',
                'shake': 'overlayShake'
            };

            var animationName = animationMap[config.animation] || '';
            var animationStyle = animationName
                ? 'animation: ' + animationName + ' ' + (config.animationDuration || 500) + 'ms ease-out;'
                : '';

            // Create text element
            var textEl = document.createElement('div');
            textEl.className = 'overlay-text';
            textEl.textContent = text;
            textEl.style.cssText = [
                'left: ' + x + 'vw',
                'top: ' + y + 'vh',
                'transform: translate(-50%, -50%)',
                'max-width: ' + (config.width || 80) + 'vw',
                'font-size: ' + (config.fontSize || 48) + 'px',
                'font-family: ' + (config.fontFamily || 'Arial, sans-serif'),
                'font-weight: ' + (config.fontWeight || 'bold'),
                'text-align: ' + (config.textAlign || 'center'),
                'color: ' + (config.color || '#ffffff'),
                'background-color: ' + (config.backgroundColor || 'transparent'),
                'padding: ' + (config.padding || 20) + 'px',
                'border-radius: ' + (config.borderRadius || 10) + 'px',
                outlineStyle,
                animationStyle,
                config.zIndex ? 'z-index: ' + config.zIndex : ''
            ].filter(Boolean).join('; ');

            layer.appendChild(textEl);

            // Auto-remove after duration
            var duration = Number(config.duration);
            if (duration > 0) {
                setTimeout(function() { textEl.remove(); }, duration);
            }
        }

        // Attempt to connect to OBS Studio API if available
        // Note: OBS may inject the API asynchronously, so we check at runtime too
        if (window.obsstudio) {
            obsStudio = window.obsstudio;
            console.log('OBS Studio API found.');
        }

        // Helper to get OBS API - checks lazily since OBS may inject it after page load
        function getObsStudio() {
            if (!obsStudio && window.obsstudio) {
                obsStudio = window.obsstudio;
                console.log('OBS Studio API found (late binding).');
                if (obsStatusEnabled) {
                    updateObsStatusBadge();
                }
            }
            return obsStudio;
        }

        function getObsWebSocketUrl() {
            const wsUrl = urlParams.get('obsws') || urlParams.get('obswebsocket') || '';
            return wsUrl || 'ws://127.0.0.1:4455';
        }

        function getObsWebSocketPassword() {
            return urlParams.get('obspw') || urlParams.get('obspassword') || '';
        }

        function getObsWebSocketCompatibilityHint(wsUrl = getObsWebSocketUrl()) {
            const hints = [];

            if (String(wsUrl).includes(':4444')) {
                hints.push('Port 4444 usually means obs-websocket 4.x. Flow Actions uses the OBS WebSocket v5 API built into OBS 28+ on port 4455.');
            } else {
                hints.push('Flow Actions uses the OBS WebSocket v5 API built into OBS 28+ (default URL: ws://127.0.0.1:4455).');
            }

            if (window.location.protocol === 'https:' && /^ws:\/\//i.test(wsUrl || '')) {
                hints.push('Some external browsers block ws:// from an https:// page. If that happens, run the overlay inside OBS Browser Source or use a secure websocket endpoint.');
            }

            return hints.join(' ');
        }

        function logObsWebSocketUnavailable(actionLabel) {
            const lastError = obsWebSocketState.lastError ? ` Last error: ${obsWebSocketState.lastError}.` : '';
            console.warn(`[OBS] ${actionLabel} requires OBS WebSocket.${lastError} ${getObsWebSocketCompatibilityHint()}`);
        }

        function updateObsStatusBadge() {
            if (!obsStatusEnabled || !obsStatusBadge) {
                return;
            }

            const lines = [];
            const state = obsWebSocketState.state || 'idle';
            const labelMap = {
                idle: 'Idle',
                connecting: 'Connecting',
                connected: 'Connected',
                error: 'Error'
            };

            lines.push(`OBS WebSocket: ${labelMap[state] || state}`);
            lines.push(`URL: ${obsWebSocketState.url || getObsWebSocketUrl()}`);

            if (obsWebSocketState.obsVersion || obsWebSocketState.obsWebSocketVersion) {
                lines.push(
                    `OBS ${obsWebSocketState.obsVersion || '?'} / WS ${obsWebSocketState.obsWebSocketVersion || '?'} / RPC ${obsWebSocketState.rpcVersion || '?'}`
                );
            }

            if (obsWebSocketState.passwordProvided) {
                lines.push('Auth: password supplied');
            } else {
                lines.push('Auth: no password supplied');
            }

            if (obsWebSocketState.lastError) {
                lines.push(`Last error: ${obsWebSocketState.lastError}`);
            }

            obsStatusBadge.style.display = 'block';
            obsStatusBadge.dataset.state = state;
            obsStatusBadge.textContent = lines.join('\n');
        }

        async function invokeObsStudioMethod(methodName, args = [], successMessage = '', errorLabel = methodName) {
            const obs = getObsStudio();
            if (!obs || typeof obs[methodName] !== 'function') {
                return false;
            }

            try {
                const result = obs[methodName].apply(obs, args);
                if (result && typeof result.then === 'function') {
                    await result;
                }

                if (successMessage) {
                    console.log(`[OBS] ${successMessage}`);
                }
                return true;
            } catch (error) {
                console.error(`[OBS] Error ${errorLabel}:`, error);
                return false;
            }
        }

        async function resolveObsInputReference(client, inputName) {
            if (!client || !inputName) {
                return null;
            }

            try {
                const inputList = await client.call('GetInputList');
                return (inputList.inputs || []).find((input) => input.inputName === inputName) || null;
            } catch (error) {
                console.warn('[OBS WebSocket] Unable to resolve input reference:', error.message || error);
                return null;
            }
        }
        
        // Initialize OBS WebSocket connection
        async function initOBSWebSocket(forceReconnect = false) {
            if (typeof OBSWebSocket === 'undefined') {
                console.warn('[OBS WebSocket] Library not loaded');
                return null;
            }

            if (obsWebSocket && !forceReconnect) {
                return obsWebSocket;
            }

            if (obsWebSocketConnecting && !forceReconnect) {
                return obsWebSocketConnecting;
            }

            const wsUrl = getObsWebSocketUrl();
            const wsPassword = getObsWebSocketPassword();

            obsWebSocketState.url = wsUrl;
            obsWebSocketState.passwordProvided = !!wsPassword;
            obsWebSocketState.lastError = null;
            obsWebSocketState.state = 'connecting';
            updateObsStatusBadge();

            obsWebSocketConnecting = (async () => {
                if (forceReconnect && obsWebSocket) {
                    try {
                        await obsWebSocket.disconnect();
                    } catch (error) {
                        console.warn('[OBS WebSocket] Error disconnecting previous client:', error.message || error);
                    }
                    obsWebSocket = null;
                }

                const client = new OBSWebSocket();

                client.on('ConnectionClosed', (error) => {
                    if (obsWebSocket === client) {
                        obsWebSocket = null;
                        obsWebSocketState.lastError = (error && error.message) || 'Connection closed';
                        obsWebSocketState.state = 'error';
                        console.warn('[OBS WebSocket] Connection closed:', obsWebSocketState.lastError);
                        updateObsStatusBadge();
                    }
                });

                client.on('ConnectionError', (error) => {
                    obsWebSocketState.lastError = (error && error.message) || String(error);
                    obsWebSocketState.state = 'error';
                    console.warn('[OBS WebSocket] Connection error:', obsWebSocketState.lastError);
                    updateObsStatusBadge();
                });

                try {
                    const connectInfo = await client.connect(wsUrl, wsPassword || undefined);
                    const version = await client.call('GetVersion');

                    obsWebSocket = client;
                    obsWebSocketState.obsVersion = version.obsVersion || null;
                    obsWebSocketState.obsWebSocketVersion = version.obsWebSocketVersion || connectInfo.obsWebSocketVersion || null;
                    obsWebSocketState.rpcVersion = connectInfo.negotiatedRpcVersion || connectInfo.rpcVersion || null;
                    obsWebSocketState.lastError = null;
                    obsWebSocketState.state = 'connected';
                    updateObsStatusBadge();

                    console.log(
                        `[OBS WebSocket] Connected to ${wsUrl} ` +
                        `(OBS ${obsWebSocketState.obsVersion || 'unknown'}, ` +
                        `WebSocket ${obsWebSocketState.obsWebSocketVersion || 'unknown'}, ` +
                        `RPC ${obsWebSocketState.rpcVersion || 'unknown'})`
                    );
                    return client;
                } catch (error) {
                    obsWebSocket = null;
                    obsWebSocketState.lastError = error && error.message ? error.message : String(error);
                    obsWebSocketState.state = 'error';
                    console.warn(`[OBS WebSocket] Failed to connect to ${wsUrl}:`, obsWebSocketState.lastError);
                    console.warn(`[OBS WebSocket] ${getObsWebSocketCompatibilityHint(wsUrl)}`);
                    updateObsStatusBadge();
                    return null;
                } finally {
                    obsWebSocketConnecting = null;
                }
            })();

            return obsWebSocketConnecting;
        }

        async function ensureObsWebSocket() {
            if (obsWebSocket) {
                return obsWebSocket;
            }
            return initOBSWebSocket();
        }

        async function testOBSWebSocketConnection() {
            const client = await ensureObsWebSocket();
            if (!client) {
                return {
                    ok: false,
                    url: getObsWebSocketUrl(),
                    error: obsWebSocketState.lastError || 'Unable to connect',
                    hint: getObsWebSocketCompatibilityHint()
                };
            }

            try {
                const version = await client.call('GetVersion');
                let currentScene = null;

                try {
                    currentScene = await client.call('GetCurrentProgramScene');
                } catch (sceneError) {
                    currentScene = { error: sceneError.message || String(sceneError) };
                }

                return {
                    ok: true,
                    url: getObsWebSocketUrl(),
                    obsVersion: version.obsVersion || null,
                    obsWebSocketVersion: version.obsWebSocketVersion || null,
                    rpcVersion: obsWebSocketState.rpcVersion,
                    currentProgramSceneName: currentScene && currentScene.currentProgramSceneName
                };
            } catch (error) {
                return {
                    ok: false,
                    url: getObsWebSocketUrl(),
                    error: error.message || String(error),
                    hint: getObsWebSocketCompatibilityHint()
                };
            }
        }
        
        // Try to connect to OBS WebSocket on page load

				mediaElement.style.maxWidth = '100%'; // override global css
				mediaElement.style.maxHeight = '100%';
			} else { // Default to iframe for videos/embeds
				mediaElement = document.createElement('iframe');
				mediaElement.src = url;
				mediaElement.setAttribute('allow', 'autoplay; fullscreen');
				mediaElement.setAttribute('frameborder', '0');
				mediaElement.setAttribute('allowtransparency', 'true');
				mediaElement.style.width = '100%';
				mediaElement.style.height = '100%';
				mediaElement.style.overflow = 'hidden';
				mediaElement.style.backgroundColor = 'transparent';
			}
			mediaElement.controls = false;

			wrapper.appendChild(mediaElement);
			targetContainer.appendChild(wrapper);
			if (!useLayer) {
				targetContainer.style.display = 'block';
			}

			// Hide after specified duration
			const hide = () => {
				if (!useLayer) {
					targetContainer.style.display = 'none';
					statusMessage.style.display = 'block'; // Show status message again
				}
				wrapper.remove(); // Clean up just this element
			};
			if (Number(duration) > 0) {
				setTimeout(hide, duration);
			}
		}

        // Function to play audio
        async function playAudio(audioUrl, volume) {
            try {
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const audio = new Audio(audioUrl);
                audio.volume = volume !== undefined ? parseFloat(volume) : globalVolume;
                await audio.play();
                console.log("Playing audio:", audioUrl);
            } catch (e) {
                console.error("Error playing audio:", e);
            }
        }

        // Listen for messages from the iframe
        var eventMethod = window.addEventListener ? "addEventListener" : "attachEvent";
        var eventer = window[eventMethod];
        var messageEvent = eventMethod === "attachEvent" ? "onmessage" : "message";

		eventer(messageEvent, function(e) {
			// Check if the message is from our iframe
			if (iframe && e.source == iframe.contentWindow) {
				// Process data from the WebRTC data channel
				if (e.data && e.data.dataReceived) {
					if (e.data.dataReceived.overlayNinja) {
						processInput(e.data.dataReceived.overlayNinja);
					} else {
						// Handle direct action object in dataReceived
						processInput(e.data.dataReceived);
					}
				} else if (e.data && e.data.actionType) {
					// Handle direct action object
					processInput(e.data);
				}
			}
		});
        
        // Handle audio context for browsers that require user interaction
        document.addEventListener('click', () => {
            if (audioContext.state === 'suspended') {
                audioContext.resume().then(() => {
                    console.log('AudioContext resumed successfully');
                }).catch(error => {
                    console.error('Failed to resume AudioContext:', error);
                });
            }
        });
		
		function testAction(actionData) {
			processInput(actionData);
		}

		window.testAction = testAction;
        window.testOBSWebSocketConnection = testOBSWebSocketConnection;

        // Initialize or show modal based on whether session ID is needed
        if (needsSessionId) {
            // Wait for DOM to be ready before showing modal
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    showSessionModal();
                });
            } else {
                showSessionModal();
            }
        } else {
            // Session ID is already available, initialize immediately
            initializeWithSessionId();
        }
    </script>

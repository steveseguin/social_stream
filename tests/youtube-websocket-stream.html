<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Websocket Stream Adapter Test</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 24px;
      line-height: 1.4;
    }
    .pass { color: #0a7a2f; }
    .fail { color: #c62828; }
    pre {
      background: #111;
      color: #eee;
      padding: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>YouTube Websocket Stream Adapter Test</h1>
  <div id="summary">Running...</div>
  <pre id="log"></pre>
  <script>
    (async function() {
      const log = document.getElementById('log');
      const summary = document.getElementById('summary');

      function write(line, className) {
        const div = document.createElement('div');
        if (className) div.className = className;
        div.textContent = line;
        log.appendChild(div);
      }

      function assert(condition, label) {
        if (!condition) {
          throw new Error(label);
        }
        write('PASS  ' + label, 'pass');
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function createStreamBody(chunks) {
        const encoder = new TextEncoder();
        return {
          getReader() {
            let index = 0;
            return {
              read() {
                if (index >= chunks.length) {
                  return Promise.resolve({ done: true, value: undefined });
                }
                return Promise.resolve({
                  done: false,
                  value: encoder.encode(chunks[index++])
                });
              },
              releaseLock() {}
            };
          }
        };
      }

      try {
        const module = await import('../sources/websocket/youtube_streaming_adapter.js');
        const createYouTubeStreamingAdapter = module.createYouTubeStreamingAdapter;

        const statuses = [];
        const chats = [];
        const errors = [];
        const adapter = await createYouTubeStreamingAdapter({
          tokenProvider: async function() {
            return { accessToken: 'adapter-token' };
          },
          fetchImplementation: async function() {
            return {
              ok: true,
              status: 200,
              statusText: 'OK',
              body: createStreamBody([
                JSON.stringify({
                  items: [{
                    kind: 'youtube#liveChatMessage',
                    id: 'adapter-msg-1',
                    snippet: {
                      type: 'textMessageEvent',
                      publishedAt: '2026-03-29T12:05:00Z',
                      displayMessage: 'adapter message',
                      textMessageDetails: {
                        messageText: 'adapter message'
                      }
                    },
                    authorDetails: {
                      channelId: 'adapter-channel',
                      displayName: 'Adapter Tester',
                      profileImageUrl: '',
                      isChatOwner: false,
                      isChatModerator: true,
                      isChatSponsor: false
                    }
                  }]
                }) + '\n'
              ]),
              json: async function() { return {}; }
            };
          },
          onStatus: function(payload) {
            statuses.push(payload);
          },
          onChat: function(chat) {
            chats.push(chat);
          },
          onError: function(error) {
            errors.push(error);
          }
        });

        await adapter.start({ liveChatId: 'adapter-chat-1' });
        await wait(0);
        adapter.stop();

        assert(statuses.some(function(entry) { return entry && entry.status === 'starting'; }), 'adapter emits starting status');
        assert(statuses.some(function(entry) { return entry && entry.status === 'running'; }), 'adapter emits running status');
        assert(chats.length === 1, 'adapter forwards one chat item');
        assert(chats[0].raw.id === 'adapter-msg-1', 'adapter forwards raw message payload');
        assert(errors.length === 0, 'adapter does not emit an error on valid stream');
        assert(adapter.getState().mode === 'stream', 'adapter reports stream mode');

        summary.textContent = 'All tests passed.';
        summary.className = 'pass';
      } catch (error) {
        write('FAIL  ' + (error && error.message ? error.message : String(error)), 'fail');
        summary.textContent = 'Test failed.';
        summary.className = 'fail';
        console.error(error);
      }
    })();
  </script>
</body>
</html>

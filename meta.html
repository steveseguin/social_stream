<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        ================================================================================
        META OVERLAY CONTEXT FOR FUTURE CONTRIBUTORS / AI AGENTS
        ================================================================================

        Role of this page:
        - This overlay is a dedicated renderer for metadata-only events (no chat bubble text
          required), primarily for auction / commerce / giveaway style workflows.
        - It acts like a compact status bar: values are updated in place as new meta events
          arrive (for example auction status, current bidder, bids, timer, product counts).
        - It is intentionally separate from message overlays (featured/dock) so streamers can
          show "state" data independently of chat.

        Why this exists:
        - Some platforms emit important non-message updates under `data.meta`.
        - Main chat overlays optimize for messages; this page optimizes for continuously
          changing structured values.

        Canonical event references:
        - Event vocabulary and payload contract:
            docs/event-reference.html
        - Whatnot source that emits commerce/auction meta updates:
            sources/whatnot.js
        - Message pipeline/filtering behavior (important for metadata-only events):
            background.js

        Popup wiring (this page depends on it):
        - Overlay section and controls:
            popup.html  (search for "Meta Data Bar", id="meta", id="metalink")
        - URL-generation + parameter plumbing:
            popup.js
            - setupPageLinks(): adds { id: "meta", path: "meta.html" }
            - getTargetMap(): index 24 reserved for this overlay (`meta: 24`)
            - refreshLinks()/cleanup maps include `metalink`
        - Query params for this page are set via `data-param24`, `data-numbersetting24`,
          and `data-textparam24` in popup.html.

        Presentation URL params (all optional):
        - &style=glass|neon|minimal|card   visual theme for the stat chips (default: pill chips)
        - &layout=column|grid              chip flow (default: wrapping row)
        - &position=top-left|top-center|top-right|middle-left|center|middle-right|
                    bottom-left|bottom-center|bottom-right
          placement within the frame (default: top-left). Legacy &alignright and
          &align=center are still honored.
        - Viewer-count chips render a green pulsing "live" dot instead of an emoji icon.

        Expected inbound payload shape:
        - Standard Social Stream event object, with metadata in top-level `meta`.
        - Common event names handled directly:
            auction_update
            commerce_update
            viewer_update
            viewer_updates
            hype_train
        - Optional generic fallback for other meta events when enabled.

        Guardrails / do not do:
        - Do NOT change core event field names casually (`event`, `type`, `meta`) here.
          If event schema changes, update docs/event-reference.html first.
        - Do NOT assume `chatname` / `chatmessage` exists; this page is meta-first.
        - Do NOT break zero values (for example `meta: 0` in viewer updates). Zero is a valid
          state and must still render.
        - Do NOT mutate outbound contracts from this page; it is a renderer only.
        - Do NOT hardcode source-specific assumptions outside clearly isolated logic.

        Extension + Electron compatibility notes:
        - This page supports both transport styles:
            1) session iframe/WebRTC bridge (`?session=...`)
            2) websocket relay modes (`?server=...` or `?server2=...` / `?server3=...`)
        - When server params are present, websocket mode is preferred to avoid duplicate
          updates from simultaneous transports.
        - Keep logic browser-safe and avoid extension-only APIs in this file.

        Maintenance expectations:
        - If you add support for new meta event types:
            1) Add/adjust parsing here.
            2) Verify popup controls if new toggles are needed.
            3) Update docs/event-reference.html.
            4) Run a syntax check on this script.
        ================================================================================
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Overlay - Social Stream Ninja</title>
    <link rel="icon" href="./favicon.ico" />
    <style>
        :root {
            --text-color: #f4f6ff;
            --muted-color: #b8bfda;
            --chip-bg: rgba(12, 16, 28, 0.88);
            --chip-border: rgba(171, 183, 229, 0.28);
            --title-bg: rgba(8, 12, 22, 0.76);
            --hype-purple: #9146ff;
            --hype-purple-dark: #451093;
            --hype-purple-light: #bf94ff;
            --hype-cyan: #00f5d4;
            --hype-gold: #f6d365;
            --outline: -0.5px -0.5px 0 #000, 0.5px -0.5px 0 #000, -0.5px 0.5px 0 #000, 0.5px 0.5px 0 #000;
            --scale: 1;
            --panel-opacity: 1;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: var(--text-color);
            font-family: "Sora", "Segoe UI", Roboto, Arial, sans-serif;
            background: transparent;
        }

        body {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            text-shadow: var(--outline);
        }

        body.no-outline {
            text-shadow: none;
        }

        /* 9-zone placement: pos-x-{left|center|right} + pos-y-{top|middle|bottom} */
        body.pos-x-center {
            justify-content: center;
        }

        body.pos-x-right {
            justify-content: flex-end;
        }

        body.pos-y-middle {
            align-items: center;
        }

        body.pos-y-bottom {
            align-items: flex-end;
        }

        #root {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 14px;
            width: fit-content;
            max-width: min(96vw, 1800px);
            transform: scale(var(--scale));
            transform-origin: top left;
            opacity: var(--panel-opacity);
        }

        body.pos-x-center #root {
            align-items: center;
        }

        body.pos-x-center #bar {
            justify-content: center;
        }

        body.pos-x-right #root {
            align-items: flex-end;
        }

        body.pos-x-right #bar {
            justify-content: flex-end;
        }

        #title {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            max-width: 100%;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--title-bg);
            border: 1px solid rgba(164, 178, 231, 0.4);
            color: #dce3ff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        #bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            min-height: 36px;
        }

        .stat {
            display: inline-flex;
            align-items: center;
            max-width: min(94vw, 460px);
            gap: 6px;
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid var(--chip-border);
            background: linear-gradient(180deg, rgba(22, 28, 46, 0.92), rgba(10, 13, 24, 0.92));
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(3px);
            font-size: 15px;
            line-height: 1;
        }

        .live-dot {
            position: relative;
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px 2px rgba(34, 197, 94, 0.6);
            animation: livePulse 1.8s ease-out infinite;
        }

        @keyframes livePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55), 0 0 8px 2px rgba(34, 197, 94, 0.6);
            }
            70% {
                box-shadow: 0 0 0 7px rgba(34, 197, 94, 0), 0 0 8px 2px rgba(34, 197, 94, 0.6);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0), 0 0 8px 2px rgba(34, 197, 94, 0.6);
            }
        }

        .stat.bump .value {
            display: inline-block;
            animation: valueBump 0.55s ease;
        }

        @keyframes valueBump {
            0% {
                transform: scale(1.22);
                color: #aef4c2;
            }
            100% {
                transform: scale(1);
            }
        }

        .stat.category-auction {
            border-color: rgba(255, 190, 88, 0.6);
        }

        .stat.category-commerce {
            border-color: rgba(89, 214, 181, 0.55);
        }

        .stat.category-viewers {
            border-color: rgba(130, 164, 255, 0.62);
        }

        .stat.category-hype {
            border-color: rgba(145, 70, 255, 0.68);
        }

        .stat.category-othermeta {
            border-color: rgba(208, 157, 255, 0.55);
        }

        #hype {
            display: none;
            width: 100%;
            min-width: min(720px, 92vw);
        }

        .hype-topbar {
            position: relative;
            overflow: hidden;
            width: 100%;
            min-height: 62px;
            border-radius: 8px;
            border: 1px solid rgba(191, 148, 255, 0.72);
            background: linear-gradient(90deg, rgba(35, 7, 77, 0.94), rgba(79, 23, 149, 0.94) 42%, rgba(24, 14, 48, 0.94));
            box-shadow: 0 8px 26px rgba(30, 0, 74, 0.42), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
        }

        .hype-topbar.is-treasure {
            border-color: rgba(246, 211, 101, 0.78);
            background: linear-gradient(90deg, rgba(44, 26, 4, 0.96), rgba(103, 65, 10, 0.94) 44%, rgba(35, 17, 48, 0.94));
            box-shadow: 0 8px 26px rgba(71, 39, 0, 0.42), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .hype-topbar.is-ended {
            opacity: 0.9;
        }

        .hype-progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            min-width: 4px;
            background: linear-gradient(90deg, rgba(145, 70, 255, 0.92), rgba(0, 245, 212, 0.74));
            box-shadow: 0 0 24px rgba(145, 70, 255, 0.56);
            transition: width 360ms ease;
        }

        .hype-topbar.is-treasure .hype-progress-fill {
            background: linear-gradient(90deg, rgba(246, 211, 101, 0.94), rgba(255, 151, 79, 0.76));
            box-shadow: 0 0 24px rgba(246, 211, 101, 0.45);
        }

        .hype-progress-sheen {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent),
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 12px);
            opacity: 0.45;
            pointer-events: none;
        }

        .hype-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            min-height: 62px;
            padding: 10px 14px;
        }

        .hype-main {
            min-width: 0;
        }

        .hype-label-row,
        .hype-detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .hype-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .hype-phase {
            padding: 3px 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #ffffff;
            font-size: 11px;
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .hype-detail-row {
            margin-top: 7px;
            color: rgba(245, 241, 255, 0.92);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .hype-detail {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hype-side {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            max-width: 46%;
            min-width: 150px;
        }

        .hype-level {
            color: #ffffff;
            font-size: 18px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
        }

        .hype-contributors {
            max-width: 100%;
            overflow: hidden;
            color: rgba(245, 241, 255, 0.82);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.25;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 680px) {
            .hype-content {
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
            }

            .hype-side {
                align-items: flex-start;
                max-width: 100%;
                min-width: 0;
            }

            .hype-contributors {
                text-align: left;
            }
        }

        .icon {
            display: inline-flex;
            align-items: center;
            flex: 0 0 auto;
            font-size: 15px;
            color: #9db1dd;
        }

        .icon svg {
            display: block;
            width: 1.05em;
            height: 1.05em;
            filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.55));
        }

        .stat.category-auction .icon {
            color: #fbbf24;
        }

        .stat.category-commerce .icon {
            color: #34d399;
        }

        .stat.category-hype .icon {
            color: #bf94ff;
        }

        .stat.category-othermeta .icon {
            color: #d09dff;
        }

        .label {
            color: var(--muted-color);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .value {
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty {
            color: rgba(225, 231, 255, 0.78);
            font-size: 15px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px dashed rgba(170, 185, 233, 0.45);
            background: rgba(10, 14, 24, 0.58);
        }

        body.hide-icons .icon {
            display: none;
        }

        body.hide-labels .label {
            display: none;
        }

        body.hide-values .value {
            display: none;
        }

        body.compact #bar {
            gap: 5px;
        }

        body.compact .stat {
            padding: 5px 8px;
            gap: 5px;
            font-size: 13px;
        }

        body.compact .label {
            font-size: 11px;
        }

        body.no-bg .stat {
            background: transparent;
            border-color: transparent;
            padding-left: 4px;
            padding-right: 4px;
            box-shadow: none;
        }

        body.no-bg #title {
            background: transparent;
            border-color: transparent;
            padding-left: 0;
            padding-right: 0;
        }

        body.no-bg .hype-topbar {
            background: transparent;
            box-shadow: none;
        }

        /* ---------------- Theme: glass ---------------- */
        body.style-glass .stat,
        body.style-glass #title {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(14px) saturate(160%);
        }

        body.style-glass .label {
            color: rgba(255, 255, 255, 0.78);
        }

        body.style-glass .empty {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            backdrop-filter: blur(14px);
        }

        /* ---------------- Theme: neon ---------------- */
        body.style-neon .stat {
            background: rgba(4, 7, 14, 0.92);
            border-radius: 10px;
            border-width: 1px;
        }

        body.style-neon #title {
            background: rgba(4, 7, 14, 0.92);
            border-radius: 10px;
        }

        body.style-neon .stat.category-auction {
            border-color: rgba(251, 191, 36, 0.85);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.35), inset 0 0 10px rgba(251, 191, 36, 0.10);
        }

        body.style-neon .stat.category-auction .value {
            color: #ffd76a;
        }

        body.style-neon .stat.category-commerce {
            border-color: rgba(52, 211, 153, 0.85);
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.35), inset 0 0 10px rgba(52, 211, 153, 0.10);
        }

        body.style-neon .stat.category-commerce .value {
            color: #7df0c6;
        }

        body.style-neon .stat.category-viewers {
            border-color: rgba(34, 197, 94, 0.85);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.35), inset 0 0 10px rgba(34, 197, 94, 0.10);
        }

        body.style-neon .stat.category-viewers .value {
            color: #8af2ae;
        }

        body.style-neon .stat.category-hype {
            border-color: rgba(191, 148, 255, 0.85);
            box-shadow: 0 0 12px rgba(145, 70, 255, 0.45), inset 0 0 10px rgba(145, 70, 255, 0.12);
        }

        body.style-neon .stat.category-hype .value {
            color: #d3b4ff;
        }

        body.style-neon .stat.category-othermeta {
            border-color: rgba(208, 157, 255, 0.7);
            box-shadow: 0 0 12px rgba(208, 157, 255, 0.3), inset 0 0 10px rgba(208, 157, 255, 0.08);
        }

        /* ---------------- Theme: minimal ---------------- */
        body.style-minimal .stat,
        body.style-minimal #title {
            background: transparent;
            border-color: transparent;
            box-shadow: none;
            backdrop-filter: none;
            padding: 3px 6px;
        }

        body.style-minimal .empty {
            background: transparent;
            border-color: transparent;
        }

        body.style-minimal .hype-topbar {
            backdrop-filter: none;
        }

        /* ---------------- Theme: card ---------------- */
        body.style-card .stat {
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 4px 6px;
            min-width: 132px;
            padding: 11px 14px;
            border-radius: 13px;
            background: linear-gradient(160deg, rgba(26, 32, 54, 0.95), rgba(9, 12, 22, 0.95));
            border: 1px solid rgba(171, 183, 229, 0.30);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.07);
        }

        body.style-card .stat .value {
            flex-basis: 100%;
            font-size: 21px;
            font-weight: 800;
            line-height: 1.1;
        }

        body.style-card .stat .label {
            font-size: 11px;
            letter-spacing: 0.06em;
        }

        body.style-card #title {
            border-radius: 13px;
        }

        body.style-card.compact .stat .value {
            font-size: 17px;
        }

        /* ---------------- Layout: column ---------------- */
        body.layout-column #bar {
            flex-direction: column;
            align-items: stretch;
        }

        body.layout-column .stat {
            width: 100%;
            min-width: 220px;
            max-width: min(94vw, 360px);
            justify-content: space-between;
        }

        body.layout-column .stat .label {
            margin-right: auto;
        }

        body.layout-column.style-card .stat {
            justify-content: flex-start;
        }

        body.layout-column #hype {
            min-width: min(360px, 92vw);
        }

        /* ---------------- Layout: grid ---------------- */
        body.layout-grid #bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            width: min(92vw, 760px);
        }

        body.layout-grid .stat {
            width: 100%;
            max-width: none;
        }
    </style>
</head>
<body>
    <main id="root">
        <div id="title"></div>
        <div id="hype" aria-live="polite"></div>
        <div id="bar" aria-live="polite"></div>
    </main>

    <script>
        (function () {
            var urlParams = new URLSearchParams(window.location.search);

            var showIcon = !urlParams.has("noicon");
            var showLabel = !urlParams.has("nolabel");
            var showValue = !urlParams.has("novalue");
            if (!showIcon && !showLabel && !showValue) {
                showValue = true;
            }

            var explicitFilter = {
                auction: urlParams.has("auction"),
                commerce: urlParams.has("commerce"),
                viewers: urlParams.has("viewers"),
                hype: urlParams.has("hype"),
                othermeta: urlParams.has("othermeta")
            };
            var hasExplicitFilter = explicitFilter.auction || explicitFilter.commerce || explicitFilter.viewers || explicitFilter.hype || explicitFilter.othermeta;
            var hideAuctionExtras = urlParams.has("hideauctionextras");
            var hideCommerceExtras = urlParams.has("hidecommerceextras");
            var hideViewerPlatforms = urlParams.has("hideviewerplatforms");
            var hideDebugMeta = urlParams.has("hidedebugmeta");
            var hiddenFieldKeywords = String(urlParams.get("hidefields") || "")
                .split(",")
                .map(function (keyword) { return keyword.trim().toLowerCase(); })
                .filter(Boolean);

            var titleNode = document.getElementById("title");
            var hypeNode = document.getElementById("hype");
            var barNode = document.getElementById("bar");
            var state = new Map();
            var hypeTrainState = null;
            var hypeTrainTimer = null;
            var hypeTrainRemoveTimer = null;
            var HYPE_TRAIN_REMOVE_DELAY_MS = 30000;
            var viewerCounts = Object.create(null);
            var sequenceCounter = 0;
            var iframe = null;
            var sockets = [];
            var hasServerMode = urlParams.has("server") || urlParams.has("server2") || urlParams.has("server3");

            var requestedTitle = String(urlParams.get("title") || "").trim();
            if (requestedTitle) {
                titleNode.textContent = requestedTitle;
            } else {
                titleNode.style.display = "none";
            }
            if (urlParams.has("hidetitle")) {
                titleNode.style.display = "none";
            }
            if (!showIcon) {
                document.body.classList.add("hide-icons");
            }
            if (!showLabel) {
                document.body.classList.add("hide-labels");
            }
            if (!showValue) {
                document.body.classList.add("hide-values");
            }
            if (urlParams.has("compact")) {
                document.body.classList.add("compact");
            }
            if (urlParams.has("nobg") || urlParams.has("transparent")) {
                document.body.classList.add("no-bg");
            }
            if (urlParams.has("nooutline")) {
                document.body.classList.add("no-outline");
            }

            var styleName = (urlParams.get("style") || urlParams.get("theme") || "").toLowerCase();
            if (["glass", "neon", "minimal", "card"].indexOf(styleName) > -1) {
                document.body.classList.add("style-" + styleName);
            }

            var layoutName = (urlParams.get("layout") || "").toLowerCase();
            if (layoutName === "column" || layoutName === "stack" || layoutName === "vertical") {
                document.body.classList.add("layout-column");
            } else if (layoutName === "grid") {
                document.body.classList.add("layout-grid");
            }

            // Placement: &position=top-left|top-center|top-right|middle-left|center|middle-right|bottom-left|bottom-center|bottom-right
            var posX = "left";
            var posY = "top";
            var positionValue = (urlParams.get("position") || "").toLowerCase().replace(/[^a-z]+/g, "-");
            if (positionValue) {
                var tokens = positionValue.split("-").filter(Boolean);
                var sawCenter = false;
                tokens.forEach(function (token) {
                    if (token === "left" || token === "right") {
                        posX = token;
                    } else if (token === "top" || token === "bottom") {
                        posY = token;
                    } else if (token === "middle") {
                        posY = "middle";
                    } else if (token === "center" || token === "centre") {
                        sawCenter = true;
                    }
                });
                if (sawCenter) {
                    if (tokens.indexOf("top") > -1 || tokens.indexOf("bottom") > -1) {
                        posX = "center";
                    } else if (tokens.indexOf("left") > -1 || tokens.indexOf("right") > -1) {

            function iconForField(fieldKey, category) {
                var key = String(fieldKey || "").toLowerCase();

                if (/timer|time|countdown/.test(key)) return "clock";
                if (/winner|bidder|winning|won|sold|status/.test(key)) return "trophy";

                if (/qty|quantity|stock|available|availability|left|remaining/.test(key)) return "box";
                if (/giveaway/.test(key)) return "gift";
                if (/surprise/.test(key)) return "dice";
                if (/title|name|item|listing|featured/.test(key)) return "tag";
                if (/product/.test(key)) return "bag";
                if (/category|type/.test(key)) return "folder";
                if (/total/.test(key)) return "money";

            function setEntry(id, label, value, fieldKey, category, order) {
                if (!id) return;
                if (shouldHideEntry(id, label, fieldKey, category)) return;
                var formatted = trimValue(formatValue(value), 96);
                if (!formatted) return;

                var existing = state.get(id);
                state.set(id, {
                    id: id,
                    label: label || toDisplayLabel(id),
                    value: formatted,
                    icon: iconForField(fieldKey || id, category),
                    category: category || "othermeta",
                    order: Number.isFinite(order) ? order : 500,
                    sequence: existing ? existing.sequence : ++sequenceCounter,
                    changedAt: existing && existing.value !== formatted ? Date.now() : (existing ? existing.changedAt : 0)
                });
            }

            function shouldHideEntry(id, label, fieldKey, category) {
                var fingerprint = [
                    String(id || ""),

                    String(category || "")

                if (hideDebugMeta) {
                    var debugPattern = /(index|profile|href|url|source\s*mode|source|debug|raw|avatar|image|sellerurl|reminder|callback|trace|technical)/;
                    if (debugPattern.test(fingerprint)) {
                        return true;
                    }
                }

                if (hiddenFieldKeywords.length) {
                    for (var i = 0; i < hiddenFieldKeywords.length; i++) {
                        if (!hiddenFieldKeywords[i]) continue;
                        if (fingerprint.indexOf(hiddenFieldKeywords[i]) !== -1) {
                            return true;
                        }
                    }
                }

                return false;
            }

                if (typeof value === "number" && Number.isFinite(value)) {
                    return value;

                if (typeof value === "string") {
                    var cleaned = value.replace(/[^0-9.-]/g, "");
                    if (!cleaned) return null;
                    var parsed = parseFloat(cleaned);
                    return Number.isFinite(parsed) ? parsed : null;
                }
                return null;
            }

            function getHypeTrainTitle(meta) {
                var trainType = String(meta && meta.trainType ? meta.trainType : "").toLowerCase();

            function getHypeTrainPhaseLabel(phase) {
                if (phase === "begin") return "Started";

            function getHypeTrainPercent(meta) {
                if (!meta) return 0;
                if (String(meta.phase || "").toLowerCase() === "end") return 100;
                var progressPercent = parseNumber(meta.progressPercent);
                if (progressPercent !== null) return Math.max(0, Math.min(100, progressPercent));
                var progress = parseNumber(meta.progress);
                var goal = parseNumber(meta.goal);
                if (progress === null || goal === null || goal <= 0) return 0;
                return Math.max(0, Math.min(100, (progress / goal) * 100));
            }

                var seconds = Math.max(0, Math.round((target.getTime() - Date.now()) / 1000));
                var minutes = Math.floor(seconds / 60);
                var remainder = seconds % 60;
                return minutes > 0 ? minutes + "m " + remainder + "s left" : remainder + "s left";
            }

                            meta.livePreview.watchingTotal,
                            "livePreview.watchingTotal",
                            "commerce",
                            182
                        );
                        var liveCurrent = isPlainObject(meta.livePreview.current)
                            ? meta.livePreview.current
                            : (Array.isArray(meta.livePreview.items) && meta.livePreview.items.length ? meta.livePreview.items[0] : null);
                        if (liveCurrent) {
                            setEntry("commerce.live.current_title", "Live Item", liveCurrent.title, "livePreview.current.title", "commerce", 183);
                            setEntry("commerce.live.current_seller", "Live Seller", liveCurrent.sellerName, "livePreview.current.sellerName", "commerce", 184);
                            setEntry("commerce.live.current_viewers", "Live Viewers", liveCurrent.viewerCount, "livePreview.current.viewerCount", "commerce", 185);
                            setEntry("commerce.live.current_tags", "Live Tags", Array.isArray(liveCurrent.tags) ? liveCurrent.tags.join(", ") : "", "livePreview.current.tags", "commerce", 186);
                        }
                    }

                    if (isPlainObject(meta.currentEvent)) {
                        setEntry("commerce.current.title", "Current Event", meta.currentEvent.title, "currentEvent.title", "commerce", 190);
                        setEntry("commerce.current.seller", "Current Seller", meta.currentEvent.sellerName, "currentEvent.sellerName", "commerce", 191);
                        setEntry("commerce.current.viewers", "Current Viewers", meta.currentEvent.viewerCount, "currentEvent.viewerCount", "commerce", 192);
                        setEntry("commerce.current.schedule", "Current Schedule", meta.currentEvent.scheduleText, "currentEvent.scheduleText", "commerce", 193);
                    }

                    if (isPlainObject(meta.upcomingEvents)) {
                        setEntry("commerce.upcoming.total", "Upcoming Events", meta.upcomingEvents.total, "upcomingEvents.total", "commerce", 200);
                        if (Array.isArray(meta.upcomingEvents.items) && meta.upcomingEvents.items.length) {
                            var nextEvent = meta.upcomingEvents.items[0];
                            setEntry("commerce.upcoming.next", "Next Event", nextEvent.title, "upcomingEvents.items.title", "commerce", 201);
                            setEntry("commerce.upcoming.next_time", "Next Time", nextEvent.scheduleText, "upcomingEvents.items.scheduleText", "commerce", 202);
                        }
                    }
                }
            }

            function syncViewerEntries(replaceSnapshot) {
                if (replaceSnapshot) {
                    Array.from(state.keys()).forEach(function (key) {
                        if (key.indexOf("viewers.platform.") === 0) {
                            var platform = key.replace("viewers.platform.", "");
                            if (!Object.prototype.hasOwnProperty.call(viewerCounts, platform)) {
                                state.delete(key);
                            }
                        }
                    });
                }

                var platforms = Object.keys(viewerCounts).sort();
                var total = 0;
                for (var i = 0; i < platforms.length; i++) {
                    var platform = platforms[i];
                    var count = parseNumber(viewerCounts[platform]);
                    if (count === null) continue;
                    total += count;
                    if (!hideViewerPlatforms) {
                        setEntry(
                            "viewers.platform." + platform,
                            platform.toUpperCase() + " Viewers",
                            count,
                            "viewers." + platform,
                            "viewers",
                            210 + i
                        );
                    } else {
                        state.delete("viewers.platform." + platform);
                    }
                }

                if (platforms.length) {
                    setEntry("viewers.total", "Total Viewers", total, "viewers.total", "viewers", 205);
                } else {
                    state.delete("viewers.total");
                }
            }

            function flattenMeta(value, prefix, depth, output) {
                if (depth > 2 || value === null || typeof value === "undefined") return;

                if (Array.isArray(value)) {
                    if (!value.length) return;
                    var primitiveOnly = value.every(function (item) {
                        return item === null || ["string", "number", "boolean"].indexOf(typeof item) > -1;
                    });
                    if (primitiveOnly) {
                        output.push([prefix, value.map(formatValue).filter(Boolean).join(", ")]);
                    } else {
                        output.push([prefix + ".count", value.length]);
                    }
                    return;
                }

                if (isPlainObject(value)) {
                    var keys = Object.keys(value);
                    for (var i = 0; i < keys.length && i < 12; i++) {
                        var key = keys[i];
                        var nextPrefix = prefix ? prefix + "." + key : key;
                        flattenMeta(value[key], nextPrefix, depth + 1, output);
                    }
                    return;
                }

                output.push([prefix, value]);
            }

            function updateGenericMetaEntries(normalizedEventName, meta) {
                var basePrefix = "othermeta." + normalizedEventName + ".";
                var flattened = [];
                flattenMeta(meta, "", 0, flattened);

                if (!flattened.length) {
                    setEntry(basePrefix + "value", toDisplayLabel(normalizedEventName), meta, normalizedEventName, "othermeta", 400);
                    return;
                }

                var keep = Object.create(null);
                var limit = 10;
                for (var i = 0; i < flattened.length && i < limit; i++) {
                    var pair = flattened[i];
                    var key = pair[0] || "value";
                    var id = basePrefix + key;
                    keep[id] = true;
                    setEntry(id, toDisplayLabel(key), pair[1], key, "othermeta", 410 + i);
                }

                Array.from(state.keys()).forEach(function (entryId) {
                    if (entryId.indexOf(basePrefix) === 0 && !keep[entryId]) {
                        state.delete(entryId);
                    }
                });
            }

            function render() {
                var entries = Array.from(state.values()).sort(function (a, b) {
                    if (a.order !== b.order) return a.order - b.order;
                    return a.sequence - b.sequence;
                });

                barNode.textContent = "";
                if (!entries.length) {
                    if (hypeTrainState) {
                        barNode.style.display = "none";
                        return;
                    }
                    barNode.style.display = "";
                    var emptyNode = document.createElement("div");
                    emptyNode.className = "empty";
                    emptyNode.textContent = "Waiting for meta data events…";
                    barNode.appendChild(emptyNode);
                    return;
                }

                barNode.style.display = "";
                for (var i = 0; i < entries.length; i++) {
                    var entry = entries[i];
                    var chip = document.createElement("div");
                    chip.className = "stat category-" + entry.category;
                    if (entry.changedAt && Date.now() - entry.changedAt < 900) {
                        chip.className += " bump";
                    }

                    if (showIcon) {
                        var iconNode = document.createElement("span");
                        iconNode.className = "icon";
                        if (entry.icon === "::live") {
                            var dotNode = document.createElement("span");
                            dotNode.className = "live-dot";
                            iconNode.appendChild(dotNode);
                        } else if (SVG_ICONS[entry.icon]) {
                            iconNode.innerHTML = SVG_ICON_PREFIX + SVG_ICONS[entry.icon] + "</svg>";
                        } else {
                            iconNode.textContent = entry.icon;
                        }
                        chip.appendChild(iconNode);
                    }

                    if (showLabel) {
                        var labelNode = document.createElement("span");
                        labelNode.className = "label";
                        labelNode.textContent = entry.label;
                        chip.appendChild(labelNode);
                    }

                    if (showValue) {
                        var valueNode = document.createElement("span");
                        valueNode.className = "value";
                        valueNode.textContent = entry.value;
                        chip.appendChild(valueNode);
                    }

                    barNode.appendChild(chip);
                }
            }

            function processPayload(data) {
                if (!data || typeof data !== "object") return;
                if (data.content && typeof data.content === "object") {
                    data = data.content;
                }

                var normalizedEventName = normalizeEventName(data.event || data.type || "");
                if (!normalizedEventName || typeof data.meta === "undefined" || data.meta === null) return;
                if (!eventIsEnabled(normalizedEventName)) return;

                var meta = data.meta;
                var category = getEventCategory(normalizedEventName);

                if (normalizedEventName === "hype_train" && isPlainObject(meta)) {
                    updateHypeTrain(meta);
                } else if (normalizedEventName === "auction_update" && isPlainObject(meta)) {
                    updateAuctionEntries(meta);
                } else if (normalizedEventName === "commerce_update" && isPlainObject(meta)) {
                    updateCommerceEntries(meta);
                } else if (normalizedEventName === "viewer_update") {
                    var platformName = (data.type || data.platform || "").toString().toLowerCase();
                    var singleCount = parseNumber(meta);
                    if (platformName && singleCount !== null) {
                        viewerCounts[platformName] = singleCount;
                        syncViewerEntries(false);
                    }
                } else if (normalizedEventName === "viewer_updates" && isPlainObject(meta)) {
                    viewerCounts = Object.create(null);
                    Object.keys(meta).forEach(function (platform) {
                        var numeric = parseNumber(meta[platform]);
                        if (numeric !== null) {
                            viewerCounts[platform] = numeric;
                        }
                    });
                    syncViewerEntries(true);
                } else if (category === "othermeta") {
                    updateGenericMetaEntries(normalizedEventName, meta);
                }

                render();
            }

            function processIncomingData(raw) {
                if (!raw || typeof raw !== "object") return;
                if (raw.dataReceived && raw.dataReceived.overlayNinja) {
                    processPayload(raw.dataReceived.overlayNinja);
                    return;
                }
                if (raw.overlayNinja) {
                    processPayload(raw.overlayNinja);
                    return;
                }
                processPayload(raw);
            }

            function connectIframe() {
                var sessionId = urlParams.get("session");
                if (!sessionId || hasServerMode) return;

                var password = encodeURIComponent(urlParams.get("password") || "false");
                var lanonly = urlParams.has("lanonly") ? "&lanonly" : "";
                iframe = document.createElement("iframe");
                iframe.src = "https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&notmobile&password=" + password + lanonly + "&solo&view=" + encodeURIComponent(sessionId) + "&novideo&noaudio&label=meta&cleanoutput&room=" + encodeURIComponent(sessionId);
                iframe.style.width = "0px";
                iframe.style.height = "0px";
                iframe.style.position = "fixed";
                iframe.style.left = "-100px";
                iframe.style.top = "-100px";
                iframe.setAttribute("aria-hidden", "true");
                document.body.appendChild(iframe);
            }

            function connectSocket(serverURL, roomId, outChannel, inChannel) {
                if (!serverURL || !roomId) return;

                var connection = {
                    socket: null,
                    attempts: 1,
                    timer: null,
                    closed: false
                };
                sockets.push(connection);

                function scheduleReconnect() {
                    if (connection.closed) return;
                    var delay = Math.min(12000, 200 * connection.attempts);
                    if (connection.timer) {
                        clearTimeout(connection.timer);
                    }
                    connection.timer = setTimeout(function () {
                        connection.attempts += 1;
                        connectNow();
                    }, delay);
                }

                function connectNow() {
                    if (connection.closed) return;
                    try {
                        connection.socket = new WebSocket(serverURL);
                    } catch (e) {
                        scheduleReconnect();
                        return;
                    }

                    connection.socket.onopen = function () {
                        connection.attempts = 1;
                        try {
                            connection.socket.send(JSON.stringify({
                                join: roomId,
                                out: outChannel,
                                in: inChannel
                            }));
                        } catch (e) {}
                    };

                    connection.socket.onmessage = function (event) {
                        if (!event || !event.data) return;
                        try {
                            var parsed = JSON.parse(event.data);
                            processIncomingData(parsed);
                            if (parsed && parsed.get) {
                                connection.socket.send(JSON.stringify({
                                    callback: {
                                        get: parsed.get,
                                        result: true
                                    }
                                }));
                            }
                        } catch (e) {}
                    };

                    connection.socket.onerror = function () {
                        try {
                            connection.socket.close();
                        } catch (e) {}
                    };

                    connection.socket.onclose = function () {
                        scheduleReconnect();
                    };
                }

                connectNow();
            }

            function connectServerModes() {
                var roomId = (urlParams.get("session") || "").split(",")[0];
                if (!roomId) return;

                if (urlParams.has("server")) {
                    var apiServerURL = urlParams.get("server") || (urlParams.has("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja/api");
                    connectSocket(apiServerURL, roomId, 2, 1);
                }

                if (urlParams.has("server2") || urlParams.has("server3")) {
                    var extensionServerURL = urlParams.has("server2")
                        ? (urlParams.get("server2") || "wss://io.socialstream.ninja/extension")
                        : (urlParams.get("server3") || "wss://io.socialstream.ninja/extension");
                    connectSocket(extensionServerURL, roomId, 3, 4);
                }
            }

            window.addEventListener("message", function (event) {
                var payload = null;

                if (event && event.data && event.data.dataReceived && event.data.dataReceived.overlayNinja) {
                    if (iframe && event.source !== iframe.contentWindow) {
                        return;
                    }
                    payload = event.data.dataReceived.overlayNinja;
                } else if (event && event.data && event.data.overlayNinja) {
                    payload = event.data.overlayNinja;
                }

                if (payload) {
                    processIncomingData(payload);
                }
            });

            window.addEventListener("beforeunload", function () {
                sockets.forEach(function (connection) {
                    if (connection.timer) {
                        clearTimeout(connection.timer);
                    }
                    connection.closed = true;
                    if (connection.socket) {
                        try {
                            connection.socket.onclose = null;
                            connection.socket.close();
                        } catch (e) {}
                    }
                });
            });

            render();
            connectServerModes();
            connectIframe();
        })();
    </script>
</body>

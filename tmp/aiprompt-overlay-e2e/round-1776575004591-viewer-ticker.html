<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SSN Viewer Counts</title>
<style>
  :root {
    --bar-bg: rgba(0, 0, 0, 0.75);
    --bar-radius: 8px;
    --bar-padding: 8px 16px;
    --font-family: 'Segoe UI', Arial, sans-serif;
    --font-size: 14px;
    --font-weight: 600;
    --text-color: #ffffff;
    --text-muted: #aaaaaa;
    --gap: 12px;
    --divider-color: rgba(255, 255, 255, 0.15);
    --total-color: #ffcc00;
    --platform-colors: #ff4444, #9146ff, #53fc18, #00aeef, #1877f2, #8b5cf6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    font-family: var(--font-family);
    font-size: var(--font-size);
    font-weight: var(--font-weight);
    color: var(--text-color);
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
  }

  #viewer-bar {
    display: flex;
    align-items: center;
    gap: var(--gap);
    background: var(--bar-bg);
    padding: var(--bar-padding);
    border-radius: var(--bar-radius);
    flex-wrap: wrap;
    justify-content: center;
    max-width: 95vw;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #viewer-bar.visible {
    opacity: 1;
  }

  .platform-count {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .platform-label {
    color: var(--text-muted);
    text-transform: capitalize;
  }

  .platform-value {
    color: var(--text-color);
    min-width: 2ch;
    text-align: right;
  }

  .divider {
    width: 1px;
    height: 18px;
    background: var(--divider-color);
    flex-shrink: 0;
  }

  .total-section {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    color: var(--total-color);
  }

  .total-label {
    color: var(--total-color);
    opacity: 0.8;
  }

  .total-value {
    color: var(--total-color);
    font-size: 1.1em;
    min-width: 2ch;
    text-align: right;
  }

  .no-data {
    color: var(--text-muted);
    font-weight: 400;
    font-style: italic;
    font-size: 0.9em;
  }
</style>
</head>
<body>

<div id="viewer-bar">
  <span class="no-data" id="no-data">Waiting for viewer data…</span>
</div>

<iframe id="ssn_bridge" style="display:none;"></iframe>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var roomID = params.get("session") || "";
  var password = params.get("password") || "false";
  var label = params.get("label") || "custom_overlay_" + Date.now();
  var bridge = document.getElementById("ssn_bridge");
  if (roomID) {
    bridge.src = "https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&password=" +
      encodeURIComponent(password) + "&view=" + encodeURIComponent(roomID) +
      "&label=" + encodeURIComponent(label) +
      "&noaudio&novideo&cleanoutput&room=" + encodeURIComponent(roomID);
  }

  var bar = document.getElementById("viewer-bar");
  var noData = document.getElementById("no-data");
  var platformCounts = {};
  var platformOrder = ["youtube", "twitch", "kick", "tiktok", "facebook", "rumble", "discord", "whatnot"];

  function escapeText(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str || ""));
    return div.innerHTML;
  }

  function formatNumber(n) {
    if (typeof n !== "number" || isNaN(n)) return "0";
    return n.toLocaleString("en-US");
  }

  function getTotal() {
    var total = 0;
    var keys = Object.keys(platformCounts);
    for (var i = 0; i < keys.length; i++) {
      total += platformCounts[keys[i]];
    }
    return total;
  }

  function render() {
    // Clear existing children except the no-data span
    while (bar.firstChild) {
      bar.removeChild(bar.firstChild);
    }

    var keys = Object.keys(platformCounts);
    if (keys.length === 0) {
      bar.appendChild(noData);
      noData.style.display = "";
      bar.classList.remove("visible");
      return;
    }

    noData.style.display = "none";
    bar.classList.add("visible");

    var first = true;
    for (var i = 0; i < keys.length; i++) {
      var platform = keys[i];
      var count = platformCounts[platform];

      if (!first) {
        var divider = document.createElement("span");
        divider.className = "divider";
        bar.appendChild(divider);
      }
      first = false;

      var section = document.createElement("span");
      section.className = "platform-count";

      var label = document.createElement("span");
      label.className = "platform-label";
      label.textContent = platform;
      section.appendChild(label);

      var value = document.createElement("span");
      value.className = "platform-value";
      value.textContent = formatNumber(count);
      section.appendChild(value);

      bar.appendChild(section);
    }

    // Add total
    var totalDivider = document.createElement("span");
    totalDivider.className = "divider";
    bar.appendChild(totalDivider);

    var totalSection = document.createElement("span");
    totalSection.className = "total-section";

    var totalLabel = document.createElement("span");
    totalLabel.className = "total-label";
    totalLabel.textContent = "Total";
    totalSection.appendChild(totalLabel);

    var totalValue = document.createElement("span");
    totalValue.className = "total-value";
    totalValue.textContent = formatNumber(getTotal());
    totalSection.appendChild(totalValue);

    bar.appendChild(totalSection);
  }

  function handlePayload(data) {
    if (!data || !data.meta) return;

    // Handle viewer_updates snapshot — replace state entirely
    if (data.event === "viewer_updates" && typeof data.meta === "object") {
      platformCounts = {};
      var keys = Object.keys(data.meta);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var v = data.meta[k];
        if (typeof v === "number" && v >= 0) {
          platformCounts[k] = v;
        }
      }
      render();
    }
  }

  // Listen for messages from the bridge iframe
  window.addEventListener("message", function (event) {
    var payload = event.data && event.data.dataReceived && event.data.dataReceived.overlayNinja;
    if (typeof payload !== "undefined") {
      handlePayload(payload);
    }
  });

  // Expose for testing
  window.handleOverlayPayload = handlePayload;
})();
</script>
</body>
</html>

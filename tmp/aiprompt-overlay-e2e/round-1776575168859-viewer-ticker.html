<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SSN — Viewer Counts Bottom Bar</title>
<style>
  :root {
    --bar-bg: rgba(0, 0, 0, 0.7);
    --bar-height: 48px;
    --bar-radius: 8px;
    --bar-padding: 0 16px;
    --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    --font-size: 14px;
    --font-weight: 600;
    --text-color: #ffffff;
    --accent-color: #00d4ff;
    --total-color: #ffcc00;
    --divider-color: rgba(255, 255, 255, 0.25);
    --gap: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: var(--font-family);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #viewer-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: var(--gap);
    background: var(--bar-bg);
    border-radius: var(--bar-radius);
    padding: var(--bar-padding);
    height: var(--bar-height);
    min-width: 300px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 9999;
  }

  #viewer-bar.visible {
    opacity: 1;
  }

  .platform-count {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .platform-label {
    color: var(--text-color);
    font-size: var(--font-size);
    font-weight: var(--font-weight);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }

  .platform-value {
    color: var(--accent-color);
    font-size: var(--font-size);
    font-weight: var(--font-weight);
    min-width: 24px;
    text-align: right;
  }

  .divider {
    width: 1px;
    height: 24px;
    background: var(--divider-color);
    flex-shrink: 0;
  }

  .total-section {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 4px;
  }

  .total-label {
    color: var(--text-color);
    font-size: var(--font-size);
    font-weight: var(--font-weight);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }

  .total-value {
    color: var(--total-color);
    font-size: 16px;
    font-weight: 700;
    min-width: 30px;
    text-align: right;
  }

  /* Pulse animation for value changes */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .pulse {
    animation: pulse 0.3s ease;
  }
</style>
</head>
<body>

<div id="viewer-bar">
  <div id="platforms-container" style="display:flex;align-items:center;gap:var(--gap);flex-wrap:nowrap;"></div>
  <div class="divider"></div>
  <div class="total-section">
    <span class="total-label">Total</span>
    <span class="total-value" id="total-value">0</span>
  </div>
</div>

<iframe id="ssn_bridge" style="display:none;"></iframe>
<script>
(function () {
  "use strict";

  var params = new URLSearchParams(location.search);
  var roomID = params.get("session") || "";
  var password = params.get("password") || "false";
  var label = params.get("label") || "custom_overlay_" + Date.now();
  var bridge = document.getElementById("ssn_bridge");

  if (roomID) {
    bridge.src = "https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&password=" +
      encodeURIComponent(password) + "&view=" + encodeURIComponent(roomID) +
      "&label=" + encodeURIComponent(label) +
      "&noaudio&novideo&cleanoutput&room=" + encodeURIComponent(roomID);
  }

  // State: snapshot of per-platform counts
  var viewerState = {};
  var previousTotal = 0;

  // Platform display order (customize as needed)
  var platformOrder = ["youtube", "twitch", "kick", "tiktok", "facebook", "rumble", "discord", "whatnot"];

  // Platform display names (capitalized)
  function platformDisplayName(key) {
    var name = key.replace(/_/g, " ");
    return name.charAt(0).toUpperCase() + name.slice(1);
  }

  // Format number with thousands separator
  function formatNumber(num) {
    if (typeof num !== "number" || isNaN(num)) return "0";
    return num.toLocaleString("en-US");
  }

  // Build or update a single platform count element
  function createPlatformElement(key, count) {
    var container = document.getElementById("platforms-container");
    var existing = document.getElementById("platform-" + key);

    if (existing) {
      var valEl = existing.querySelector(".platform-value");
      if (valEl) {
        valEl.textContent = formatNumber(count);
      }
      return;
    }

    var el = document.createElement("div");
    el.className = "platform-count";
    el.id = "platform-" + key;

    var labelEl = document.createElement("span");
    labelEl.className = "platform-label";
    labelEl.textContent = platformDisplayName(key);

    var valueEl = document.createElement("span");
    valueEl.className = "platform-value";
    valueEl.textContent = formatNumber(count);

    el.appendChild(labelEl);
    el.appendChild(valueEl);
    container.appendChild(el);
  }

  // Remove a platform element if count is 0 or missing
  function removePlatformElement(key) {
    var el = document.getElementById("platform-" + key);
    if (el) {
      el.parentNode.removeChild(el);
    }
  }

  // Update total with pulse animation
  function updateTotal(total) {
    var totalEl = document.getElementById("total-value");
    var formatted = formatNumber(total);

    if (totalEl.textContent !== formatted) {
      totalEl.textContent = formatted;
      totalEl.classList.remove("pulse");
      // Force reflow to restart animation
      void totalEl.offsetWidth;
      totalEl.classList.add("pulse");
    }
  }

  // Main handler for viewer_updates payloads
  function handleViewerUpdates(data) {
    var meta = data.meta;
    if (!meta || typeof meta !== "object") return;

    // Build a new state object from the snapshot
    var newState = {};
    for (var key in meta) {
      if (meta.hasOwnProperty(key)) {
        var val = meta[key];
        // meta values can be numbers or objects; take the numeric value
        if (typeof val === "number") {
          newState[key] = val;
        } else if (typeof val === "object" && val !== null) {
          // If meta[key] is an object, try to find a numeric value
          var numVal = parseInt(val, 10);
          if (!isNaN(numVal)) {
            newState[key] = numVal;
          }
        }
      }
    }

    // Determine which platforms are new, changed, or removed
    var newTotal = 0;

    // Update or add platforms from new state
    for (var pKey in newState) {
      if (newState.hasOwnProperty(pKey)) {
        createPlatformElement(pKey, newState[pKey]);
        newTotal += newState[pKey];
      }
    }

    // Remove platforms that are no longer in the state
    for (var oldKey in viewerState) {
      if (viewerState.hasOwnProperty(oldKey) && !newState.hasOwnProperty(oldKey)) {
        removePlatformElement(oldKey);
      }
    }

    // Update total
    updateTotal(newTotal);

    // Replace state entirely (snapshot semantics)
    viewerState = newState;

    // Show bar if not already visible
    var bar = document.getElementById("viewer-bar");
    if (!bar.classList.contains("visible")) {
      bar.classList.add("visible");
    }
  }

  // Main payload handler
  function handlePayload(data) {
    if (!data || typeof data !== "object") return;

    // Only process viewer_updates events
    if (data.event === "viewer_updates") {
      handleViewerUpdates(data);
      return;
    }

    // Ignore everything else for this overlay
  }

  // Listen for messages from the bridge
  window.addEventListener("message", function (event) {
    var payload = event.data && event.data.dataReceived && event.data.dataReceived.overlayNinja;
    if (typeof payload !== "undefined") {
      handlePayload(payload);
    }
  });

  // Expose for testing
  window.handleOverlayPayload = handlePayload;

  // Allow sending test events via URL param: ?test=1
  if (params.get("test") === "1") {
    console.log("Test mode enabled. Sending sample viewer_updates payload...");
    setTimeout(function () {
      var testPayload = {
        event: "viewer_updates",
        meta: {
          youtube: 815,
          twitch: 221,
          kick: 94,
          tiktok: 1500
        }
      };
      handlePayload(testPayload);
    }, 500);

    // Simulate a change after 3 seconds
    setTimeout(function () {
      var testPayload2 = {
        event: "viewer_updates",
        meta: {
          youtube: 850,
          twitch: 245,
          kick: 102,
          tiktok: 1480
        }
      };
      handlePayload(testPayload2);
    }, 3500);

    // Simulate a platform disappearing
    setTimeout(function () {
      var testPayload3 = {
        event: "viewer_updates",
        meta: {
          youtube: 900,
          twitch: 260,
          tiktok: 1520
        }
      };
      handlePayload(testPayload3);
    }, 7000);
  }

})();
</script>
</body>
</html>

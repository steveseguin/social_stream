<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Stage Overlay - Social Stream Ninja</title>
	<meta name="robots" content="noindex">
	<style>
		:root {
			--overlay-scale: 1;
			--accent: #43d9ad;
			--bubble-bg: rgba(16, 19, 24, 0.88);
			--bubble-color: #f8fafc;
			--bubble-border: rgba(255, 255, 255, 0.18);
			--puppet-primary: #22314a;
			--puppet-bg: #9be7ff;
			--puppet-bg-deep: #63c8ef;
			--puppet-outline: rgba(19, 37, 63, 0.14);
			--puppet-mouth: #24324b;
			--puppet-blush: rgba(255, 135, 162, 0.68);
			--puppet-shadow: rgba(7, 19, 39, 0.26);
			--puppet-face-inset: 22px;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: transparent;
			font-family: "Avenir Next", "Segoe UI", Roboto, Arial, sans-serif;
		}

		body[data-page-bg] {
			background: var(--page-bg, transparent);
		}

		#stage {
			position: fixed;
			display: flex;
			align-items: flex-end;
			gap: 18px;
			padding: 32px;
			transform: scale(var(--overlay-scale));
			transition: opacity 180ms ease, transform 180ms ease;
			opacity: 0;
			pointer-events: none;
		}

		body.visible #stage {
			opacity: 1;
		}

		body[data-position="bottom-left"] #stage {
			left: 0;
			bottom: 0;
			transform-origin: bottom left;
		}

		body[data-position="bottom-center"] #stage {
			left: 50%;
			bottom: 0;
			transform: translateX(-50%) scale(var(--overlay-scale));
			transform-origin: bottom center;
		}

		body[data-position="top-left"] #stage {
			left: 0;
			top: 0;
			align-items: flex-start;
			transform-origin: top left;
		}

		body[data-position="top-right"] #stage {
			right: 0;
			top: 0;
			align-items: flex-start;
			transform-origin: top right;
		}

		body[data-position="top-center"] #stage {
			left: 50%;
			top: 0;
			align-items: flex-start;
			transform: translateX(-50%) scale(var(--overlay-scale));
			transform-origin: top center;
		}

		body[data-position="bottom-right"] #stage,
		body:not([data-position]) #stage {
			right: 0;
			bottom: 0;
			transform-origin: bottom right;
		}

		#avatarWrap {
			position: relative;
			width: 300px;
			height: 300px;
			flex: 0 0 300px;
		}

		#avatarImage {
			display: none;
			width: 100%;
			height: 100%;
			border-radius: 50%;
			object-fit: cover;
			border: 4px solid rgba(255, 255, 255, 0.9);
			background: #111827;
		}

		body.has-image #avatarImage {
			display: block;
		}

		body.has-image .puppet {
			display: none;
		}

		.puppet {
			box-sizing: content-box;
			width: 300px;
			height: 300px;
			position: relative;
			overflow: visible;
			isolation: isolate;
			background: radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.95) 0 10%, rgba(255, 255, 255, 0) 25%), radial-gradient(circle at 50% 115%, rgba(255, 255, 255, 0.72) 0, rgba(255, 255, 255, 0) 55%), linear-gradient(180deg, var(--puppet-bg) 0%, var(--puppet-bg-deep) 100%);
			border: 1px solid var(--puppet-outline);
			border-radius: 50%;
			box-shadow:
				0 24px 60px var(--puppet-shadow),
				inset 0 -16px 24px rgba(255, 255, 255, 0.24),
				inset 0 8px 18px rgba(255, 255, 255, 0.34);
			transition: transform 0.35s ease, box-shadow 0.35s ease, filter 0.35s ease;
			animation: floatBob 4.6s ease-in-out infinite;
		}

		.puppet * {
			transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
		}

		.puppet::before,
		.puppet::after {
			content: "";
			position: absolute;
			border-radius: 50%;
			pointer-events: none;
		}

		.puppet::before {
			inset: 10px;
			background: radial-gradient(circle at 35% 20%, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0) 42%);
			opacity: 0.85;
		}

		.puppet::after {
			inset: -12px;
			background: radial-gradient(circle, rgba(111, 214, 255, 0.2), rgba(111, 214, 255, 0) 68%);
			filter: blur(16px);
			z-index: -1;
			animation: auraPulse 6s ease-in-out infinite;
		}

		.face {
			width: 180px;
			position: absolute;
			left: 50%;
			top: 50%;
			display: flex;
			flex-direction: column;
			align-items: center;
			transform: translate(-50%, -50%);
			transition: transform 0.3s ease, filter 0.3s ease;
			animation: idleFace 7s ease-in-out infinite;
		}

		.eyes {
			display: flex;
			width: 100%;
			padding: 0 var(--puppet-face-inset);
			box-sizing: border-box;
			align-items: center;
			justify-content: space-between;
			transition: all 0.3s ease;
		}

		.eye {
			width: 34px;
			height: 34px;
			border-radius: 50%;
			background: linear-gradient(180deg, var(--puppet-primary) 0%, #111827 100%);
			position: relative;
			box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.08), 0 4px 12px rgba(0, 0, 0, 0.15);
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			overflow: hidden;
		}

		.eye::before {
			content: "";
			position: absolute;
			width: 11px;
			height: 11px;
			background: rgba(255, 255, 255, 0.95);
			border-radius: 50%;
			top: 6px;
			left: 6px;
			box-shadow: 4px 6px 0 -2px rgba(255, 255, 255, 0.55);
			transition: all 0.3s ease;
		}

		.eye::after {
			content: "";
			position: absolute;
			width: 100%;
			height: 100%;
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, var(--puppet-bg) 64%, var(--puppet-bg-deep) 100%);
			transform: translateY(-120%);
			transition: transform 0.15s ease;
		}

		.eyebrows {
			position: absolute;
			width: 100%;
			top: -24px;
			left: 0;
			display: flex;
			justify-content: space-between;
			padding: 0 calc(var(--puppet-face-inset) - 2px);
			box-sizing: border-box;
			opacity: 0;
			transition: opacity 0.25s ease;
		}

		.eyebrow {
			width: 38px;
			height: 8px;
			background: var(--puppet-primary);
			border-radius: 999px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
			transition: all 0.3s ease;
			transform-origin: center;
		}

		.mouth {
			width: 78px;
			height: 40px;
			border: 6px solid var(--puppet-mouth);
			border-top: 0;
			border-radius: 0 0 48px 48px;
			margin: 32px auto 0;
			position: relative;
			overflow: hidden;
			transform-origin: center;
			box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.12);
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

		.mouth::before {
			content: "";
			position: absolute;
			left: 50%;
			bottom: -4px;
			transform: translateX(-50%);
			width: 56%;
			height: 48%;
			background: rgba(255, 150, 170, 0.58);
			border-radius: 50% 50% 70% 70%;
			opacity: 0.24;
			transition: inherit;
		}

		.cheeks {
			position: absolute;
			width: 100%;
			top: 34%;
			left: 0;
			display: flex;
			justify-content: space-between;
			padding: 0 var(--puppet-face-inset);
			box-sizing: border-box;
			opacity: 0;
			transition: all 0.3s ease;
		}

		.cheek {
			width: 26px;
			height: 16px;
			border-radius: 50%;
			background: var(--puppet-blush);
			transform: scale(0);
			filter: blur(1px);
			transition: all 0.3s ease;
		}

		@keyframes talking {
			0%,
			100% {
				height: 30px;
				width: 66px;
				transform: translateY(0) scaleX(1);
				border-radius: 20px 20px 36px 36px;
			}
			50% {
				height: 54px;
				width: 56px;
				transform: translateY(3px) scaleX(0.94);
				border-radius: 22px 22px 30px 30px;
			}
		}

		@keyframes softTalking {
			0%,
			100% {
				height: 40px;
				transform: translateY(0) scaleX(1);
			}
			50% {
				height: 52px;
				transform: translateY(2px) scaleX(0.96);
			}
		}

		@keyframes blink {
			0% {
				transform: translateY(-120%);
			}
			50% {
				transform: translateY(0);
			}
			100% {
				transform: translateY(110%);
			}
		}

		@keyframes floatBob {
			0%,
			100% {
				transform: translateY(0) scale(1);
			}
			50% {
				transform: translateY(-5px) scale(1.01);
			}
		}

		@keyframes idleFace {
			0%,
			100% {
				transform: translate(-50%, -50%) rotate(-1deg);
			}
			50% {
				transform: translate(-49%, -51%) rotate(1deg);
			}
		}

		@keyframes shadowFloat {
			0%,
			100% {
				transform: translateX(-50%) scaleX(1);
				opacity: 0.28;
			}
			50% {
				transform: translateX(-50%) scaleX(0.92);
				opacity: 0.18;
			}
		}

		@keyframes auraPulse {
			0%,
			100% {
				transform: scale(1);
				opacity: 0.18;
			}
			50% {
				transform: scale(1.05);
				opacity: 0.28;
			}
		}

		@keyframes attentiveTilt {
			0%,
			100% {
				transform: translate(-50%, -50%) rotate(0deg);
			}
			50% {
				transform: translate(-49%, -51%) rotate(2deg);
			}
		}

		@keyframes nervousWobble {
			0%,
			100% {
				transform: translate(-50%, -50%) rotate(0deg);
			}
			25% {
				transform: translate(-49%, -50%) rotate(1.5deg);
			}
			75% {
				transform: translate(-51%, -50%) rotate(-1.5deg);
			}
		}

		@keyframes celebrateBob {
			0%,
			100% {
				transform: translateY(0) scale(1);
			}
			30% {
				transform: translateY(-12px) scale(1.03);
			}
			60% {
				transform: translateY(-4px) scale(0.99);
			}
		}

		@keyframes cheerfulBounce {
			0%,
			100% {
				transform: translate(-50%, -50%) rotate(0deg) scale(1);
			}
			25% {
				transform: translate(-50%, -54%) rotate(-4deg) scale(1.02);
			}
			75% {
				transform: translate(-50%, -47%) rotate(4deg) scale(0.98);
			}
		}

		.talking .mouth {
			animation: talking 0.32s ease-in-out infinite;
		}

		.blink .eye::after {
			animation: blink 0.16s ease forwards;
		}

		.happy .mouth {
			height: 58px;
			border-radius: 0 0 84px 84px;
			transform: translateY(0) scale(0.92);
		}

		.happy .cheeks {
			opacity: 1;
		}

		.happy .cheek {
			transform: scale(1);
		}

		.happy.talking .mouth {
			animation: softTalking 0.36s ease-in-out infinite;
		}

		.sad .mouth {
			transform: rotate(180deg) translateY(-18px) scale(0.8);
			width: 60px;
			height: 30px;
		}

		.sad .eyebrows {
			opacity: 1;
		}

		.sad .eyebrow {
			transform: rotate(-15deg) translateY(5px);
			opacity: 1;
		}

		.sad .eyebrow:last-child {
			transform: rotate(15deg) translateY(5px);
		}

		.surprised .mouth {
			height: 80px;
			width: 60px;
			border-radius: 50%;
			transform: translateY(6px);
		}

		.surprised .eye {
			height: 45px;
			width: 45px;
			transform: translateY(-5px);
		}

		.surprised .eyebrows {
			opacity: 1;
		}

		.surprised .eyebrow {
			transform: translateY(-5px);
			opacity: 1;
		}

		.angry .eyebrows {
			opacity: 1;
		}

		.angry .eyebrow {
			transform: rotate(30deg) translateY(-2px);
			opacity: 1;
		}

		.angry .eyebrow:last-child {
			transform: rotate(-30deg) translateY(-2px);
		}

		.angry .mouth {
			width: 60px;
			height: 20px;
			transform: rotate(-10deg) translateY(10px);
			border-radius: 0 0 20px 20px;
		}

		.angry .eye::before {
			width: 8px;
			height: 8px;
			top: 12px;
			left: 12px;
		}

		.thinking .eye {
			height: 14px;
			border-radius: 10px;
			transform: translateY(4px);
		}

		.thinking .mouth {
			width: 40px;
			height: 12px;
			border-radius: 8px;
			transform: rotate(-10deg) translate(20px, 10px);
		}

		.thinking .eyebrows {
			opacity: 1;
		}

		.thinking .eyebrow:last-child {
			transform: rotate(-15deg) translateY(-2px);
			opacity: 1;
		}

		.listening .face {
			animation: attentiveTilt 1.8s ease-in-out infinite;
		}

		.listening .eye {
			width: 30px;
			height: 40px;
			transform: translateY(-1px);
		}

		.listening .eyebrows {
			opacity: 1;
		}

		.listening .eyebrow {
			transform: rotate(10deg) translateY(-6px);
			opacity: 1;
		}

		.listening .eyebrow:last-child {
			transform: rotate(-10deg) translateY(-6px);
		}

		.listening .mouth {
			width: 52px;
			height: 18px;
			border-radius: 0 0 20px 20px;
			transform: translateY(12px) scale(0.94);
		}

		.confused .eyebrows {
			opacity: 1;
		}

		.confused .eyebrow:first-child {
			transform: rotate(-18deg) translate(-3px, -8px);
			opacity: 1;
		}

		.confused .eyebrow:last-child {
			transform: rotate(18deg) translate(3px, 6px);
			opacity: 1;
		}

		.confused .eye:first-child {
			transform: scaleY(1.04);
		}

		.confused .eye:last-child {
			transform: scaleY(0.82) translateY(4px);
		}

		.confused .mouth {
			width: 56px;
			height: 18px;
			border-radius: 0 0 18px 18px;
			transform: rotate(-12deg) translate(18px, 10px);
		}

		.worried .face {
			animation: nervousWobble 1.5s ease-in-out infinite;
		}

		.worried .eyebrows {
			opacity: 1;
		}

		.worried .eyebrow:first-child {
			transform: rotate(-18deg) translateY(-4px);
			opacity: 1;
		}

		.worried .eyebrow:last-child {
			transform: rotate(18deg) translateY(-4px);
			opacity: 1;
		}

		.worried .eye {
			width: 30px;
			height: 38px;
		}

		.worried .mouth {
			width: 58px;
			height: 18px;
			border-radius: 0 0 22px 22px;
			transform: rotate(180deg) translateY(-12px) scale(0.9);
		}

		.proud .face {
			transform: translate(-50%, -52%);
		}

		.proud .eyebrows {
			opacity: 1;
		}

		.proud .eyebrow {
			transform: translateY(-2px);
			opacity: 1;
		}

		.proud .mouth {
			width: 74px;
			height: 34px;
			transform: translateY(6px) rotate(4deg);
			border-radius: 0 0 52px 52px;
		}

		.proud .cheeks {
			opacity: 0.85;
		}

		.proud .cheek {
			transform: scale(0.82);
			background: rgba(255, 172, 184, 0.72);
		}

		.wink .eye:first-child {
			height: 5px;
			margin-top: 15px;
			border-radius: 5px;
		}

		.puppet.excited,
		.puppet.celebrating {
			animation: celebrateBob 0.68s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
		}

		.excited .face {
			animation: cheerfulBounce 0.55s ease-in-out infinite;
		}

		.celebrating .face {
			animation: cheerfulBounce 0.45s ease-in-out infinite;
		}

		.excited .cheeks,
		.celebrating .cheeks {
			opacity: 1;
		}

		.excited .cheek {
			transform: scale(1.2);
			background: rgba(255, 117, 145, 0.82);
		}

		.celebrating .cheek {
			transform: scale(1.3);
			background: rgba(255, 117, 145, 0.88);
		}

		.sleepy .eye {
			height: 8px;
			border-radius: 4px;
			transform: translateY(12px);
		}

		.sleepy .mouth {
			height: 25px;
			width: 40px;
			transform: translateY(10px);
		}

		.shadow {
			position: absolute;
			bottom: -15px;
			left: 50%;
			transform: translateX(-50%);
			width: 90%;
			height: 20px;
			background: var(--puppet-shadow);
			border-radius: 50%;
			transition: all 0.3s ease;
			filter: blur(5px);
			animation: shadowFloat 4.6s ease-in-out infinite;
		}

		.excited .shadow {
			width: 84%;
			opacity: 0.2;
			transform: translateX(-50%) scaleX(0.88);
		}

		.celebrating .shadow {
			width: 82%;
			opacity: 0.18;
			transform: translateX(-50%) scaleX(0.84);
		}

		.bubble {
			position: relative;
			max-width: min(680px, calc(100vw - 250px));
			min-width: 220px;
			padding: 18px 22px;
			border-radius: 18px;
			background: var(--bubble-bg);
			border: 1px solid var(--bubble-border);
			color: var(--bubble-color);
			box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			transform: translateY(-20px);
			opacity: 0;
			transition: opacity 160ms ease, transform 160ms ease;
		}

		body.has-text .bubble {
			opacity: 1;
			transform: translateY(-10px);
		}

		body[data-hide-bubble="true"] .bubble {
			display: none;
		}

		.bubble:after {
			content: "";
			position: absolute;
			right: -12px;
			bottom: 28px;
			border-width: 12px 0 12px 12px;
			border-style: solid;
			border-color: transparent transparent transparent var(--bubble-bg);
		}

		body[data-position$="left"] .bubble:after {
			right: auto;
			left: -12px;
			border-width: 12px 12px 12px 0;
			border-color: transparent var(--bubble-bg) transparent transparent;
		}

		.name {
			margin-bottom: 6px;
			color: var(--accent);
			font-size: 18px;
			font-weight: 800;
			letter-spacing: 0.02em;
		}

		.text {
			font-size: clamp(24px, 3.2vw, 42px);
			line-height: 1.18;
			font-weight: 700;
			overflow-wrap: anywhere;
			text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
		}

		.status {
			display: none;
			position: fixed;
			left: 12px;
			bottom: 12px;
			padding: 8px 10px;
			border-radius: 8px;
			background: rgba(0, 0, 0, 0.65);
			color: rgba(255, 255, 255, 0.82);
			font-size: 12px;
		}

		body.show-status .status {
			display: block;
		}
	</style>
</head>
<body data-position="bottom-right">
	<div id="stage">
		<div class="bubble">
			<div id="speakerName" class="name">AI</div>
			<div id="speechText" class="text"></div>
		</div>
		<div id="avatarWrap">
			<img id="avatarImage" alt="">
			<div id="puppet" class="puppet happy">
				<div class="face">
					<div class="eyebrows">
						<div class="eyebrow"></div>
						<div class="eyebrow"></div>
					</div>
					<div class="eyes">
						<div class="eye"></div>
						<div class="eye"></div>
					</div>
					<div class="cheeks">
						<div class="cheek"></div>
						<div class="cheek"></div>
					</div>
					<div class="mouth"></div>
				</div>
				<div class="shadow"></div>
			</div>
		</div>
	</div>
	<div id="status" class="status"></div>
	<script>
	(function () {
		var urlParams = new URLSearchParams(location.search);
		var sessionId = urlParams.get("session") || urlParams.get("room") || "";
		var password = urlParams.get("password") || "false";
		var label = urlParams.get("label") || "cohost-overlay";
		var defaultName = urlParams.get("name") || urlParams.get("botname") || "AI";
		var avatarUrl = urlParams.get("avatar") || "";
		var position = urlParams.get("position") || "bottom-right";
		var scale = parseFloat(urlParams.get("scale") || "1");
		var hideAfter = parseInt(urlParams.get("hideafter") || "12000", 10);
		var ttsEnabled = urlParams.has("tts") || urlParams.get("speak") === "1";
		var stayVisible = !urlParams.has("hideidle");
		var outChannel = parseInt(urlParams.get("out") || urlParams.get("outchan") || "3", 10);
		var inChannel = parseInt(urlParams.get("in") || urlParams.get("inchan") || "4", 10);
		var bridgeFrame = null;
		var socket = null;
		var hideTimer = null;
		var chunks = {};
		var state = {
			visible: stayVisible,
			text: "",
			name: defaultName,
			emotion: "happy",
			talking: false,
			avatar: avatarUrl,
			lastPayload: null
		};

		var body = document.body;
		var puppet = document.getElementById("puppet");
		var speechText = document.getElementById("speechText");
		var speakerName = document.getElementById("speakerName");
		var avatarImage = document.getElementById("avatarImage");
		var status = document.getElementById("status");

		if (!isFinite(scale) || scale <= 0) scale = 1;
		if (!isFinite(hideAfter) || hideAfter < 0) hideAfter = 12000;
		if (!isFinite(outChannel)) outChannel = 3;
		if (!isFinite(inChannel)) inChannel = 4;
		document.documentElement.style.setProperty("--overlay-scale", String(scale));
		body.setAttribute("data-position", position);
		if (urlParams.has("hidebubble") || urlParams.get("bubble") === "0") {
			body.setAttribute("data-hide-bubble", "true");
		}
		if (urlParams.get("pagebg")) {
			document.documentElement.style.setProperty("--page-bg", urlParams.get("pagebg"));
			body.setAttribute("data-page-bg", "true");
		}
		if (urlParams.has("status")) {
			body.classList.add("show-status");
		}

		function setStatus(text) {
			status.textContent = text || "";
		}

		if (!sessionId) {
			setStatus("no session; waiting for direct messages");
		} else if (!urlParams.has("server") && !urlParams.has("server2") && !urlParams.has("server3")) {
			setStatus("bridge connecting");
		}

		function normalizeEmotion(emotion) {
			var value = String(emotion || "").toLowerCase().trim();
			var allowed = {
				happy: true,
				sad: true,
				surprised: true,
				angry: true,
				thinking: true,
				wink: true,
				excited: true,
				sleepy: true,
				listening: true,
				confused: true,
				worried: true,
				proud: true,
				celebrating: true
			};
			return allowed[value] ? value : "happy";
		}

		function setAvatar(url) {
			state.avatar = String(url || "").trim();
			if (state.avatar) {
				avatarImage.src = state.avatar;
				body.classList.add("has-image");
			} else {
				avatarImage.removeAttribute("src");
				body.classList.remove("has-image");
			}
		}

		avatarImage.onerror = function () {
			body.classList.remove("has-image");
		};

		function setEmotion(emotion, talking) {
			state.emotion = normalizeEmotion(emotion || state.emotion);
			if (typeof talking !== "undefined") {
				state.talking = !!talking;
			}
			puppet.className = "puppet " + state.emotion + (state.talking ? " talking" : "");
		}

		function showStage() {
			state.visible = true;
			body.classList.add("visible");
		}

		function hideStage() {
			state.visible = false;
			state.talking = false;
			body.classList.remove("visible");
			setEmotion(state.emotion, false);
		}

		function clearBubble() {
			state.text = "";
			state.talking = false;
			speechText.textContent = "";
			body.classList.remove("has-text");
			setEmotion(state.emotion, false);
			if (!stayVisible) {
				hideStage();
			}
		}

		function scheduleClear() {
			if (hideTimer) {
				clearTimeout(hideTimer);
				hideTimer = null;
			}
			if (!hideAfter) return;
			hideTimer = setTimeout(function () {
				clearBubble();
			}, hideAfter);
		}

		function speak(text) {
			if (!ttsEnabled || !text || !("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined") {
				if (text && !ttsEnabled) {
					setStatus("text shown; add &tts or &speak=1 for audio");
				} else if (text) {
					setStatus("text shown; browser TTS unavailable");
				}
				return;
			}
			try {
				window.speechSynthesis.cancel();
				var utterance = new SpeechSynthesisUtterance(text);
				utterance.onend = function () {
					setEmotion(state.emotion, false);
					setStatus("speech done");
				};
				utterance.onerror = function () {
					setEmotion("worried", false);
					setStatus("speech failed");
				};
				setStatus("speaking");
				window.speechSynthesis.speak(utterance);
			} catch (e) {}
		}

		function applySay(meta) {
			var text = meta.text || meta.value || meta.chatmessage || "";
			state.text = String(text || "").trim();
			if (!state.text) {
				clearBubble();
				return;
			}
			if (meta.name || meta.chatname) {
				state.name = String(meta.name || meta.chatname);
			}
			if (meta.avatar || meta.chatimg) {
				setAvatar(meta.avatar || meta.chatimg);
			}
			speakerName.textContent = state.name || defaultName;
			speechText.textContent = state.text;
			body.classList.add("has-text");
			setEmotion(meta.emotion || meta.mood || state.emotion, meta.talking !== false);
			showStage();
			if (meta.tts || meta.speak) {
				speak(state.text);
			} else {
				setStatus("text shown");
			}
			scheduleClear();
		}

		function targetMatches(payload) {
			var target = payload && payload.target;
			if (!target || target === "null" || target === "*") return true;
			return String(target) === label;
		}

		function resolveChunk(payload) {
			var chunkId;
			var entry;
			if (!payload || payload.action !== "ssnBridgeChunk") return payload;
			chunkId = String(payload.chunkId || "");
			if (!chunkId) return null;
			entry = chunks[chunkId] || { total: parseInt(payload.total, 10), parts: [], count: 0 };
			if (typeof entry.parts[payload.index] === "undefined") entry.count += 1;
			entry.parts[payload.index] = String(payload.value || "");
			chunks[chunkId] = entry;
			if (entry.count < entry.total) return null;
			delete chunks[chunkId];
			try {
				return JSON.parse(entry.parts.join(""));
			} catch (e) {
				return null;
			}
		}

		function normalizePayload(input) {
			var payload = input;
			if (!payload) return null;
			if (payload.dataReceived && payload.dataReceived.overlayNinja) {
				payload = payload.dataReceived.overlayNinja;
			}
			if (payload.overlayNinja) {
				payload = payload.overlayNinja;
			}
			payload = resolveChunk(payload);
			if (!payload) return null;
			if (payload.aiOverlay) {
				payload = payload.aiOverlay;
			}
			if (payload.cohostOverlay) {
				payload = payload.cohostOverlay;
			}
			return payload;
		}

		function processPayload(input) {
			var payload = normalizePayload(input);
			var meta;
			var command;
			if (!payload) return false;
			if (!targetMatches(payload)) return false;
			state.lastPayload = payload;
			setStatus("payload received " + new Date().toLocaleTimeString());

			if (payload.action === "aiOverlay" || payload.action === "cohostOverlay") {
				meta = payload.meta || {};
			} else if (payload.chatmessage || payload.text) {
				meta = payload;
			} else {
				return false;
			}

			command = String(meta.command || (meta.text || meta.chatmessage ? "say" : "emote")).toLowerCase();
			if (command === "say" || command === "speak") {
				applySay(meta);
			} else if (command === "emote") {
				setEmotion(meta.emotion || meta.mood || state.emotion, meta.talking);
				showStage();
			} else if (command === "show") {
				showStage();
			} else if (command === "hide") {
				hideStage();
			} else if (command === "clear") {
				clearBubble();
			} else if (command === "setavatar") {
				setAvatar(meta.avatar || meta.url || "");
				showStage();
			}
			return true;
		}

		function setupBridge() {
			if (!sessionId || urlParams.has("preview")) return;
			bridgeFrame = document.createElement("iframe");
			bridgeFrame.src = "https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&password=" + encodeURIComponent(password) + "&solo&view=" + encodeURIComponent(sessionId) + "&novideo&noaudio&label=" + encodeURIComponent(label) + "&cleanoutput&room=" + encodeURIComponent(sessionId);
			bridgeFrame.style.cssText = "width:0;height:0;border:0;position:absolute;left:-200px;top:-200px;";
			bridgeFrame.onload = function () {
				setStatus("bridge ready");
			};
			document.body.appendChild(bridgeFrame);
			window.addEventListener("message", function (event) {
				if (event.source !== bridgeFrame.contentWindow) return;
				processPayload(event.data);
			});
		}

		function setupSocket(serverURL) {
			var attempts = 1;
			function connect() {
				if (socket) {
					socket.onclose = null;
					socket.close();
				}
				socket = new WebSocket(serverURL);
				socket.onopen = function () {
					attempts = 1;
					socket.send(JSON.stringify({ join: sessionId, out: outChannel, in: inChannel }));
					setStatus("server connected");
				};
				socket.onerror = function () {
					socket.close();
				};
				socket.onclose = function () {
					setStatus("server reconnecting");
					setTimeout(connect, Math.min(5000, 100 * attempts));
					attempts += 1;
				};
				socket.addEventListener("message", function (event) {
					var data;
					if (!event.data) return;
					try {
						data = JSON.parse(event.data);
						processPayload(data);
					} catch (e) {}
				});
			}
			connect();
		}

		function resolveSocketURL() {
			if (urlParams.has("server")) {
				return urlParams.get("server") || (urlParams.has("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja/api");
			}
			if (urlParams.has("server2") || urlParams.has("server3")) {
				return urlParams.get("server2") || urlParams.get("server3") || (urlParams.has("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja/extension");
			}
			if (urlParams.has("localserver")) {
				return "ws://127.0.0.1:3000";
			}
			return "";
		}

		setAvatar(avatarUrl);
		speakerName.textContent = defaultName;
		if (stayVisible) showStage();
		setupBridge();
		if (sessionId) {
			var socketURL = resolveSocketURL();
			if (socketURL) setupSocket(socketURL);
		}

		window.addEventListener("message", function (event) {
			if (bridgeFrame && event.source === bridgeFrame.contentWindow) return;
			processPayload(event.data);
		});

		window.__aiStageOverlay = {
			processPayload: processPayload,
			getState: function () {
				return {
					label: label,
					visible: state.visible,
					text: state.text,
					name: state.name,
					emotion: state.emotion,
					talking: state.talking,
					avatar: state.avatar,
					lastPayload: state.lastPayload
				};
			},
			clear: clearBubble,
			hide: hideStage,
			show: showStage
		};
	}());
	</script>
</body>
</html>

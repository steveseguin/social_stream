<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll - Social Stream Ninja</title>
    <link rel="icon" href="./favicon.ico" />
    <link rel="preload" href="./thirdparty/NotoColorEmoji.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <script src="./currency.js"></script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;700&family=Oswald:wght@400;700&family=Poppins:wght@400;600&family=Press+Start+2P&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=Courier+Prime:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }

        .poll-container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border-radius: 10px;
        }

        .poll-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .poll-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
		
		.poll-instruction {
			text-align: center;
		}

        .option-number {
            margin-right: 10px;
            font-weight: bold;
            z-index: 2;
        }

        .option-text {
            flex-grow: 1;
            z-index: 2;
        }

        .option-percentage {
            margin-left: 10px;
            z-index: 2;
        }
		
		.option-tally { 
			z-index: 2;
			margin-left: 10px;
		}

        .poll-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            transition: width 0.5s ease-in-out;
            z-index: 1;
        }

        /* Default Style */
        .style-default {
            font-family: 'Montserrat', sans-serif;
            color: #333;
            background-color: rgba(255, 255, 255, 0.8);
        }

        .style-default .poll-title {
            font-size: 24px;
            color: #2c3e50;
        }

        .style-default .poll-option {
            background-color: #f0f0f0;
            border-radius: 5px;
            padding: 10px;
        }

        .style-default .poll-bar {
            background-color: rgba(76, 175, 80, 0.3);
        }

        /* Neon Style */
        .style-neon {
            font-family: 'Oswald', sans-serif;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.8);
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fff, 0 0 20px #ff00de, 0 0 35px #ff00de, 0 0 40px #ff00de, 0 0 50px #ff00de, 0 0 75px #ff00de;
        }

        .style-neon .poll-title {
            font-size: 36px;
            color: #0ff;
        }

        .style-neon .poll-option {
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #0ff;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .style-neon .poll-bar {
            background-color: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff, 0 0 40px #0ff;
        }

        .style-neon .option-number {
            color: #0ff;
        }

        /* Minimalist Style */
        .style-minimalist {
            font-family: 'Poppins', sans-serif;
            color: #333;
            background-color: rgba(255, 255, 255, 0.9);
        }

        .style-minimalist .poll-title {
            font-size: 28px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .style-minimalist .poll-option {
            background-color: #f5f5f5;
            border-left: 4px solid #3498db;
            padding: 12px;
            margin-bottom: 8px;
        }

        .style-minimalist .poll-bar {
            background-color: rgba(52, 152, 219, 0.2);
        }

        .style-minimalist .option-number {
            color: #3498db;
        }

        /* Retro Gaming Style */
        .style-retro-gaming {
            font-family: 'Press Start 2P', cursive;
            color: #33ff00;
            background-color: rgba(0, 0, 0, 0.9);
            text-shadow: 2px 2px #000;
        }

        .style-retro-gaming .poll-title {
            font-size: 24px;
            color: #ff6600;
            margin-bottom: 30px;
        }

        .style-retro-gaming .poll-option {
            background-color: #000;
            border: 2px solid #33ff00;
            padding: 15px;
            margin-bottom: 10px;
        }

        .style-retro-gaming .poll-bar {
            background-color: rgba(51, 255, 0, 0.3);
            box-shadow: 0 0 5px #33ff00;
        }

        .style-retro-gaming .option-number {
            color: #ff6600;
        }

        .style-retro-gaming .option-percentage {
            color: #ff6600;
        }

        /* Elegant Style */
        .style-elegant {
            font-family: 'Playfair Display', serif;
            color: #2c3e50;
            background-color: rgba(245, 245, 245, 0.9);
        }

        .style-elegant .poll-title {
            font-size: 32px;
            color: #34495e;
            font-weight: 700;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }

        .style-elegant .poll-option {
            background-color: #fff;
            border: 1px solid #bdc3c7;
            border-radius: 3px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .style-elegant .poll-bar {
            background-color: rgba(52, 73, 94, 0.2);
        }

        .style-elegant .option-number {
            color: #16a085;
            font-weight: 700;
        }

        /* Futuristic Style */
        .style-futuristic {
            font-family: 'Roboto', sans-serif;
            color: #ecf0f1;
            background-color: rgba(44, 62, 80, 0.9);
        }

        .style-futuristic .poll-title {
            font-size: 28px;
            color: #3498db;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .style-futuristic .poll-option {
            background-color: rgba(52, 152, 219, 0.1);
            border: 1px solid #3498db;
            border-radius: 5px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .style-futuristic .poll-option:hover {
            background-color: rgba(52, 152, 219, 0.2);
        }

        .style-futuristic .poll-bar {
            background-color: rgba(52, 152, 219, 0.5);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.7);
        }

        .style-futuristic .option-number {
            color: #e74c3c;
            font-weight: 700;
        }

        /* Vintage Style */
        .style-vintage {
            font-family: 'Merriweather', serif;
            color: #3c3c3c;
            background-color: rgba(255, 253, 231, 0.9);
        }

        .style-vintage .poll-title {
            font-size: 30px;
            color: #8b4513;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(139, 69, 19, 0.3);
        }

        .style-vintage .poll-option {
            background-color: rgba(255, 248, 220, 0.7);
            border: 2px solid #d2b48c;
            border-radius: 0;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 3px 3px 0 #d2b48c;
        }

        .style-vintage .poll-bar {
            background-color: rgba(210, 180, 140, 0.4);
        }

        .style-vintage .option-number {
            color: #8b4513;
            font-weight: 700;
        }

        /* Cyberpunk Style */
        .style-cyberpunk {
            font-family: 'Courier Prime', monospace;
            color: #0f0;
            background-color: rgba(0, 0, 0, 0.8);
            text-shadow: 0 0 5px #0f0;
        }

        .style-cyberpunk .poll-title {
            font-size: 28px;
            color: #f0f;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f;
            padding-bottom: 10px;
        }

        .style-cyberpunk .poll-option {
            background-color: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .style-cyberpunk .poll-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 49%, #0f0 49%, #0f0 51%, transparent 51%);
            background-size: 6px 6px;
            opacity: 0.1;
        }

        .style-cyberpunk .poll-bar {
            background-color: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 10px #0f0;
        }

        .style-cyberpunk .option-number {
            color: #ff0;
            font-weight: 700;
        }

        .style-cyberpunk .option-percentage {
            color: #f0f;
        }
		
		.style-cyberpunk .option-tally {
            color: #f0f;
        }
		
		.hidden {
            display: none;
        }
		
		.poll-container {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .poll-container.hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="poll-container" class="poll-container style-default hidden">
        <h2 id="poll-title" class="poll-title">Loading poll...</h2>
        <div id="poll-options"></div>
    </div>
    <script>
// Replace the existing script with this optimized version

const urlParams = new URLSearchParams(window.location.search);
const TRUE_STRINGS = new Set(['1', 'true', 'yes', 'on', 'enabled']);
const FALSE_STRINGS = new Set(['0', 'false', 'no', 'off', 'disabled']);
const pollCoreResetKeys = new Set(['pollType', 'pollMatchMode', 'pollQuestion', 'multipleChoiceOptions']);

function getSessionId() {
    const rawSession = (urlParams.get('session') || '').trim();
    return rawSession ? rawSession.split(',')[0].trim() : '';
}

function normalizeBoolean(value) {
    if (typeof value === 'boolean') return value;
    if (typeof value === 'number') return value !== 0;
    if (typeof value === 'string') {
        const normalized = value.trim().toLowerCase();
        if (!normalized) return undefined;
        if (TRUE_STRINGS.has(normalized)) return true;
        if (FALSE_STRINGS.has(normalized)) return false;
        return undefined;
    }
    return undefined;
}

function normalizeNumber(value, fallback) {
    if (value === null || value === undefined) return fallback;
    const parsed = parseInt(value, 10);
    if (Number.isNaN(parsed) || parsed <= 0) return fallback;
    return parsed;
}

function normalizeOptionsList(value) {
    if (!value) return [];
    if (Array.isArray(value)) {
        return value.map(option => option.trim()).filter(option => option.length);
    }
    if (typeof value === 'string') {
        // Support both comma-separated and newline-separated options
        const delimiter = value.includes('\n') ? /[\n\r]+/ : ',';
        return value.split(delimiter).map(option => option.trim()).filter(option => option.length);
    }
    return [];
}

function normalizePollMatchMode(value) {
    if (value === 'hashtag-anywhere' || value === 'hashtags-anywhere') {
        return 'hashtag-anywhere';
    }
    return 'exact';
}

function arraysEqual(a, b) {
    if (!Array.isArray(a) || !Array.isArray(b)) return false;
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i += 1) {
        if (a[i] !== b[i]) {
            return false;
        }
    }
    return true;
}

const debugMode = (() => {
    if (!urlParams.has('debug')) return false;
    const raw = urlParams.get('debug');
    if (raw === null || raw === '') return true;
    const parsed = normalizeBoolean(raw);
    return parsed === undefined ? true : parsed;
})();

function debugLog(message, payload) {
    if (!debugMode) return;
    if (payload !== undefined) {
        console.log('[poll debug]', message, payload);
    } else {
        console.log('[poll debug]', message);
    }
}

const settings = {
    pollType: urlParams.get('pollType') || 'freeform',
    pollQuestion: urlParams.get('pollQuestion') || 'Loading poll ...',
    pollOptions: urlParams.get('pollOptions') ? urlParams.get('pollOptions').split(',').map(opt => opt.trim()) : [],
    pollMatchMode: normalizePollMatchMode(urlParams.get('pollMatchMode')),
    pollTimer: urlParams.get('pollTimer') || 60,
    pollEnabled: urlParams.get('pollEnabled') || false,
    styleType: urlParams.get('style') || 'default',
    pollSpam: urlParams.has('pollSpam') || false,
    pollClosed: false,
    pollTally: urlParams.has('pollTally') || false,
    pollDonationWeighted: urlParams.has('pollDonationWeighted') || false,
};

settings.pollEnabled = normalizeBoolean(settings.pollEnabled) ?? false;
settings.pollSpam = normalizeBoolean(settings.pollSpam) ?? false;
settings.pollTally = normalizeBoolean(settings.pollTally) ?? false;
settings.pollDonationWeighted = normalizeBoolean(settings.pollDonationWeighted) ?? false;
settings.pollTimer = normalizeNumber(settings.pollTimer, 60) || 60;
settings.pollOptions = normalizeOptionsList(settings.pollOptions);

let results = {};
let totalVotes = 0;
let alreadyVoted = {};
let donationTotals = {}; // Track donation amounts per option
let totalDonations = 0;  // Track total donations
let updatePending = false;
let lastUpdateTime = 0;
const UPDATE_THROTTLE = 200; // Only update UI every 200ms

// Cached DOM elements
let pollContainer;
let pollTitle;
let pollOptionsContainer;

function getPollInstructionText() {
    if (settings.pollMatchMode === 'hashtag-anywhere') {
        return 'Use #word anywhere.';
    }
    return 'Vote with #word.';
}

function initializePoll() {
    pollContainer = document.getElementById('poll-container');
    pollTitle = document.getElementById('poll-title');
    pollOptionsContainer = document.getElementById('poll-options');
    
    pollContainer.className = `poll-container style-${settings.styleType} ${settings.pollEnabled ? '' : 'hidden'}`;
    pollTitle.innerText = settings.pollQuestion;
    updatePollOptions();
    debugLog('Poll UI initialized', {
        pollEnabled: settings.pollEnabled,
        pollType: settings.pollType,
        pollMatchMode: settings.pollMatchMode,
        pollQuestion: settings.pollQuestion,
        styleType: settings.styleType
    });
}

function updatePollOptions() {
    pollOptionsContainer.innerHTML = '';

    if (settings.pollType === 'yesno') {
        settings.pollOptions = ['Yes', 'No'];
    }
    
    if (settings.pollType === 'multiple' || settings.pollType === 'yesno') {
        const fragment = document.createDocumentFragment();
        
        settings.pollOptions.forEach((option, index) => {
            const optionElement = document.createElement('div');
            optionElement.className = 'poll-option';
            
            const numberSpan = document.createElement('span');
            numberSpan.className = 'option-number';
            numberSpan.textContent = index + 1;
            
            const textSpan = document.createElement('span');
            textSpan.className = 'option-text';
            textSpan.textContent = option;
            
            const percentageSpan = document.createElement('span');
            percentageSpan.className = 'option-percentage';
            percentageSpan.textContent = '0%';
            
            const barDiv = document.createElement('div');
            barDiv.className = 'poll-bar';
            barDiv.style.width = '0%';
            
            optionElement.appendChild(numberSpan);
            optionElement.appendChild(textSpan);
            optionElement.appendChild(percentageSpan);
            optionElement.appendChild(barDiv);
            
            fragment.appendChild(optionElement);
        });
        
        pollOptionsContainer.appendChild(fragment);
    } else if (settings.pollType === 'freeform') {
        const instructionElement = document.createElement('div');
        instructionElement.className = 'poll-instruction';
        instructionElement.textContent = getPollInstructionText();
        pollOptionsContainer.appendChild(instructionElement);
    }
}

function scheduleUpdate() {
    if (updatePending) return;
    
    const now = Date.now();
    const timeSinceLastUpdate = now - lastUpdateTime;
    
    if (timeSinceLastUpdate >= UPDATE_THROTTLE) {
        updatePollResults();
        lastUpdateTime = now;
    } else {
        updatePending = true;
        setTimeout(() => {
            updatePending = false;
            updatePollResults();
            lastUpdateTime = Date.now();
        }, UPDATE_THROTTLE - timeSinceLastUpdate);
    }
}

function updatePollResults() {
    pollOptionsContainer.innerHTML = '';
    const fragment = document.createDocumentFragment();

    if (settings.pollType === 'freeform' && !settings.pollClosed) {
        const instructionElement = document.createElement('div');
        instructionElement.className = 'poll-instruction';
        instructionElement.textContent = getPollInstructionText();
        fragment.appendChild(instructionElement);
    }

    let displayOptions = [];

    if (settings.pollType === 'multiple' || settings.pollType === 'yesno') {
        displayOptions = settings.pollOptions.map(option => [option, results[option] || 0]);
    } else if (settings.pollType === 'freeform') {
        displayOptions = Object.entries(results).sort((a, b) => b[1] - a[1]).slice(0, 10);
    }

    const maxVotes = Math.max(...displayOptions.map(([_, votes]) => votes), 0);

    displayOptions.forEach(([option, votes], index) => {
        const percentage = totalVotes > 0 ? (votes / totalVotes * 100).toFixed(1) : 0;

        const optionElement = document.createElement('div');
        optionElement.className = 'poll-option';
        
        if (votes === maxVotes && maxVotes > 0 && settings.pollClosed) {
            optionElement.style.fontWeight = 'bold';
            optionElement.style.fontSize = '1.1em';
        }

        let html = '';
        if (!settings.pollClosed) {
            html += `<span class="option-number">${index + 1}</span>`;
        }
        
        html += `<span class="option-text">${option}</span>`;

        // Show donation amount if donation-weighted voting is enabled and there are donations
        const optionDonations = donationTotals[option] || 0;
        if (settings.pollDonationWeighted && optionDonations > 0) {
            html += `<span class="option-tally" style="color: #2ecc71;">$${optionDonations.toFixed(2)}</span>`;
        }

        if (settings.pollTally) {
            html += `<span class="option-tally">${votes} votes</span>`;
        } else {
            html += `<span class="option-percentage">${percentage}%</span>`;
        }

        html += `<div class="poll-bar" style="width: ${percentage}%;"></div>`;
        
        optionElement.innerHTML = html;

        if (parseFloat(percentage) > 90) {
            optionElement.style.color = '#fff';
            optionElement.style.textShadow = '1px 1px 2px rgba(0,0,0,0.7)';
        }

        fragment.appendChild(optionElement);
    });

    pollOptionsContainer.appendChild(fragment);
}

// Create lookup tables for faster matching
const yesMatches = new Set(['yes', 'y', 'yea', 'yeah', 'yep', 'yup', '1']);
const noMatches = new Set(['no', 'n', 'nah', 'nope', '0', '2']);

// Optimize with a debounced message queue
const messageQueue = [];
let processingQueue = false;

function buildVoterKey(name, source, userId) {
    const normalizedSource = source ? source.toString().trim().toLowerCase() : 'unknown';
    if (userId) {
        return `${userId.toString().trim().toLowerCase()}:${normalizedSource}`;
    }
    if (name) {
        return `${name.toString().trim().toLowerCase()}:${normalizedSource}`;
    }
    return `anonymous:${normalizedSource}`;
}

function extractVoterId(payload) {
    if (!payload) return null;
    return payload.userid || payload.userId || payload.user_id || payload.uid || null;
}

function recordVote(option, voterKey, context = {}, voteWeight = 1, donationAmount = 0) {
    results[option] = (results[option] || 0) + voteWeight;
    totalVotes += voteWeight;
    if (donationAmount > 0) {
        donationTotals[option] = (donationTotals[option] || 0) + donationAmount;
        totalDonations += donationAmount;
    }
    if (!settings.pollSpam) {
        alreadyVoted[voterKey] = true;
    }
    debugLog('Vote counted', {
        option,
        voterKey,
        voteWeight,
        donationAmount,
        totalVotes,
        totalDonations,
        ...context
    });
}

function logVoteIgnored(reason, context = {}) {
    debugLog(`Vote ignored: ${reason}`, context);
}

function getPlainVoteText(value) {
    if (typeof value !== 'string') return '';
    let text = value;
    if (/<[a-z][\s\S]*>/i.test(text)) {
        const div = document.createElement('div');
        div.innerHTML = text;
        text = div.textContent || div.innerText || '';
    }
    return text.replace(/\s+/g, ' ').trim();
}

function normalizeVoteText(value) {
    return getPlainVoteText(value).trim().toLowerCase().replace(/[!.,?]+$/, '');
}

function getVoteCandidates(rawVote) {
    const plainText = getPlainVoteText(rawVote);
    const candidates = [];
    const exactVote = normalizeVoteText(plainText);

    if (exactVote) {
        candidates.push({ vote: exactVote, rawVote: plainText, matchedBy: 'whole-message' });
    }

    if (settings.pollMatchMode === 'hashtag-anywhere') {
        const seen = new Set(candidates.map(candidate => candidate.vote));
        const hashtagPattern = /(^|[\s([{])#([^\s#.,!?;:)\]}]+)/g;
        let match;

        while ((match = hashtagPattern.exec(plainText)) !== null) {
            const rawHashtagVote = '#' + match[2];
            const hashtagVote = normalizeVoteText(rawHashtagVote);
            if (hashtagVote && !seen.has(hashtagVote)) {
                candidates.push({ vote: hashtagVote, rawVote: rawHashtagVote, matchedBy: 'inline-hashtag' });
                seen.add(hashtagVote);
            }
        }
    }

    return candidates;
}

function normalizeChoiceText(value) {
    return normalizeVoteText(value).replace(/^#/, '');
}

function compactChoiceText(value) {
    return normalizeChoiceText(value).replace(/[^a-z0-9]/g, '');
}

function exactChoiceText(value) {
    return getPlainVoteText(value).trim().toLowerCase().replace(/^#/, '');
}

function shouldProcessPollMessage(data) {
    if (!data || typeof data.chatmessage !== 'string' || !data.chatmessage.trim()) {
        return false;
    }
    return !data.event || !!data.hasDonation || !!data.donation;
}

function queueVote(vote, name, source, userId, hasDonation = null) {
    messageQueue.push({vote, name, source, userId, hasDonation});
    debugLog('Queued vote message', { vote, name, source, userId, hasDonation });
    if (!processingQueue) {
        processingQueue = true;
        setTimeout(processVoteQueue, 50); // Process votes in batches every 50ms
    }
}

function processVoteQueue() {
    const startTime = Date.now();
    const timeLimit = 20; // Process for max 20ms to avoid UI freezing

    while (messageQueue.length > 0 && (Date.now() - startTime < timeLimit)) {
        const {vote, name, source, userId, hasDonation} = messageQueue.shift();
        processVoteSingle(vote, name, source, userId, hasDonation);
    }
    
    if (messageQueue.length > 0) {
        // If there are still items, schedule another processing cycle
        setTimeout(processVoteQueue, 0);
    } else {
        processingQueue = false;
        scheduleUpdate(); // Update UI after processing batch
    }
}

function processVoteSingle(vote, name, source, userId, hasDonation = null) {
    if (settings.pollClosed) {
        logVoteIgnored('poll closed', { name, source, userId, vote });
        return;
    }

    if (typeof vote !== 'string') {
        logVoteIgnored('invalid vote payload', { name, source, userId, vote });
        return;
    }

    const voterKey = buildVoterKey(name, source, userId);
    if (!settings.pollSpam && alreadyVoted[voterKey]) {
        logVoteIgnored('duplicate voter', { voterKey, name, source, userId, vote });
        return;
    }

    const rawVote = vote;
    const candidates = getVoteCandidates(rawVote);

    if (!candidates.length) {
        logVoteIgnored('empty vote after normalization', { name, source, userId, rawVote });
        return;
    }

    // Calculate vote weight for donation-weighted polls
    let voteWeight = 1;
    let donationAmount = 0;
    if (settings.pollDonationWeighted && hasDonation) {
        donationAmount = (typeof convertToUSD === 'function') ? convertToUSD(hasDonation, source) : 0;
        if (donationAmount > 0) {
            voteWeight = Math.round(donationAmount); // $5 = 5 bonus votes
            if (voteWeight < 1) voteWeight = 1; // Minimum 1 vote
        }
    }

    const voteContext = {
        name,
        source,
        userId,
        rawVote,
        normalizedVote: candidates[0].vote,
        pollMatchMode: settings.pollMatchMode,
        hasDonation,
        donationAmount,
        voteWeight
    };

    for (let candidateIndex = 0; candidateIndex < candidates.length; candidateIndex += 1) {
        const candidate = candidates[candidateIndex];
        if (processVoteCandidate(candidate.vote, voterKey, {
            ...voteContext,
            normalizedVote: candidate.vote,
            rawCandidateVote: candidate.rawVote || candidate.vote,
            candidateMatchedBy: candidate.matchedBy
        }, voteWeight, donationAmount)) {
            return;
        }
    }

    logVoteIgnored('no matching option', {
        ...voteContext,
        candidates: candidates.map(candidate => candidate.vote)
    });
}

function processVoteCandidate(vote, voterKey, voteContext, voteWeight, donationAmount) {
    if (settings.pollType === 'multiple' || settings.pollType === 'yesno') {
        // Handle numeric votes first
        const numericVote = /^\d+$/.test(vote) ? parseInt(vote, 10) : NaN;
        if (!Number.isNaN(numericVote)) {
            // For yes/no, 1 = Yes, 2 = No
            if (settings.pollType === 'yesno') {
                if (numericVote === 1) {
                    recordVote('Yes', voterKey, { ...voteContext, matchedBy: 'yesno-numeric' }, voteWeight, donationAmount);
                    return true;
                } else if (numericVote === 2 || numericVote === 0) {
                    recordVote('No', voterKey, { ...voteContext, matchedBy: 'yesno-numeric' }, voteWeight, donationAmount);
                    return true;
                }
            } else {
                // Regular multiple choice handling
                const option = settings.pollOptions[numericVote - 1];
                if (option) {
                    recordVote(option, voterKey, { ...voteContext, matchedBy: 'multiple-numeric' }, voteWeight, donationAmount);
                    return true;
                }
            }
        }

        // Special handling for yes/no polls
        if (settings.pollType === 'yesno') {
            if (yesMatches.has(vote)) {
                recordVote('Yes', voterKey, { ...voteContext, matchedBy: 'yesno-text' }, voteWeight, donationAmount);
                return true;
            }
            if (noMatches.has(vote)) {
                recordVote('No', voterKey, { ...voteContext, matchedBy: 'yesno-text' }, voteWeight, donationAmount);
                return true;
            }
        }

        // For multiple choice, avoid ambiguous punctuation-normalized matches.
        const exactVote = exactChoiceText(voteContext.rawCandidateVote || vote);
        let cleanVote = normalizeChoiceText(vote);
        const cleanVoteCompact = compactChoiceText(vote);
        const exactMatches = [];
        const flexibleMatches = [];

        for (let i = 0; i < settings.pollOptions.length; i += 1) {
            const option = settings.pollOptions[i];
            const exactOption = exactChoiceText(option);
            const normalizedOption = normalizeChoiceText(option);
            const normalizedOptionCompact = compactChoiceText(option);

            if (exactVote && exactVote === exactOption) {
                exactMatches.push(option);
                continue;
            }

            if (cleanVote === normalizedOption ||
                normalizedOption === cleanVote + 's' ||
                cleanVote === normalizedOption + 's' ||
                (cleanVoteCompact && cleanVoteCompact === normalizedOptionCompact)) {
                flexibleMatches.push(option);
            }
        }

        if (exactMatches.length === 1) {
            recordVote(exactMatches[0], voterKey, { ...voteContext, matchedBy: 'multiple-text' }, voteWeight, donationAmount);
            return true;
        }

        if (exactMatches.length === 0 && flexibleMatches.length === 1) {
            recordVote(flexibleMatches[0], voterKey, { ...voteContext, matchedBy: 'multiple-text' }, voteWeight, donationAmount);
            return true;
        }
    } else if (settings.pollType === 'freeform') {
        // Freeform handling - optimize hashtag matching
        if (vote.startsWith('#') && vote.length > 1) {
            const hashtag = normalizeChoiceText(vote);
            if (hashtag) {
                recordVote(hashtag, voterKey, { ...voteContext, matchedBy: 'freeform-hashtag' }, voteWeight, donationAmount);
                return true;
            }
        } else if (/^\d+$/.test(vote)) {
            const numericVote = Number(vote);
            const resultsKeys = Object.keys(results);
            if (!Number.isNaN(numericVote) && numericVote > 0 && numericVote <= resultsKeys.length) {
                const selectedOption = resultsKeys[numericVote - 1];
                recordVote(selectedOption, voterKey, { ...voteContext, matchedBy: 'freeform-numeric' }, voteWeight, donationAmount);
                return true;
            }
        }
    }

    return false;
}
function updatePollVisibility() {
    if (settings.pollEnabled) {
        pollContainer.classList.remove('hidden');
    } else {
        pollContainer.classList.add('hidden');
    }
    debugLog('Poll visibility updated', { visible: settings.pollEnabled });
}
function processData(data) {
    if (data.setting && !data.settings) {
        if (data.type === "setting") {
            data.settings = {
                [data.setting]: {
                    setting: data.value
                }
            };
        } else {
            data.settings = {
                [data.setting]: {
                    [data.type]: data.value !== undefined ? data.value : false
                }
            };
        }
    } 
	
    if (data.settings) {
        let settingsChanged = false;
        let justUIChange = false;
        const coreChanges = [];
        const uiChanges = [];

        const updateCoreSetting = (key, value) => {
            if (value === undefined || value === null) return;
            const currentValue = settings[key];
            const sameValue = Array.isArray(value) && Array.isArray(currentValue)
                ? arraysEqual(value, currentValue)
                : currentValue === value;
            if (!sameValue) {
                settings[key] = value;
                settingsChanged = true;
                coreChanges.push({ key, value });
            }
        };

        const updateUiSetting = (key, value) => {
            if (value === undefined || value === null) return;
            if (settings[key] !== value) {
                settings[key] = value;
                justUIChange = true;
                uiChanges.push({ key, value });
            }
        };
        
        if (data.settings.pollEnabled !== undefined) {
            const rawEnabled = Object.prototype.hasOwnProperty.call(data.settings.pollEnabled || {}, 'setting')
                ? data.settings.pollEnabled.setting
                : data.settings.pollEnabled;
            const incoming = normalizeBoolean(rawEnabled);
            if (typeof incoming === 'boolean') {
                updateCoreSetting('pollEnabled', incoming);
            }
        }
        if (data.settings.pollType) {
            const nextType = typeof data.settings.pollType === 'string'
                ? data.settings.pollType
                : (data.settings.pollType.optionsetting || 'multiple');
            updateCoreSetting('pollType', nextType);
        }
        if (data.settings.pollMatchMode) {
            const rawMatchMode = typeof data.settings.pollMatchMode === 'string'
                ? data.settings.pollMatchMode
                : (data.settings.pollMatchMode.optionsetting || data.settings.pollMatchMode.setting || '');
            updateCoreSetting('pollMatchMode', normalizePollMatchMode(rawMatchMode));
        }
        if (data.settings.pollQuestion) {
            const incomingQuestion = typeof data.settings.pollQuestion === 'string'
                ? data.settings.pollQuestion
                : (typeof data.settings.pollQuestion.textsetting === 'string'
                    ? data.settings.pollQuestion.textsetting
                    : '');
            const normalizedQuestion = incomingQuestion || 'Loading poll...';
            updateCoreSetting('pollQuestion', normalizedQuestion);
        }
        if (data.settings.pollTally !== undefined) {
            const rawTally = Object.prototype.hasOwnProperty.call(data.settings.pollTally || {}, 'setting')
                ? data.settings.pollTally.setting
                : data.settings.pollTally;
            const incomingTally = normalizeBoolean(rawTally);
            if (typeof incomingTally === 'boolean') {
                updateUiSetting('pollTally', incomingTally);
            }
        }
        if (data.settings.pollStyle) {
            const nextStyle = typeof data.settings.pollStyle === 'string'
                ? data.settings.pollStyle
                : data.settings.pollStyle.optionsetting;
            if (nextStyle && settings.styleType !== nextStyle) {
                settings.styleType = nextStyle;
                const pollContainer = document.getElementById('poll-container');
                if (pollContainer) {
                    pollContainer.className = `poll-container style-${settings.styleType} ${settings.pollEnabled ? '' : 'hidden'}`;
                }
                justUIChange = true;
                uiChanges.push({ key: 'styleType', value: nextStyle });
            }
        }
        if (data.settings.pollSpam !== undefined) {
            const rawSpam = Object.prototype.hasOwnProperty.call(data.settings.pollSpam || {}, 'setting')
                ? data.settings.pollSpam.setting
                : data.settings.pollSpam;
            const incomingSpam = normalizeBoolean(rawSpam);
            if (typeof incomingSpam === 'boolean') {
                updateUiSetting('pollSpam', incomingSpam);
            }
        }
        if (data.settings.pollDonationWeighted !== undefined) {
            const rawDonationWeighted = Object.prototype.hasOwnProperty.call(data.settings.pollDonationWeighted || {}, 'setting')
                ? data.settings.pollDonationWeighted.setting
                : data.settings.pollDonationWeighted;
            const incomingDonationWeighted = normalizeBoolean(rawDonationWeighted);
            if (typeof incomingDonationWeighted === 'boolean') {
                updateUiSetting('pollDonationWeighted', incomingDonationWeighted);
            }
        }
        if (data.settings.multipleChoiceOptions) {
            const rawOptions = typeof data.settings.multipleChoiceOptions === 'string'
                ? data.settings.multipleChoiceOptions
                : (typeof data.settings.multipleChoiceOptions.textsetting === 'string'
                    ? data.settings.multipleChoiceOptions.textsetting
                    : '');
            if (rawOptions) {
                const normalizedOptions = normalizeOptionsList(rawOptions);
                updateCoreSetting('pollOptions', normalizedOptions);
            }
        }
        if (data.settings.pollTimer !== undefined) {
            let rawTimer;
            if (typeof data.settings.pollTimer === 'string' || typeof data.settings.pollTimer === 'number') {
                rawTimer = data.settings.pollTimer;
            } else {
                rawTimer = data.settings.pollTimer.numbersetting ?? data.settings.pollTimer.setting;
            }
            const normalizedTimer = normalizeNumber(rawTimer, null);
            if (normalizedTimer !== null) {
                updateCoreSetting('pollTimer', normalizedTimer);
            }
        }
        if (Object.prototype.hasOwnProperty.call(data.settings, 'pollTimerState')) {
            const rawState = data.settings.pollTimerState.setting ?? data.settings.pollTimerState;
            const timerState = normalizeBoolean(rawState);
            if (typeof timerState === 'boolean') {
                updateUiSetting('pollTimerState', timerState);
            }
        }
        
        if (settingsChanged) {
            const shouldReinitializePoll = coreChanges.some((change) => pollCoreResetKeys.has(change.key));
            if (shouldReinitializePoll) {
                results = {};
                totalVotes = 0;
                alreadyVoted = {};
                donationTotals = {};
                totalDonations = 0;
            }
            if (shouldReinitializePoll) {
                settings.pollClosed = false;
            }
            if (shouldReinitializePoll) {
                initializePoll();
            }
            updatePollVisibility();
            if (shouldReinitializePoll) {
                debugLog('Poll core settings changed; reinitialized poll', { coreChanges, uiChanges: justUIChange ? uiChanges : undefined });
            } else {
                debugLog('Poll core settings updated without reset', { coreChanges });
            }
        }
        if (justUIChange && !settingsChanged) {
            updatePollResults();
            debugLog('Poll UI updated without reset', { uiChanges });
        } else if (justUIChange && settingsChanged) {
            debugLog('UI adjustments applied alongside core reset', { uiChanges });
        }
    } else if (shouldProcessPollMessage(data)) {
        queueVote(data.chatmessage, data.chatname, data.type, extractVoterId(data), data.hasDonation || data.donation);
    } else if (data.chatmessage) {
        debugLog('Poll message ignored: event payload', { chatmessage: data.chatmessage, event: data.event, type: data.type });
    } else if (data.cmd) {
        if (data.cmd === "closepoll") {
            closePoll();
        } else if (data.cmd === "resetpoll") {
            resetPoll();
        } else if (data.cmd === "startpoll") {
            startPoll();
        }
    }
}

function closePoll() {
    settings.pollClosed = true;
    pollTitle.innerText = settings.pollQuestion + " (Closed)";
    updatePollResults();
    debugLog('Poll closed', { pollQuestion: settings.pollQuestion });
}

function startPoll() {
    settings.pollEnabled = true;
    settings.pollClosed = false;
    alreadyVoted = {};
    totalVotes = 0;
    results = {};
    donationTotals = {};
    totalDonations = 0;
    initializePoll();
    updatePollVisibility();
    debugLog('Poll started/reset', {
        pollQuestion: settings.pollQuestion,
        pollType: settings.pollType
    });
}

function resetPoll() {
    settings.pollClosed = false;
    results = {};
    totalVotes = 0;
    alreadyVoted = {};
    donationTotals = {};
    totalDonations = 0;
    initializePoll();
    debugLog('Poll reset without changing visibility', {
        pollQuestion: settings.pollQuestion
    });
}

function processInput(data) {
    if (!data) return false;
	
	debugLog('Incoming payload', data);
	
    if ("action" in data) {
        debugLog('Action command received', data.action);
        if (data.action === "closepoll") {
            closePoll();
        } else if (data.action === "resetpoll") {
            resetPoll();
        } else if (data.action === "startpoll") {
            startPoll();
        }
        return true;
    } else if (shouldProcessPollMessage(data)) {
        debugLog('Chat message received for poll', { chatmessage: data.chatmessage, chatname: data.chatname, source: data.type, hasDonation: data.hasDonation });
        queueVote(data.chatmessage, data.chatname, data.type, extractVoterId(data), data.hasDonation || data.donation);
        return true;
    } else if (data.chatmessage) {
        debugLog('Poll message ignored: event payload', { chatmessage: data.chatmessage, event: data.event, type: data.type });
        return false;
    } else if (data.settings) {
        debugLog('Settings payload received', data.settings);
        // Process settings updates
        processData(data);
        return true;
    } else if (data.cmd) {
        debugLog('Command received', data.cmd);
        // Process commands
        processData(data);
        return true;
    }
    return false;
}

// Memory optimization - create connection manager
const ConnectionManager = {
    setupMainSocket() {
        const session = getSessionId();
        if (!session) {
            debugLog('Missing session; skipping main websocket setup');
            return;
        }
        if (urlParams.has("server")) {
            this.setupSocket(
                urlParams.get("server") || (urlParams.has("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja/api"),
                session,
                2, 1,
                (data) => processInput(data)
            );
        }
    },
    
    setupExtensionSocket() {
        const session = getSessionId();
        if (!session) {
            debugLog('Missing session; skipping extension websocket setup');
            return;
        }
        if (urlParams.has("server2") || urlParams.has("server3")) {
            const serverURL = urlParams.has("server2") ? 
                (urlParams.get("server2") || "wss://io.socialstream.ninja/extension") : 
                (urlParams.get("server3") || "wss://io.socialstream.ninja/extension");
            
            this.setupSocket(
                serverURL,
                session,
                3, 4,
                (data) => {
                    if ((urlParams.has("server2") || urlParams.has("server3"))) {
                        processInput(data);
                    }
                }
            );
        }
    },
    
    setupSocket(serverURL, session, outChannel, inChannel, messageHandler) {
        let socket = null;
        let connectionAttempts = 1;
        let reconnectionTimeout = null;
        
        function connect() {
            if (reconnectionTimeout) {
                clearTimeout(reconnectionTimeout);
                reconnectionTimeout = null;
            }
            
            if (socket) {
                socket.onclose = null;
                socket.close();
            }
            
            socket = new WebSocket(serverURL);
            
            socket.onclose = function() {
                reconnectionTimeout = setTimeout(() => {
                    connectionAttempts += 1;
                    connect();
                }, 100 * connectionAttempts);
            };
            
            socket.onopen = function() {
                connectionAttempts = 1;
                socket.send(JSON.stringify({ join: session, out: outChannel, in: inChannel }));
            };
            
            socket.onerror = function(error) {
                socket.close();
            };
            
            socket.addEventListener("message", function(event) {
                if (!event.data) return;
                
                try {
                    const data = JSON.parse(event.data);
                    const resp = messageHandler(data);
                    
                    if (resp !== null && data.get) {
                        const ret = { 
                            callback: {
                                get: data.get,
                                result: resp
                            }
                        };
                        socket.send(JSON.stringify(ret));
                    }
                } catch (e) {
                    // Silently ignore parsing errors
                }
            });
        }
        
        connect();
    }
};

// Initialize iframe for communication
const iframe = document.createElement("iframe");
const session = getSessionId();
if (session) {
    iframe.src = `https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&notmobile&notmobile&password=${encodeURIComponent(urlParams.get('password') || "false")}&solo&view=${encodeURIComponent(session)}&novideo&noaudio&label=poll&cleanoutput&room=${encodeURIComponent(session)}`;
    iframe.style.cssText = "width:0;height:0;border:0;border:none;position:absolute;";
    document.body.appendChild(iframe);

    window.addEventListener("message", (event) => {
        if (event.source !== iframe.contentWindow) return;
        if (event.data && event.data.dataReceived && event.data.dataReceived.overlayNinja) {
            processData(event.data.dataReceived.overlayNinja);
        }
    });
}

// Setup socket connections
ConnectionManager.setupMainSocket();
ConnectionManager.setupExtensionSocket();

// Initialize the poll on page load
document.addEventListener('DOMContentLoaded', initializePoll);

<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Overlay</title>
	<style>
		html, body {
			margin: 0;
			width: 100%;
			height: 100%;
			background: #05070d;
			color: #f5f7fb;
			font-family: Arial, Helvetica, sans-serif;
		}
		#error {
			box-sizing: border-box;
			max-width: 760px;
			padding: 24px;
			line-height: 1.45;
		}
		code {
			color: #91e7ff;
		}
		#overlayFrame {
			position: fixed;
			inset: 0;
			width: 100%;
			height: 100%;
			border: 0;
			background: transparent;
		}
	</style>
</head>
<body>
	<div id="error">Loading overlay...</div>
	<script>
	(function () {
		var STORAGE_KEY = "ssnAiPromptPagesV2";
		var LEGACY_KEY = "ssnAiPromptPagesV1";
		var params = new URLSearchParams(location.search);
		var requestedOverlay = params.get("overlay") || "";
		var roomID = params.get("session") || "";
		var password = params.get("password") || "false";
		var requestTarget = Math.floor(Math.random() * 999999999);
		var loaded = false;
		var bridgeFrame = null;
		var overlayFrame = null;
		var overlayReady = false;
		var pendingPayloads = [];
		var bridgeResponseChunks = {};
		var overlayRequestTimer = null;
		var overlayRequestStartedAt = 0;
		var overlayResponseReceived = false;

		if (params.get("inner") === "1") {
			showError("");
			return;
		}

		function normalizeOverlayKey(value) {
			value = String(value || "").toLowerCase().trim().replace(/[^a-z0-9_-]+/g, "-").replace(/^-+|-+$/g, "");
			return value || "overlay";
		}

		function showError(message) {
			var error = document.getElementById("error");
			if (error) error.innerHTML = message;
		}

		function escapeHtml(value) {
			return String(value || "").replace(/[&<>"']/g, function (ch) {
				return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch];
			});
		}

		function showMissingOverlayError() {
			showError("No saved AI overlay found for <code>overlay=" + escapeHtml(requestedOverlay || "active") + "</code>. Open <code>aiprompt.html</code>, save the overlay, then reload this page.");
		}

		function buildInnerOverlayUrl() {
			var next = new URLSearchParams(location.search);
			next.delete("session");
			next.delete("password");
			next.delete("label");
			next.delete("overlay");
			next.set("inner", "1");
			var query = next.toString();
			return location.pathname + (query ? "?" + query : "") + location.hash;
		}

		function flushPendingPayloads() {
			if (!overlayReady || !overlayFrame || !overlayFrame.contentWindow) return;
			while (pendingPayloads.length) {
				overlayFrame.contentWindow.postMessage({ dataReceived: { overlayNinja: pendingPayloads.shift() } }, "*");
			}
		}

		function forwardToOverlay(payload) {
			if (!payload) return;
			if (!overlayReady || !overlayFrame || !overlayFrame.contentWindow) {
				pendingPayloads.push(payload);
				if (pendingPayloads.length > 100) pendingPayloads.shift();
				return;
			}
			overlayFrame.contentWindow.postMessage({ dataReceived: { overlayNinja: payload } }, "*");
		}

		function loadHtml(html) {
			if (loaded || !html) return;
			loaded = true;
			showError("");
			overlayFrame = document.createElement("iframe");
			overlayFrame.id = "overlayFrame";
			overlayFrame.allow = "midi;geolocation;microphone;";
			overlayFrame.onload = function () {
				var doc = overlayFrame.contentDocument;
				if (!doc) return;
				doc.open();
				doc.write(html);
				doc.close();
				overlayReady = true;
				setTimeout(flushPendingPayloads, 0);
			};
			overlayFrame.src = buildInnerOverlayUrl();
			document.body.appendChild(overlayFrame);
		}

		function localStateToPackage() {
			var raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_KEY);
			var state = raw ? JSON.parse(raw) : null;
			var pack = { version: 1, activeOverlay: "", order: [], overlays: {} };
			var used = {};
			if (!state || !state.pages || !state.pages.length) return pack;
			for (var i = 0; i < state.pages.length; i++) {
				var page = state.pages[i];
				var root = normalizeOverlayKey(page.name || page.id || ("overlay-" + (i + 1)));
				var key = root;
				var count = 2;
				while (used[key]) key = root + "-" + count++;
				used[key] = true;
				pack.order.push(key);
				pack.overlays[key] = { id: key, name: key, slug: key, html: page.html || "", updatedAt: page.updatedAt || Date.now() };
				if (page.id === state.activeId) pack.activeOverlay = key;
			}
			if (!pack.activeOverlay) pack.activeOverlay = pack.order[0] || "";
			return pack;
		}

		function selectOverlay(pack) {
			pack = pack && pack.value ? pack.value : pack;
			var overlays = pack && pack.overlays ? pack.overlays : {};
			var order = pack && pack.order && pack.order.length ? pack.order.slice() : Object.keys(overlays);
			var wanted = requestedOverlay || (pack && pack.activeOverlay) || order[0] || "";
			var key = /^[0-9]+$/.test(wanted) ? order[parseInt(wanted, 10) - 1] : normalizeOverlayKey(wanted);
			if (key && overlays[key]) return overlays[key];
			for (var i = 0; i < order.length; i++) {
				var item = overlays[order[i]];
				if (!item) continue;
				if (normalizeOverlayKey(item.id) === key || normalizeOverlayKey(item.slug) === key || normalizeOverlayKey(item.name) === key) return item;
			}
			if (requestedOverlay) return null;
			return overlays[(pack && pack.activeOverlay) || ""] || overlays[order[0]] || null;
		}

		function loadFromPackage(pack) {
			var overlay = selectOverlay(pack);
			if (overlay && overlay.html) {
				loadHtml(overlay.html);
				return true;
			}
			return false;
		}

		function loadFromLocalState() {
			try {
				return loadFromPackage(localStateToPackage());
			} catch (e) {
				console.error("[AI Overlay] Failed to load local overlay state:", e);
				return false;
			}
		}

		function requestExtensionOverlays() {
			if (!roomID) return false;
			bridgeFrame = document.createElement("iframe");
			bridgeFrame.id = "bridgeFrame";
			bridgeFrame.dataset.bridgeLabel = params.get("label") || "dock";
			bridgeFrame.onload = function () {
				startOverlayRequestRetries();
			};
			bridgeFrame.src = "https://vdo.socialstream.ninja/?ln&password=" + encodeURIComponent(password) +
				"&salt=vdo.ninja&notmobile&solo&label=" + encodeURIComponent(bridgeFrame.dataset.bridgeLabel) + "&view=" + encodeURIComponent(roomID) +
				"&novideo&noaudio&cleanoutput&room=" + encodeURIComponent(roomID);
			bridgeFrame.style.cssText = "width:0;height:0;position:fixed;left:-100px;top:-100px;";
			document.body.appendChild(bridgeFrame);
			return true;
		}

		function postOverlayRequest() {
			if (!bridgeFrame || !bridgeFrame.contentWindow || loaded || overlayResponseReceived) return;
			bridgeFrame.contentWindow.postMessage({
				sendData: { overlayNinja: { action: "getAiPromptOverlays", target: requestTarget } },
				type: "rpcs"
			}, "*");
		}

		function startOverlayRequestRetries() {
			if (overlayRequestTimer || loaded || overlayResponseReceived) return;
			overlayRequestStartedAt = Date.now();
			postOverlayRequest();
			overlayRequestTimer = setInterval(function () {
				if (loaded || overlayResponseReceived || Date.now() - overlayRequestStartedAt > 9500) {
					stopOverlayRequestRetries();
					return;
				}
				postOverlayRequest();
			}, 1000);
		}

		function stopOverlayRequestRetries() {
			if (!overlayRequestTimer) return;
			clearInterval(overlayRequestTimer);
			overlayRequestTimer = null;
		}

		function resolveBridgeChunk(payload) {
			if (!payload || payload.action !== "ssnBridgeChunk") return payload;
			var chunkId = String(payload.chunkId || "");
			var index = parseInt(payload.index, 10);
			var total = parseInt(payload.total, 10);
			if (!chunkId || !isFinite(index) || !isFinite(total) || index < 0 || total < 1 || index >= total) return null;
			var entry = bridgeResponseChunks[chunkId];
			if (!entry || entry.total !== total) {
				entry = { total: total, parts: [], received: 0 };
				bridgeResponseChunks[chunkId] = entry;
			}
			if (typeof entry.parts[index] === "undefined") entry.received++;
			entry.parts[index] = String(payload.value || "");
			if (entry.received < entry.total) return null;
			delete bridgeResponseChunks[chunkId];
			try {
				return JSON.parse(entry.parts.join(""));
			} catch (e) {
				console.error("[AI Overlay] Failed to parse chunked bridge response:", e);
				return null;
			}
		}

		window.addEventListener("message", function (event) {
			if (bridgeFrame && event.source !== bridgeFrame.contentWindow) return;
			var message = event.data || {};
			if (message.action && !loaded && !overlayResponseReceived) postOverlayRequest();
			var payload = resolveBridgeChunk(message.dataReceived && message.dataReceived.overlayNinja);
			var response = payload && payload.aiPromptOverlays;
			if (response && response.target === requestTarget) {
				overlayResponseReceived = true;
				stopOverlayRequestRetries();
				if (!loaded && !loadFromPackage(response.value || response) && !loadFromLocalState()) {
					showMissingOverlayError();
				}
				return;
			}
			forwardToOverlay(payload);
		});

		var loadedLocal = loadFromLocalState();
		if (requestExtensionOverlays()) {
			setTimeout(function () {
				if (!loaded) showError("Waiting for saved AI overlays from the extension...");
			}, 1500);
			setTimeout(function () {
				if (!loaded && !loadFromLocalState()) {
					stopOverlayRequestRetries();
					showMissingOverlayError();
				}
			}, 10000);
		} else if (!loadedLocal) {
			showMissingOverlayError();
		}
	}());
	</script>
</body>
</html>

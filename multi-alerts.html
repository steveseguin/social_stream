<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Stream Alert Box</title>
  <style>
    :root {
      --overlay-scale: 1;
      --media-scale: 1;
      --headline-scale: 1;
      --detail-scale: 1;
      --alert-accent: #8b5cf6;
      --alert-accent-rgb: 139, 92, 246;
      --text-main: #f8fafc;
      --text-muted: rgba(226, 232, 240, 0.82);
      --progress-duration: 8000ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--text-main);
      font-family: "Avenir Next", "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 36px;
    }

    body[data-align="center"] {
      justify-content: center;
    }

    body[data-align="right"] {
      justify-content: flex-end;
    }

    body.embedded-mode {
      padding: 14px;
      align-items: center;
    }

    #alert-stage {
      width: min(920px, 100%);
      transform: scale(var(--overlay-scale));
      transform-origin: bottom left;
      pointer-events: none;
    }

    body[data-align="center"] #alert-stage {
      transform-origin: center bottom;
    }

    body[data-align="right"] #alert-stage {
      transform-origin: bottom right;
    }

    .status-chip {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(7, 10, 16, 0.72);
      color: rgba(241, 245, 249, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 14px;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }

    .embedded-mode .status-chip {
      opacity: 0.78;
    }

    body.show-status .status-chip {
      display: inline-flex;
    }

    #alert-stage.has-alert + .status-chip {
      display: none !important;
    }

    .alert-card {
      width: min(820px, 100%);
      position: relative;
      padding-top: 10px;
      padding-bottom: 8px;
      animation: alertIn 420ms cubic-bezier(0.18, 0.9, 0.25, 1) forwards;
      pointer-events: none;
    }

    .alert-card::before {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 2px;
      height: 42px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(var(--alert-accent-rgb), 0.22) 0%, rgba(var(--alert-accent-rgb), 0) 70%);
      filter: blur(18px);
      opacity: 0.9;
      pointer-events: none;
    }

    .alert-card.is-hiding {
      animation: alertOut 360ms cubic-bezier(0.55, 0.08, 0.82, 0.39) forwards;
    }

    .alert-card.compact {
      width: min(680px, 100%);
      padding-top: 8px;
    }

    .alert-header {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 0 16px;
      margin-bottom: -12px;
      position: relative;
      z-index: 2;
    }

    .alert-header-spacer {
      flex: 1 1 auto;
    }

    .alert-title {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(var(--alert-accent-rgb), 0.46);
      background: linear-gradient(180deg, rgba(var(--alert-accent-rgb), 0.24), rgba(var(--alert-accent-rgb), 0.13));
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 1px 14px rgba(var(--alert-accent-rgb), 0.34);
      box-shadow: 0 10px 24px rgba(var(--alert-accent-rgb), 0.16);
    }

    .compact .alert-title {
      min-height: 26px;
      padding: 0 10px;
      font-size: 10px;
      letter-spacing: 0.15em;
    }

    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 2px 14px;
      border-radius: 999px;
      background: var(--source-color, rgba(7, 10, 16, 0.42));
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .compact .source-badge {
      min-height: 30px;
      padding: 2px 10px;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    .source-badge img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .compact .source-badge img {
      width: 17px;
      height: 17px;
    }

    .alert-shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      min-height: 102px;
      padding: 24px 18px 18px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(135deg, rgba(9, 12, 18, 0.8), rgba(9, 12, 18, 0.5));
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .alert-shell::before {
      content: "";
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 4px;
      border-radius: 0 999px 999px 0;
      background: linear-gradient(180deg, rgba(var(--alert-accent-rgb), 1), rgba(var(--alert-accent-rgb), 0.18));
      box-shadow: 0 0 16px rgba(var(--alert-accent-rgb), 0.24);
    }

    .alert-shell::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .alert-shell.has-avatar {
      grid-template-columns: auto minmax(0, 1fr);
    }

    .alert-shell.has-media {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .alert-shell.has-avatar.has-media {
      grid-template-columns: auto minmax(0, 1fr) auto;
    }

    .compact .alert-shell {
      gap: 14px;
      min-height: 86px;
      padding: 20px 16px 15px 16px;
    }

    .alert-avatar {
      width: 74px;
      height: 74px;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.24),
        0 0 0 3px rgba(var(--alert-accent-rgb), 0.12);
      background: rgba(255, 255, 255, 0.08);
      position: relative;
      z-index: 1;
    }

    .compact .alert-avatar {
      width: 58px;
      height: 58px;
    }

    .alert-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .alert-copy {
      min-width: 0;
      display: grid;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .alert-headline {
      font-size: clamp(calc(24px * var(--headline-scale)), calc(3.6vw * var(--headline-scale)), calc(42px * var(--headline-scale)));
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.04em;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
    }

    .compact .alert-headline {
      font-size: clamp(calc(20px * var(--headline-scale)), calc(3vw * var(--headline-scale)), calc(33px * var(--headline-scale)));
    }

    .alert-actor {
      color: rgba(var(--alert-accent-rgb), 1);
      text-shadow: 0 0 18px rgba(var(--alert-accent-rgb), 0.2);
    }

    .alert-tail {
      color: rgba(248, 250, 252, 0.92);
    }

    .alert-subtitle {
      font-size: calc(12px * var(--detail-scale));
      line-height: 1.35;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: rgba(var(--alert-accent-rgb), 0.96);
      opacity: 0.98;
      max-width: 62ch;
    }

    .alert-message {
      font-size: calc(16px * var(--detail-scale));
      line-height: 1.4;
      color: var(--text-muted);
      max-width: 54ch;
    }

    .alert-message img {
      max-width: 100%;
      max-height: 2.4em;
      vertical-align: middle;
      object-fit: contain;
    }

    .compact .alert-subtitle {
      font-size: calc(11px * var(--detail-scale));
    }

    .compact .alert-message {
      font-size: calc(14px * var(--detail-scale));
    }

    .alert-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .alert-pill {
      display: inline-flex;
      align-items: center;
      min-height: calc(28px * var(--detail-scale));
      padding: 0 calc(10px * var(--detail-scale));
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: rgba(248, 250, 252, 0.94);
      font-size: calc(12px * var(--detail-scale));
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .compact .alert-pill {
      min-height: calc(24px * var(--detail-scale));
      padding: 0 calc(8px * var(--detail-scale));
    }

    .alert-amount {
      color: #ffffff;
      background: linear-gradient(135deg, rgba(var(--alert-accent-rgb), 0.36), rgba(var(--alert-accent-rgb), 0.18));
      border-color: rgba(var(--alert-accent-rgb), 0.42);
      box-shadow: none;
    }

    .alert-media {
      width: calc(166px * var(--media-scale));
      height: calc(94px * var(--media-scale));
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      justify-self: end;
      position: relative;
      z-index: 1;
    }

    .alert-media::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 26px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.42));
      pointer-events: none;
    }

    .compact .alert-media {
      width: calc(132px * var(--media-scale));
      height: calc(76px * var(--media-scale));
      border-radius: 12px;
    }

    .alert-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center;
    }

    .alert-media video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .alert-progress {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 2px;
      height: 2px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .alert-progress::after {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(var(--alert-accent-rgb), 0.92), rgba(var(--alert-accent-rgb), 0.32));
      transform-origin: left center;
      animation: progressShrink var(--progress-duration) linear forwards;
    }

    .theme-classic .alert-shell {
      border-radius: 22px;
      border-color: rgba(255, 255, 255, 0.18);
      background:
        linear-gradient(180deg, rgba(var(--alert-accent-rgb), 0.18), rgba(var(--alert-accent-rgb), 0.02) 28%),
        linear-gradient(135deg, rgba(12, 15, 23, 0.92), rgba(11, 15, 23, 0.74));
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .theme-classic .alert-shell::before {
      width: 6px;
    }

    .theme-classic .alert-title {
      border-radius: 12px;
      border-color: rgba(var(--alert-accent-rgb), 0.72);
      background: linear-gradient(180deg, rgba(var(--alert-accent-rgb), 0.56), rgba(var(--alert-accent-rgb), 0.26));
      letter-spacing: 0.14em;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06) inset,
        0 12px 28px rgba(var(--alert-accent-rgb), 0.26);
    }

    .theme-classic .source-badge,
    .theme-classic .alert-pill {
      background: rgba(5, 8, 13, 0.46);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .theme-twitch .alert-shell {
      border-radius: 14px 18px 18px 14px;
      border-color: rgba(var(--alert-accent-rgb), 0.32);
      background:
        linear-gradient(180deg, rgba(var(--alert-accent-rgb), 0.11), rgba(var(--alert-accent-rgb), 0) 38%),
        linear-gradient(135deg, rgba(10, 12, 18, 0.86), rgba(9, 11, 17, 0.58));
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.28),
        0 0 24px rgba(var(--alert-accent-rgb), 0.12);
    }

    .theme-twitch .alert-title {
      box-shadow:
        0 0 0 1px rgba(var(--alert-accent-rgb), 0.28) inset,
        0 10px 24px rgba(var(--alert-accent-rgb), 0.18);
    }

    .theme-twitch .source-badge {
      border-color: rgba(var(--alert-accent-rgb), 0.2);
    }

    .theme-twitch .alert-media {
      border-color: rgba(var(--alert-accent-rgb), 0.26);
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.28),
        0 0 22px rgba(var(--alert-accent-rgb), 0.14);
    }

    .theme-minimal .alert-shell {
      background: linear-gradient(90deg, rgba(6, 9, 14, 0.48), rgba(6, 9, 14, 0.14));
      border-color: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .theme-minimal .alert-shell::before {
      width: 2px;
      top: 18px;
      bottom: 18px;
    }

    .theme-minimal .alert-title {
      min-height: 0;
      padding: 0 2px;
      border: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      letter-spacing: 0.22em;
      opacity: 0.82;
    }

    .theme-minimal .source-badge,
    .theme-minimal .alert-pill {
      background: rgba(6, 9, 14, 0.28);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .theme-minimal .alert-media {
      border-color: rgba(255, 255, 255, 0.07);
      box-shadow: none;
    }

    @keyframes alertIn {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes alertOut {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateY(12px) scale(0.99);
      }
    }

    @keyframes progressShrink {
      from {
        transform: scaleX(1);
      }
      to {
        transform: scaleX(0);
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 18px;
      }

      .alert-header {
        flex-wrap: wrap;
        margin-bottom: -10px;
      }

      .alert-header-spacer {
        display: none;
      }

      .alert-shell,
      .alert-shell.has-avatar,
      .alert-shell.has-media,
      .alert-shell.has-avatar.has-media {
        grid-template-columns: 1fr;
        align-items: flex-start;
      }

      .alert-avatar {
        width: 56px;
        height: 56px;
      }

      .alert-media,
      .compact .alert-media {
        width: min(100%, calc(220px * var(--media-scale)));
        height: calc(124px * var(--media-scale));
        justify-self: start;
      }

      .compact .alert-shell {
        min-height: 0;
      }
    }
  </style>
</head>
<body data-align="left">
  <div id="alert-stage" aria-live="polite" aria-atomic="true"></div>
  <div id="alert-status" class="status-chip">Waiting for alerts</div>
  <audio id="custom-alert-audio" preload="auto"></audio>
  <script type="text/javascript" src="tts.js"></script>
  <script type="text/javascript" src="./libs/colours.js"></script>
  <script type="text/javascript" src="./multi-alerts.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Stream Alert Box</title>
  <style>
    :root {
      --overlay-scale: 1;
      --alert-accent: #8b5cf6;
      --surface: rgba(10, 12, 18, 0.9);
      --surface-strong: rgba(8, 9, 13, 0.98);
      --text-main: #f8fafc;
      --text-muted: rgba(226, 232, 240, 0.82);
      --border-soft: rgba(255, 255, 255, 0.12);
      --progress-duration: 8000ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--text-main);
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 36px;
    }

    body[data-align="center"] {
      justify-content: center;
    }

    body[data-align="right"] {
      justify-content: flex-end;
    }

    body.embedded-mode {
      padding: 14px;
      align-items: center;
    }

    #alert-stage {
      width: min(860px, 100%);
      transform: scale(var(--overlay-scale));
      transform-origin: bottom left;
      pointer-events: none;
    }

    body[data-align="center"] #alert-stage {
      transform-origin: center bottom;
    }

    body[data-align="right"] #alert-stage {
      transform-origin: bottom right;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(7, 10, 16, 0.72);
      color: rgba(241, 245, 249, 0.9);
      backdrop-filter: blur(12px);
      font-size: 14px;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }

    .embedded-mode .status-chip {
      opacity: 0.78;
    }

    #alert-stage.has-alert + .status-chip {
      display: none;
    }

    .alert-card {
      width: min(760px, 100%);
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--border-soft);
      background: linear-gradient(135deg, rgba(15, 17, 24, 0.98), rgba(8, 9, 14, 0.92));
      box-shadow:
        0 34px 60px rgba(0, 0, 0, 0.42),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 52px color-mix(in srgb, var(--alert-accent) 18%, transparent);
      animation: alertIn 420ms cubic-bezier(0.18, 0.9, 0.25, 1) forwards;
      pointer-events: none;
    }

    .alert-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--alert-accent) 26%, transparent), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 30%);
      opacity: 1;
      pointer-events: none;
    }

    .alert-card.is-hiding {
      animation: alertOut 360ms cubic-bezier(0.55, 0.08, 0.82, 0.39) forwards;
    }

    .alert-card.compact {
      border-radius: 18px;
    }

    .alert-header,
    .alert-body {
      position: relative;
      z-index: 1;
    }

    .alert-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px 8px;
    }

    .alert-title {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--alert-accent) 55%, transparent);
      background: color-mix(in srgb, var(--alert-accent) 20%, rgba(255, 255, 255, 0.05));
      color: #ffffff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 16px color-mix(in srgb, var(--alert-accent) 70%, transparent);
    }

    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .source-badge img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .alert-body {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: center;
      padding: 8px 22px 22px;
    }

    .compact .alert-body {
      gap: 14px;
      padding: 6px 18px 18px;
    }

    .alert-avatar {
      width: 88px;
      height: 88px;
      border-radius: 28px;
      overflow: hidden;
      border: 2px solid color-mix(in srgb, var(--alert-accent) 60%, rgba(255, 255, 255, 0.14));
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      background: rgba(255, 255, 255, 0.08);
    }

    .compact .alert-avatar {
      width: 72px;
      height: 72px;
      border-radius: 22px;
    }

    .alert-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .alert-copy {
      min-width: 0;
      display: grid;
      gap: 9px;
    }

    .alert-headline {
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-wrap: balance;
      text-shadow: 0 6px 22px rgba(0, 0, 0, 0.34);
    }

    .compact .alert-headline {
      font-size: clamp(24px, 3.3vw, 34px);
    }

    .alert-actor {
      color: var(--alert-accent);
    }

    .alert-tail {
      color: var(--text-main);
    }

    .alert-subtitle,
    .alert-message {
      font-size: 17px;
      line-height: 1.42;
      color: var(--text-muted);
      max-width: 54ch;
      text-wrap: pretty;
    }

    .compact .alert-subtitle,
    .compact .alert-message {
      font-size: 15px;
    }

    .alert-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .alert-pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(248, 250, 252, 0.94);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .alert-amount {
      color: #06110e;
      background: linear-gradient(135deg, color-mix(in srgb, var(--alert-accent) 88%, white), var(--alert-accent));
      border-color: transparent;
      box-shadow: 0 10px 24px color-mix(in srgb, var(--alert-accent) 28%, transparent);
    }

    .alert-progress {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 12px;
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.07);
    }

    .alert-progress::after {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--alert-accent), color-mix(in srgb, var(--alert-accent) 55%, white));
      transform-origin: left center;
      animation: progressShrink var(--progress-duration) linear forwards;
    }

    .theme-classic {
      background: linear-gradient(135deg, rgba(18, 22, 33, 0.98), rgba(11, 13, 18, 0.94));
    }

    .theme-classic .alert-title {
      border-radius: 14px;
      letter-spacing: 0.08em;
    }

    .theme-twitch {
      background:
        linear-gradient(180deg, rgba(145, 70, 255, 0.16), transparent 36%),
        linear-gradient(135deg, rgba(16, 17, 23, 0.98), rgba(10, 11, 17, 0.95));
      border-color: rgba(169, 118, 255, 0.28);
    }

    .theme-twitch::before {
      background:
        radial-gradient(circle at top center, color-mix(in srgb, var(--alert-accent) 36%, transparent), transparent 48%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 28%);
    }

    .theme-twitch .alert-title {
      box-shadow:
        0 0 0 2px rgba(206, 180, 255, 0.14) inset,
        0 0 24px color-mix(in srgb, var(--alert-accent) 30%, transparent);
    }

    .theme-minimal {
      background: rgba(248, 250, 252, 0.94);
      border-color: rgba(15, 23, 42, 0.08);
      color: #0f172a;
      box-shadow:
        0 28px 52px rgba(15, 23, 42, 0.16),
        0 0 0 1px rgba(255, 255, 255, 0.45) inset;
    }

    .theme-minimal::before {
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--alert-accent) 16%, transparent), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.66), transparent 38%);
    }

    .theme-minimal .alert-title {
      color: color-mix(in srgb, var(--alert-accent) 72%, #020617);
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(15, 23, 42, 0.08);
      text-shadow: none;
    }

    .theme-minimal .source-badge,
    .theme-minimal .alert-pill {
      background: rgba(15, 23, 42, 0.05);
      border-color: rgba(15, 23, 42, 0.08);
      color: #334155;
    }

    .theme-minimal .alert-tail,
    .theme-minimal .alert-subtitle,
    .theme-minimal .alert-message {
      color: #334155;
    }

    .theme-minimal .alert-amount {
      color: #ffffff;
    }

    @keyframes alertIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes alertOut {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
    }

    @keyframes progressShrink {
      from {
        transform: scaleX(1);
      }
      to {
        transform: scaleX(0);
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 18px;
      }

      .alert-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .alert-body {
        grid-template-columns: 1fr;
        align-items: flex-start;
      }

      .alert-avatar {
        width: 68px;
        height: 68px;
      }
    }
  </style>
</head>
<body data-align="left">
  <div id="alert-stage" aria-live="polite" aria-atomic="true"></div>
  <div id="alert-status" class="status-chip">Waiting for alerts</div>
  <audio id="custom-alert-audio" preload="auto"></audio>
  <script type="module" src="./multi-alerts.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <meta content="utf-8" http-equiv="encoding" />
    <title>Social Stream - Timer</title>
    <link rel="icon" href="./favicon.ico" />

        #timerCard { padding: 24px; position: relative; overflow: hidden; }
        #topbar, #meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .badge, .pill { display: inline-flex; align-items: center; gap: 8px; min-height: 34px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.09); color: var(--muted); font-size: 13px; letter-spacing: .04em; text-transform: uppercase; }

        #helper { min-height: 20px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
        #meta { justify-content: center; }
        #controls { padding: 16px; display: none; }

        .btn.warn { background: rgba(255,179,86,.15); border-color: rgba(255,179,86,.34); }

        @media (max-width: 560px) { #topbar { flex-direction: column; align-items: flex-start; } #controlsGrid, .btns { grid-template-columns: repeat(2, minmax(0, 1fr)); } .span2 { grid-column: span 2; } }
    </style>
</head>
<body class="stage">

                    <div id="time">05:00</div>
                    <div id="helper">Ready</div>
                </div>
            </div>
            <div id="meta">

                <div class="field"><label for="soundInput">Sound URL</label><input id="soundInput" type="text" placeholder="Optional custom sound URL" /></div>
                <div class="btns">
                    <button class="btn primary" id="applyButton" type="button">Apply</button>
                    <button class="btn primary" id="startButton" type="button">Start</button>
                    <button class="btn" id="pauseButton" type="button">Pause</button>
                    <button class="btn warn" id="addButton" type="button">+30s</button>
                    <button class="btn warn" id="subButton" type="button">-30s</button>
                    <button class="btn dangerBtn" id="resetButton" type="button">Reset</button>
                </div>
            </div>
        </div>
    </div>
    <audio id="doneSound" preload="auto" style="display:none;"></audio>

                }
                return sent;
            } catch (e) { console.error(e); }
            return false;
        }
        function registerExtension() {
            if (extensionRegistered || !sessionId) { return; }
            var keys = Object.keys(connectedPeers);
            var i;
            for (i = 0; i < keys.length; i += 1) {
                if (connectedPeers[keys[i]] === "SocialStream") {
                    extensionRegistered = sendToExtension({ action: "registerTimer", value: { timer: exported(Date.now()), operator: isOperator } });
                    return;
                }
            }
        }
        function setupIframe() {
            if (!sessionId) { return; }
            iframe = document.createElement("iframe");
            iframe.src = "https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&notmobile&password=" + encodeURIComponent(password) + "&solo&view=" + encodeURIComponent(sessionId) + "&novideo&noaudio&label=timer&cleanoutput&room=" + encodeURIComponent(sessionId);
            iframe.style.cssText = "width:0;height:0;position:fixed;left:-100px;top:-100px;border:0;";
            document.body.appendChild(iframe);
            window.addEventListener("message", function (event) {
                if (!iframe || event.source !== iframe.contentWindow || !event.data) { return; }
                if (event.data.dataReceived && event.data.dataReceived.overlayNinja) { processInput(event.data.dataReceived.overlayNinja); return; }
                if (!event.data.action || !event.data.UUID) { return; }
                if ((event.data.action === "push-connection-info" || event.data.action === "view-connection-info") && event.data.value && event.data.value.label) {
                    connectedPeers[event.data.UUID] = event.data.value.label;
                    registerExtension();
                } else if ((event.data.action === "push-connection" || event.data.action === "view-connection") && !event.data.value) {
                    delete connectedPeers[event.data.UUID];
                    extensionRegistered = false;
                } else if ("label" in event.data) {
                    connectedPeers[event.data.UUID] = event.data.label;
                    registerExtension();
                }
                render();
            });
        }
        function connectWebSocket() {
            if (!hasParam("server") || !sessionId) { return; }
            var serverURL = urlParams.get("server") || (hasParam("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja/api");
            socketserver = new WebSocket(serverURL);
            socketserver.onopen = function () {
                try { socketserver.send(JSON.stringify({ join: sessionId.split(",")[0], out: 2, in: 1 })); } catch (e) { console.error(e); }
                render();
            };
            socketserver.onclose = function () { render(); setTimeout(connectWebSocket, 3000); };
            socketserver.onerror = function () { try { socketserver.close(); } catch (e) {} };
            socketserver.addEventListener("message", function (event) {
                if (!event.data) { return; }
                try { processInput(JSON.parse(event.data)); } catch (e) { console.error(e); }
            });
        }
        function dispatch(name, value) {
            act(name, value);
            render();
            sendToExtension({ action: name, value: value });
            if (socketserver && socketserver.readyState === WebSocket.OPEN) {
                try { socketserver.send(JSON.stringify({ action: name, value: value, apiid: sessionId ? sessionId.split(",")[0] : "" })); } catch (e) { console.error(e); }
            }
        }
        function controlPayload() {
            var payload = {
                label: el.labelInput.value || "Timer",
                mode: el.modeInput.value,
                style: el.styleInput.value,
                warnSeconds: parseSeconds(el.warnInput.value, 60),
                dangerSeconds: parseSeconds(el.dangerInput.value, 15),
                soundUrl: el.soundInput.value || "",
                sound: !!(el.soundInput.value || state.soundEnabled),
            };
            var targetMs = parseDurationMs(el.timeInput.value, null);
            if (targetMs !== null && targetMs !== state.durationMs) {
                if (el.modeInput.value === "countup") {
                    payload.duration = el.timeInput.value || "00:00";
                } else {
                    payload.seconds = el.timeInput.value || "300";
                }
            }
            return payload;
        }
        function applyCustomCss() {
            var scale = parseFloat(urlParams.get("scale") || "1");
            if (isFinite(scale) && scale > 0) { document.documentElement.style.setProperty("--page-scale", String(scale)); }
            if (hasParam("css")) {
                var link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = urlParams.get("css");
                document.head.appendChild(link);
            }
            if (hasParam("base64css") || hasParam("b64css") || hasParam("cssbase64") || hasParam("cssb64")) {
                try {
                    var css64 = urlParams.get("base64css") || urlParams.get("b64css") || urlParams.get("cssbase64") || urlParams.get("cssb64");
                    var style = document.createElement("style");
                    style.textContent = decodeURIComponent(atob(css64));
                    document.head.appendChild(style);
                } catch (e) { console.error(e); }
            }
        }
        el.applyButton.onclick = function () { dispatch("settimer", controlPayload()); };
        el.startButton.onclick = function () { dispatch("starttimer"); };
        el.pauseButton.onclick = function () { dispatch("pausetimer"); };
        el.addButton.onclick = function () { dispatch("timeradd", 30); };
        el.subButton.onclick = function () { dispatch("timersubtract", 30); };
        el.resetButton.onclick = function () { dispatch("resettimer"); };
        [el.labelInput, el.timeInput, el.warnInput, el.dangerInput, el.soundInput].forEach(function (node) {
            node.addEventListener("keydown", function (event) { if (event.key === "Enter") { dispatch("settimer", controlPayload()); } });
        });
        [el.modeInput, el.styleInput].forEach(function (node) {
            node.addEventListener("change", function () { dispatch("settimer", controlPayload()); });
        });
        applyCustomCss();
        setSound();
        syncControls();
        if (isOperator) { el.controls.classList.add("show"); }
        setupIframe();
        connectWebSocket();
        render();
        setInterval(render, 100);
    </script>
</body>
</html>
